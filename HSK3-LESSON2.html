        .btn-ghibli {
            background-color: var(--ghibli-green); color: var(--ghibli-wood);

            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 15px;
            padding: 20px; border: 2px solid var(--ghibli-wood);

        let currentIdx = 0;
        let score = 0;
        let currentPart = '';
        let quizList = [];

        // --- HÀM HỖ TRỢ CHUYỂN MÀN HÌNH ---
        function showScreen(id) {
            const screens = ['start-screen', 'flashcard-screen', 'vocab-game-screen', 'play-screen', 'end-screen', 'exercise-screen'];
            screens.forEach(s => {
                const el = document.getElementById(s);
                if(el) el.classList.add('hidden');
            });
            const target = document.getElementById(id);
            if(target) target.classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function returnToStart() {
            showScreen('start-screen');
            updateLockStatus();
        }

        function updateLockStatus() {
            const isAllDone = gameState.vocabDone && gameState.p3Done && gameState.p4Done && gameState.p5Done;
            const btn = document.getElementById('btn-comprehensive');
            if (isAllDone && btn) {
                btn.disabled = false;
                btn.style.backgroundColor = '#dcfce7';
                btn.innerHTML = '✅ Bài Tập Tổng Hợp (Đã mở)';
            }
            if(gameState.vocabDone) document.getElementById('check-vocab')?.classList.remove('hidden');
            if(gameState.p3Done) document.getElementById('check-p3')?.classList.remove('hidden');
            if(gameState.p4Done) document.getElementById('check-p4')?.classList.remove('hidden');
            if(gameState.p5Done) document.getElementById('check-p5')?.classList.remove('hidden');
        }

        // --- PHẦN 1: FLASHCARDS ---
        function startFlashcards() {
            currentIdx = 0;
            document.getElementById('card-total').innerText = vocabulary.length;
            showCard();
            showScreen('flashcard-screen');
        }
        function showCard() {
            const card = vocabulary[currentIdx];
            document.getElementById('card-index').innerText = currentIdx + 1;
            document.getElementById('card-hanzi').innerText = card.hz;
            document.getElementById('card-pinyin').innerText = card.py;
            document.getElementById('card-mean').innerText = card.vi;
            document.getElementById('card-ex-hz').innerText = card.exHz;
            document.getElementById('card-ex-vi').innerText = card.exVi;
            document.getElementById('flashcard-inner').classList.remove('is-flipped');
        }
        function flipCard() { document.getElementById('flashcard-inner').classList.toggle('is-flipped'); }
        function nextCard() {
            if (currentIdx < vocabulary.length - 1) { currentIdx++; showCard(); }
            else { returnToStart(); }
        }

        // --- PHẦN 2: GAME TỪ VỰNG ---
        function startVocabGame() {
            currentIdx = 0; score = 0;
            showVocabStep();
            showScreen('vocab-game-screen');
        }
        function showVocabStep() {
            const word = vocabulary[currentIdx];
            document.getElementById('vg-step').innerText = currentIdx + 1;
            document.getElementById('vg-feedback').classList.add('hidden');
            document.getElementById('vg-next-btn').classList.add('hidden');
            document.getElementById('vg-check-btn').classList.remove('hidden');
            document.getElementById('vg-content').innerHTML = `
                <p class="text-amber-900 text-4xl font-bold mb-4">${word.vi}</p>
                <input type="text" id="vg-input" class="w-full text-center text-3xl p-2 border-b-2 border-amber-500 outline-none chinese-text" placeholder="Nhập chữ Hán">
            `;
            setTimeout(() => document.getElementById('vg-input').focus(), 100);
        }
        function checkVocabGame() {
            const val = document.getElementById('vg-input').value.trim();
            const correct = vocabulary[currentIdx].hz;
            const fb = document.getElementById('vg-feedback');
            fb.classList.remove('hidden');
            if(val === correct) {
                fb.innerText = "Đúng rồi! ✨"; fb.className = "mt-4 p-2 bg-green-100 text-green-700 rounded font-bold";
                score++;
            } else {
                fb.innerText = "Sai rồi, đáp án: " + correct; fb.className = "mt-4 p-2 bg-red-100 text-red-700 rounded font-bold";
            }
            document.getElementById('vg-check-btn').classList.add('hidden');
            document.getElementById('vg-next-btn').classList.remove('hidden');
        }
        function nextVocabStep() {
            if(currentIdx < vocabulary.length - 1) { currentIdx++; showVocabStep(); }
            else { gameState.vocabDone = true; finishPart("Game Từ Vựng: " + score + "/" + vocabulary.length); }
        }

        // --- PHẦN 3: TRẮC NGHIỆM ---
        function startQuiz(part) {
            currentPart = part; currentIdx = 0; score = 0; quizList = quizData[part];
            document.getElementById('quiz-part-name').innerText = "Phần " + part;
            showQuestion();
            showScreen('play-screen');
        }
        function showQuestion() {
            const q = quizList[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('explanation-container').classList.add('hidden');
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.opt.forEach(o => {
                const btn = document.createElement('button');
                btn.className = "btn-ghibli p-3 bg-white text-xl";
                btn.innerText = o;
                btn.onclick = () => {
                    const isRight = (o === q.a);
                    if(isRight) score++;
                    document.getElementById('feedback-title').innerText = isRight ? "Chính xác!" : "Sai rồi!";
                    document.getElementById('exp-full').innerText = q.q.replace('___', q.a);
                    document.getElementById('exp-vi').innerText = q.vi;
                    document.getElementById('exp-detail').innerText = q.exp;
                    container.innerHTML = '';
                    document.getElementById('explanation-container').classList.remove('hidden');
                };
                container.appendChild(btn);
            });
        }
        function showNextQuestion() {
            if(currentIdx < quizList.length - 1) { currentIdx++; showQuestion(); }
            else { gameState[currentPart + 'Done'] = true; finishPart("Hoàn thành! Điểm: " + score + "/" + quizList.length); }
        }

        // --- PHẦN 4: BÀI TẬP TỔNG HỢP ---
        function showExercise() {
            const fillContainer = document.getElementById('fill-exercise');
            const qs = ["1. 这是你的 [___] 吗？", "2. 考试一点儿也不 [___] 。", "3. 现在要上 [___] 去。", "4. 小狗在 [___] 下做什么？", "5. 我太 [___] 了, 不能吃那么多。"];
            const opts = ['楼','办公室','树','胖','难'];
            fillContainer.innerHTML = qs.map(q => `<p class="mb-2">${q.replace('[___]', `<select class="ex-select border-b border-amber-500">${['', ...opts].map(o=>`<option>${o}</option>`).join('')}</select>`)}</p>`).join('');
            
            const imgContainer = document.getElementById('image-exercise');
            imgContainer.innerHTML = `<p>周经理到了办公室就 <input type="text" class="ex-input border-b border-amber-500 w-32"> 。</p>`;
            showScreen('exercise-screen');
        }

        function checkFinalExercise() {
            alert("Đã ghi nhận bài làm! Hãy chụp màn hình gửi giáo viên.");
            returnToStart();
        }

        function finishPart(msg) {
            document.getElementById('result-text').innerText = msg;
            showScreen('end-screen');
        }
    </script>
