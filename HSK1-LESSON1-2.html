<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thử Thách Tình Huống HSK - Nga Học HSK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background: #fdf2f8;
            background-image: radial-gradient(#db2777 0.5px, transparent 0.5px), radial-gradient(#db2777 0.5px, #fdf2f8 0.5px);
            background-size: 24px 24px;
            min-height: 100vh;
        }
        .chinese-text { font-family: 'Noto Sans SC', sans-serif; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .option-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .option-btn:hover:not(:disabled) {
            transform: translateX(8px);
            box-shadow: -6px 6px 0px #db2777;
            border-color: #db2777;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-pop { animation: fadeIn 0.4s ease-out; }
        
        /* Nút Home nổi trên cùng */
        .home-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 50;
            transition: all 0.2s;
        }
        .home-btn:hover { transform: rotate(-10deg) scale(1.1); }
    </style>
</head>
<body class="p-4 md:p-6 flex items-center justify-center">

    <div id="game-container" class="relative max-w-5xl w-full glass-morphism rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row border-8 border-white">
        
        <a href="/" class="home-btn bg-white p-3 rounded-2xl shadow-lg border border-pink-100 flex items-center gap-2 text-pink-600 font-bold hover:bg-pink-50 text-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
            </svg>
            TRANG CHỦ
        </a>

        <div class="md:w-1/3 bg-pink-600 p-8 text-white flex flex-col justify-between relative overflow-hidden">
            <div class="relative z-10">
                <div class="bg-white/20 w-16 h-16 rounded-2xl flex items-center justify-center text-3xl mb-6 shadow-inner animate-bounce">🏮</div>
                <h1 class="text-3xl font-extrabold leading-tight">Ứng dụng<br>Giao tiếp HSK</h1>
                <p class="mt-4 text-pink-100 font-medium">Giáo viên: <span class="text-yellow-300 underline decoration-2 underline-offset-4">Nga Học HSK</span></p>
            </div>

            <div class="mt-12 space-y-8 relative z-10">
                <div>
                    <div class="flex justify-between text-xs uppercase tracking-widest font-bold opacity-80 mb-2">
                        <span>Tiến độ</span>
                        <span id="progress-text">0%</span>
                    </div>
                    <div class="h-3 bg-black/20 rounded-full overflow-hidden p-0.5">
                        <div id="progress-bar" class="h-full bg-yellow-400 rounded-full transition-all duration-700 shadow-[0_0_10px_rgba(250,204,21,0.6)]" style="width: 0%"></div>
                    </div>
                </div>
                
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[10px] uppercase font-bold opacity-60">Điểm hiện tại</p>
                        <p id="score-display" class="text-5xl font-black text-yellow-300">0</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] uppercase font-bold opacity-60">Câu hỏi</p>
                        <p class="text-2xl font-bold"><span id="current-count" class="text-white">0</span>/20</p>
                    </div>
                </div>
            </div>
            <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-pink-500 rounded-full opacity-30"></div>
        </div>

        <div class="md:w-2/3 p-8 md:p-14 bg-white/50 flex flex-col justify-center min-h-[500px]">
            
            <div id="start-screen" class="space-y-6 text-center animate-pop">
                <h2 class="text-4xl md:text-5xl font-black text-gray-800 leading-tight">Bạn có giỏi<br><span class="text-pink-600">Ứng xử HSK?</span></h2>
                <p class="text-gray-500 text-lg max-w-sm mx-auto">Vượt qua 20 tình huống cùng cô Nga để xem trình độ "phản xạ" của bạn nhé!</p>
                <button onclick="startGame()" class="group relative bg-pink-600 hover:bg-pink-700 text-white font-black py-6 px-12 rounded-3xl shadow-[0_10px_0_#9d174d] transition-all hover:-translate-y-1 active:translate-y-1 active:shadow-none overflow-hidden inline-flex items-center gap-3">
                    <span class="text-xl">BẮT ĐẦU NGAY</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:translate-x-2 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </button>
            </div>

            <div id="game-screen" class="hidden animate-pop">
                <div class="mb-4 inline-block bg-pink-100 text-pink-600 px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest">Tình huống cụ thể</div>
                <h3 id="scenario-text" class="text-2xl md:text-3xl font-bold text-gray-800 mb-8 leading-snug"></h3>
                
                <div id="options-container" class="grid gap-4">
                    </div>
            </div>

            <div id="result-screen" class="hidden text-center animate-pop">
                <div class="text-9xl mb-6" id="result-emoji">🏅</div>
                <h2 class="text-4xl font-black text-gray-800 mb-2">Kết Quả Cuối Cùng</h2>
                <p id="result-message" class="text-gray-500 mb-8 text-lg px-6"></p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center max-w-md mx-auto">
                    <button onclick="location.reload()" class="flex-1 bg-gray-900 text-white font-black py-5 rounded-2xl hover:bg-black transition-all shadow-xl">THỬ LẠI</button>
                    <button onclick="shareScore()" class="flex-1 border-4 border-pink-200 text-pink-600 font-black py-5 rounded-2xl hover:bg-pink-50 transition-all">CHIA SẺ</button>
                </div>
            </div>

        </div>
    </div>

    <div id="toast" class="fixed bottom-10 right-10 p-6 rounded-2xl shadow-2xl text-white font-black z-[100] transition-all duration-500 translate-x-[200%]"></div>

    <script>
        // (Dữ liệu 20 câu giữ nguyên từ bản trước để đảm bảo tính ổn định)
        const scenarioData = [
            { q: "Khi gặp thầy cô giáo hoặc người lớn tuổi, bạn chào thế nào?", options: ["你好", "您好", "再见", "对不起"], correct: 1, pinyin: "nín hǎo" },
            { q: "Bạn lỡ đi trễ một cuộc họp quan trọng, bạn nên nói gì?", options: ["没关系", "谢谢", "对不起", "不客气"], correct: 2, pinyin: "duì bu qǐ" },
            { q: "Người khác nói 'Cảm ơn' (谢谢) với bạn, bạn đáp lại?", options: ["再见", "不客气", "不", "您好"], correct: 1, pinyin: "bú kè qi" },
            { q: "Bạn vô tình làm phiền ai đó và họ nói 'Không sao đâu'?", options: ["再见", "谢谢", "对不起", "你好"], correct: 2, pinyin: "duì bu qǐ" },
            { q: "Để chào tạm biệt một người bạn?", options: ["再见", "好", "不谢", "你们"], correct: 0, pinyin: "zài jiàn" },
            { q: "Chào một nhóm gồm nhiều bạn học?", options: ["你好", "您好", "你们好", "老师好"], correct: 2, pinyin: "nǐ men hǎo" },
            { q: "Ai đó giúp bạn xách đồ nặng, bạn nói?", options: ["不谢", "谢谢", "没关系", "不"], correct: 1, pinyin: "xiè xie" },
            { q: "Từ chối một lời đề nghị một cách ngắn gọn?", options: ["不", "好", "您", "再见"], correct: 0, pinyin: "bù" },
            { q: "Cách nói ngắn gọn để đáp lại lời cảm ơn?", options: ["不客气", "不谢", "对不起", "再见"], correct: 1, pinyin: "bú xiè" },
            { q: "Xưng hô với người lớn tuổi một cách tôn trọng?", options: ["你", "你们", "您", "好"], correct: 2, pinyin: "nín" },
            { q: "Gặp bạn thân vào buổi sáng?", options: ["你好", "对不起", "没关系", "不客气"], correct: 0, pinyin: "nǐ hǎo" },
            { q: "Hỏi thăm sức khỏe một người?", options: ["你好吗？", "谢谢你", "对不起", "再见"], correct: 0, pinyin: "nǐ hǎo ma?" },
            { q: "Cách gọi 'Thầy cô giáo' chuẩn?", options: ["学生", "老师", "爸爸", "妈妈"], correct: 1, pinyin: "lǎo shī" },
            { q: "Câu nói thể hiện sự đồng ý hoặc khen điều gì đó ổn?", options: ["不", "再见", "好", "您"], correct: 2, pinyin: "hǎo" },
            { q: "Làm đổ nước vào áo bạn học, câu đầu tiên là?", options: ["没关系", "对不起", "谢谢", "你好"], correct: 1, pinyin: "duì bu qǐ" },
            { q: "Chào tạm biệt và hẹn gặp lại vào ngày mai?", options: ["明天见", "谢谢", "您好", "不客气"], correct: 0, pinyin: "míng tiān jiàn" },
            { q: "Chào buổi sáng tiếng Trung là gì?", options: ["早上好", "对不起", "没关系", "不"], correct: 0, pinyin: "zǎo shang hǎo" },
            { q: "Ai đó xin lỗi bạn lỗi nhỏ, bạn đáp lại?", options: ["谢谢", "没关系", "再见", "不客气"], correct: 1, pinyin: "méi guān xi" },
            { q: "Nói 'Tôi không phải học sinh'?", options: ["我不学生", "我不是学生", "我学生", "对不起"], correct: 1, pinyin: "wǒ bú shì xué sheng" },
            { q: "Kết thúc bài học, học sinh chào cô giáo?", options: ["老师再见", "老师谢谢", "老师您好", "对不起"], correct: 0, pinyin: "lǎo shī zài jiàn" }
        ];

        let currentIdx = 0;
        let score = 0;
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const data = scenarioData[currentIdx];
            document.getElementById('current-count').innerText = currentIdx + 1;
            document.getElementById('scenario-text').innerText = data.q;
            
            const progress = (currentIdx / scenarioData.length) * 100;
            document.getElementById('progress-bar').style.width = progress + "%";
            document.getElementById('progress-text').innerText = Math.round(progress) + "%";

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full p-5 bg-white border-2 border-gray-100 rounded-2xl text-left font-bold text-gray-700 flex justify-between items-center group shadow-sm";
                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-sm border-2 border-gray-100 group-hover:bg-pink-600 group-hover:text-white group-hover:border-pink-600 transition-all font-black">${String.fromCharCode(65+i)}</span>
                        <span class="text-xl chinese-text">${opt}</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 opacity-0 group-hover:opacity-100 text-pink-500 transition-all" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                `;
                btn.onclick = () => handleAnswer(i, btn);
                container.appendChild(btn);
            });
        }

        function handleAnswer(choiceIdx, btnElement) {
            const correctIdx = scenarioData[currentIdx].correct;
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (choiceIdx === correctIdx) {
                score += 5;
                btnElement.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                showToast("CHÍNH XÁC! 🥳", "bg-green-500");
                playSound('correct');
            } else {
                btnElement.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                buttons[correctIdx].classList.add('border-green-500', 'bg-green-100');
                showToast("TIẾC QUÁ! 💡", "bg-red-500");
                playSound('wrong');
            }

            document.getElementById('score-display').innerText = score;

            setTimeout(() => {
                currentIdx++;
                if (currentIdx < scenarioData.length) {
                    renderQuestion();
                } else {
                    finishGame();
                }
            }, 1800);
        }

        function showToast(text, colorClass) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.className = `fixed bottom-10 right-10 p-6 rounded-2xl shadow-2xl text-white font-black z-[100] transition-all duration-500 ${colorClass}`;
            toast.style.transform = "translateX(0)";
            setTimeout(() => toast.style.transform = "translateX(200%)", 1500);
        }

        function finishGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('progress-text').innerText = "100%";
            
            let msg = "", emoji = "";
            if (score >= 90) { emoji = "👑"; msg = "Xuất sắc! Bạn là bậc thầy giao tiếp tiếng Trung!"; }
            else if (score >= 60) { emoji = "🥈"; msg = "Làm tốt lắm! Bạn đã nắm vững các quy tắc cơ bản."; }
            else { emoji = "📚"; msg = "Cố gắng ôn luyện thêm để giao tiếp tự tin hơn nhé!"; }
            
            document.getElementById('result-emoji').innerText = emoji;
            document.getElementById('result-message').innerText = msg;
        }

        function shareScore() {
            const text = `Mình vừa hoàn thành 20 tình huống HSK của cô Nga với ${score} điểm! 🏮🇨🇳`;
            navigator.clipboard.writeText(text).then(() => showToast("ĐÃ COPY KẾT QUẢ!", "bg-blue-500"));
        }
    </script>
</body>
</html>
