<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK4 Bài 1 - 简单的爱情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #a8d5ba;
            --ghibli-brown: #d4a373;
            --ghibli-sky: #caf0f8;
            --ghibli-wood: #6d4c41;
            --ghibli-dark-green: #4f7942;
        }

        body {
            font-family: 'Quicksand', 'Nunito', sans-serif;
            background: linear-gradient(180deg, var(--ghibli-sky) 0%, #fff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chinese-text { font-family: 'Noto Sans SC', sans-serif; font-weight: 700; }
        .chinese-sub { font-family: 'Noto Sans SC', sans-serif; }

        .ghibli-card {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid var(--ghibli-wood);
            border-radius: 20px;
            box-shadow: 0 10px 0 var(--ghibli-brown);
        }

        .btn-ghibli {
            background-color: var(--ghibli-green);
            color: var(--ghibli-wood);
            border: 2px solid var(--ghibli-wood);
            border-radius: 12px;
            transition: all 0.2s;
            font-weight: bold;
            padding: 12px;
            cursor: pointer;
        }

        .btn-ghibli:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 5px 0 var(--ghibli-brown);
            background-color: #95c7a9;
        }
        
        .btn-ghibli:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Flashcard Styles */
        .flashcard-inner {
            position: relative;
            width: 100%; height: 380px;
            transition: transform 0.6s; transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard-inner.is-flipped { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 15px;
            padding: 24px;
            border: 2px solid var(--ghibli-wood);
        }
        .flashcard-front { background-color: #fff; }
        .flashcard-back { background-color: #fef3c7; transform: rotateY(180deg); }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--ghibli-brown); border-radius: 10px; }
        .hidden { display: none; }

        .circle-stat {
            position: relative;
            width: 100px; height: 100px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border: 6px solid #f3f4f6;
        }
        .stat-green { border-color: #a8d5ba; color: #4f7942; }
        .stat-red { border-color: #fca5a5; color: #b91c1c; }

        /* Input Dictation */
        .dictation-input {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            text-align: center;
            border: 3px dashed var(--ghibli-brown);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
        .dictation-input:focus {
            border-color: var(--ghibli-green);
            background-color: #f0fdf4;
        }
    </style>
</head>
<body>

    <div id="game-container" class="w-full max-w-xl px-4 mt-10 mb-10">
        <!-- MÀN HÌNH CHÍNH -->
        <div id="start-screen" class="ghibli-card p-8 text-center">
            <h1 class="text-3xl font-bold text-amber-900 mb-2">HSK4 - Bài 1</h1>
            <h2 class="text-2xl text-emerald-700 font-bold mb-4 chinese-text">简单的爱情</h2>
            <p class="text-sm text-gray-600 mb-4 font-bold">Tình yêu đơn giản</p>
            <div class="mx-auto mb-6 text-6xl">🌸</div>
            
            <div class="grid grid-cols-1 gap-4">
                <button onclick="startFlashcards(vocabulary)" class="btn-ghibli text-lg relative">
                    🎴 Phần 1: Học Từ Vựng Thẻ <span id="check-flashcard" class="absolute right-4 hidden">✅</span>
                </button>
                
                <button onclick="openDictationMenu()" class="btn-ghibli text-lg relative" style="background-color: #fef3c7;">
                    🎧 Phần 2: Nghe Chép Chính Tả <span id="check-dictation" class="absolute right-4 hidden">✅</span>
                </button>
                
                <button id="btn-form" class="btn-ghibli text-lg mt-2 transition-all duration-500" style="background-color: #e5e7eb; border-color: #9ca3af; color: #6b7280;" disabled>
                    🔒 Phần 3: Bài Tập Google Form
                </button>
            </div>
        </div>

        <!-- PHẦN 1: FLASHCARDS -->
        <div id="flashcard-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <button onclick="returnToStart()" class="text-amber-700 text-sm font-bold hover:underline">🔙 Về Menu</button>
                <div class="text-amber-900 font-bold px-3 py-1 bg-amber-100 rounded-full text-xs">
                    Thẻ: <span id="card-index">1</span> / <span id="card-total">36</span>
                </div>
            </div>
            <div class="mb-6">
                <div id="flashcard-inner" class="flashcard-inner" onclick="flipCard()">
                    <div class="flashcard-front shadow-lg">
                        <h2 id="card-hanzi" class="chinese-text text-6xl text-amber-900 leading-tight"></h2>
                        <p class="mt-8 text-sm text-amber-600 animate-pulse font-bold">Chạm để lật thẻ 👆</p>
                    </div>
                    <div class="flashcard-back shadow-lg overflow-y-auto custom-scroll">
                        <h3 id="card-pinyin" class="text-3xl font-bold text-emerald-700 mb-1"></h3>
                        <p id="card-mean" class="text-xl text-amber-900 mb-4 font-bold border-b-2 border-amber-200 pb-2 w-full text-center"></p>
                        <div class="text-left w-full space-y-3">
                            <div><p id="card-example-cn" class="chinese-sub text-xl text-amber-800 leading-relaxed font-medium"></p></div>
                            <p id="card-example-py" class="text-sm text-emerald-600 italic font-semibold"></p>
                            <p id="card-example-vi" class="text-sm text-gray-600 bg-white p-2 rounded-lg border border-amber-100"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="markCard(false)" class="bg-rose-100 border-2 border-rose-400 text-rose-700 p-4 rounded-xl font-bold hover:bg-rose-200">Chưa thuộc</button>
                <button onclick="markCard(true)" class="bg-emerald-100 border-2 border-emerald-400 text-emerald-700 p-4 rounded-xl font-bold hover:bg-emerald-200">Đã thuộc</button>
            </div>
        </div>

        <div id="flashcard-stat-screen" class="ghibli-card p-8 text-center hidden">
             <h2 class="text-3xl font-bold text-amber-900 mb-8">Kết quả ghi nhớ</h2>
             <div class="flex justify-around items-center mb-8">
                <div class="circle-stat stat-green">
                    <span id="stat-learned-percent" class="text-xl font-bold">0%</span>
                    <span class="text-[10px] uppercase font-bold">Thuộc</span>
                </div>
                <div class="circle-stat stat-red">
                    <span id="stat-unlearned-percent" class="text-xl font-bold">0%</span>
                    <span class="text-[10px] uppercase font-bold">Cần ôn</span>
                </div>
             </div>
             <div class="text-left mb-6">
                <p class="font-bold text-amber-900 mb-2">Danh sách cần lưu ý:</p>
                <div id="unlearned-list" class="max-h-48 overflow-y-auto custom-scroll bg-amber-50 rounded-lg border border-amber-200 p-2 space-y-2">
                </div>
             </div>
             <div class="grid grid-cols-1 gap-3">
                 <button id="btn-relearn" onclick="relearnUnlearned()" class="btn-ghibli w-full bg-amber-500 text-white border-amber-700 hidden">🔄 Học lại các từ chưa thuộc</button>
                 <button onclick="endFlashcardSession()" class="btn-ghibli w-full">🔙 Hoàn thành & Về Menu</button>
             </div>
        </div>

        <!-- PHẦN 2: DANH SÁCH BÀI KHÓA (MỚI) -->
        <div id="dictation-menu-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-6">
                <button onclick="returnToStart()" class="text-amber-700 text-sm font-bold hover:underline">🔙 Về Menu Chính</button>
                <h2 class="text-xl font-bold text-emerald-800">Chọn Bài Khóa</h2>
            </div>
            
            <div id="lesson-list" class="grid grid-cols-1 gap-3">
                <!-- Danh sách bài khóa sẽ được render bằng JS vào đây -->
            </div>
        </div>

        <!-- PHẦN 2: MÀN HÌNH NGHE CHÉP TỪNG CÂU -->
        <div id="dictation-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <button onclick="backToDictationMenu()" class="text-amber-700 text-sm font-bold hover:underline">🔙 Về DS Bài khóa</button>
                <div class="text-emerald-800 font-bold text-sm" id="dictation-title-display">Bài 1: <span id="dict-step">1</span>/10</div>
            </div>
            
            <div class="flex flex-col items-center justify-center space-y-6 mt-4">
                <!-- Nút phát loa -->
                <button onclick="playDictAudio()" class="w-20 h-20 bg-emerald-100 border-4 border-emerald-500 rounded-full flex items-center justify-center text-4xl hover:bg-emerald-200 transition-all shadow-md">
                    🔊
                </button>
                <p class="text-xs text-gray-500 font-bold italic">Bật bàn phím tiếng Trung (Pinyin) để gõ</p>

                <!-- Khung nhập liệu -->
                <div class="w-full relative">
                    <input type="text" id="dict-input" class="dictation-input chinese-text" placeholder="Nhập chữ Hán vào đây..." autocomplete="off">
                </div>

                <!-- Phản hồi đúng/sai -->
                <div id="dict-feedback" class="w-full hidden p-3 rounded-lg text-center font-bold text-sm"></div>

                <!-- Gợi ý -->
                <div id="dict-hint" class="w-full hidden bg-amber-50 border border-amber-200 p-3 rounded-lg text-sm space-y-1">
                    <p class="font-bold text-amber-900 chinese-text text-lg" id="hint-hanzi"></p>
                    <p class="text-emerald-700 italic font-semibold" id="hint-pinyin"></p>
                    <p class="text-gray-600" id="hint-vi"></p>
                </div>

                <!-- Cụm nút điều khiển -->
                <div class="grid grid-cols-2 gap-3 w-full">
                    <button id="btn-show-hint" onclick="showDictHint()" class="btn-ghibli bg-amber-100 border-amber-400 text-amber-800">💡 Gợi ý</button>
                    <button id="btn-check-dict" onclick="checkDictation()" class="btn-ghibli bg-blue-500 border-blue-700 text-white">Kiểm tra</button>
                    <button id="btn-next-dict" onclick="nextDictation()" class="btn-ghibli bg-emerald-500 border-emerald-700 text-white col-span-2 hidden">Tiếp theo ➡️</button>
                </div>
            </div>
        </div>

        <div id="dictation-end-screen" class="ghibli-card p-8 text-center hidden">
            <h2 class="text-3xl font-bold text-amber-900 mb-4">Tuyệt vời!</h2>
            <div class="text-6xl mb-4">🏆</div>
            <p class="text-amber-800 mb-6 font-bold text-xl">Bạn đã nghe chép xuất sắc toàn bộ 5 Bài khóa!</p>
            <button onclick="endDictationSession()" class="btn-ghibli w-full py-3 text-lg bg-emerald-100 border-emerald-500 text-emerald-800">🔙 Về Menu Chính</button>
        </div>

    </div>

    <!-- AUDIO HỆ THỐNG -->
    <audio id="audio-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="audio-correct" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="audio-wrong" src="https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3"></audio>
    <audio id="audio-flip" src="https://assets.mixkit.co/active_storage/sfx/2045/2045-preview.mp3"></audio>

    <script>
        // ==========================================
        // DỮ LIỆU TỪ VỰNG HSK 4 BÀI 1 (Giữ nguyên)
        // ==========================================
        const vocabulary = [
            { h: "律师", p: "lǜshī", m: "Luật sư", ex: "他是一名很有经验的律师。", exp: "Tā shì yī míng hěn yǒu jīngyàn de lǜshī.", exv: "Anh ấy là một luật sư rất có kinh nghiệm." },
            { h: "法律", p: "fǎlǜ", m: "Pháp luật", ex: "我们每个人都应该遵守法律。", exp: "Wǒmen měi gè rén dōu yīnggāi zūnshǒu fǎlǜ.", exv: "Mỗi người chúng ta đều nên tuân thủ pháp luật." },
            { h: "俩", p: "liǎ", m: "Hai (người/vật)", ex: "我们俩一起去吃饭吧。", exp: "Wǒmen liǎ yìqǐ qù chīfàn ba.", exv: "Hai chúng ta cùng đi ăn nhé." },
            { h: "印象", p: "yìnxiàng", m: "Ấn tượng", ex: "他给我的印象很好。", exp: "Tā gěi wǒ de yìnxiàng hěn hǎo.", exv: "Anh ấy để lại cho tôi ấn tượng rất tốt." },
            { h: "深", p: "shēn", m: "Sâu, sâu sắc", ex: "我对这部电影的印象很深。", exp: "Wǒ duì zhè bù diànyǐng de yìnxiàng hěn shēn.", exv: "Tôi có ấn tượng rất sâu về bộ phim này." },
            { h: "熟悉", p: "shúxī", m: "Quen thuộc", ex: "我对这个地方很熟悉。", exp: "Wǒ duì zhè ge dìfang hěn shúxī.", exv: "Tôi rất quen thuộc với nơi này." },
            { h: "不仅…也…", p: "bùjǐn... yě...", m: "Không những... mà còn...", ex: "他不仅聪明，也很努力。", exp: "Tā bùjǐn cōngmíng, yě hěn nǔlì.", exv: "Anh ấy không chỉ thông minh mà còn rất chăm chỉ." },
            { h: "就要…了", p: "jiù yào... le", m: "Sắp... rồi", ex: "我们就要考试了。", exp: "Wǒmen jiù yào kǎoshì le.", exv: "Chúng tôi sắp thi rồi." },
            { h: "性格", p: "xìnggé", m: "Tính cách", ex: "她的性格很开朗。", exp: "Tā de xìnggé hěn kāilǎng.", exv: "Tính cách của cô ấy rất vui vẻ." },
            { h: "脾气", p: "píqi", m: "Tính khí", ex: "他的脾气不太好。", exp: "Tā de píqi bú tài hǎo.", exv: "Tính khí của anh ấy không được tốt lắm." },
            { h: "开玩笑", p: "kāi wánxiào", m: "Nói đùa", ex: "我只是开玩笑，你别生气。", exp: "Wǒ zhǐshì kāi wánxiào, nǐ bié shēngqì.", exv: "Tôi chỉ đùa thôi, bạn đừng giận." },
            { h: "从来", p: "cónglái", m: "Từ trước tới nay", ex: "我从来不喝咖啡。", exp: "Wǒ cónglái bù hē kāfēi.", exv: "Tôi từ trước đến nay không uống cà phê." },
            { h: "最好", p: "zuìhǎo", m: "Tốt nhất", ex: "你最好早点休息。", exp: "Nǐ zuìhǎo zǎo diǎn xiūxi.", exv: "Bạn tốt nhất nên nghỉ sớm." },
            { h: "共同", p: "gòngtóng", m: "Chung, cùng nhau", ex: "我们有很多共同的兴趣。", exp: "Wǒmen yǒu hěn duō gòngtóng de xìngqù.", exv: "Chúng tôi có nhiều sở thích chung." },
            { h: "适合", p: "shìhé", m: "Phù hợp (động từ)", ex: "这份工作很适合你。", exp: "Zhè fèn gōngzuò hěn shìhé nǐ.", exv: "Công việc này rất phù hợp với bạn." },
            { h: "合适", p: "héshì", m: "Thích hợp (tính từ)", ex: "这个时间不太合适见面。", exp: "Zhè ge shíjiān bú tài héshì jiànmiàn.", exv: "Thời gian này không thích hợp để gặp mặt." },
            { h: "幸福", p: "xìngfú", m: "Hạnh phúc", ex: "他们过着幸福的生活。", exp: "Tāmen guò zhe xìngfú de shēnghuó.", exv: "Họ sống một cuộc sống hạnh phúc." },
            { h: "快…了", p: "kuài... le", m: "Sắp... rồi", ex: "天快黑了，我们回去吧。", exp: "Tiān kuài hēi le, wǒmen huíqù ba.", exv: "Trời sắp tối rồi, chúng ta về thôi." },
            { h: "浪漫", p: "làngmàn", m: "Lãng mạn", ex: "他是一个很浪漫的人。", exp: "Tā shì yí ge hěn làngmàn de rén.", exv: "Anh ấy là một người rất lãng mạn." },
            { h: "爱情", p: "àiqíng", m: "Tình yêu", ex: "他们的爱情很美好。", exp: "Tāmen de àiqíng hěn měihǎo.", exv: "Tình yêu của họ rất đẹp." },
            { h: "够", p: "gòu", m: "Đủ", ex: "这些钱够用了。", exp: "Zhèxiē qián gòu yòng le.", exv: "Số tiền này đủ dùng rồi." },
            { h: "缺点", p: "quēdiǎn", m: "Khuyết điểm", ex: "每个人都有缺点和优点。", exp: "Měi ge rén dōu yǒu quēdiǎn hé yōudiǎn.", exv: "Mỗi người đều có khuyết điểm và ưu điểm." },
            { h: "优点", p: "yōudiǎn", m: "Ưu điểm", ex: "每个人都有缺点和优点。", exp: "Měi ge rén dōu yǒu quēdiǎn hé yōudiǎn.", exv: "Mỗi người đều có khuyết điểm và ưu điểm." },
            { h: "接受", p: "jiēshòu", m: "Chấp nhận", ex: "我不能接受这个结果。", exp: "Wǒ bù néng jiēshòu zhè ge jiéguǒ.", exv: "Tôi không thể chấp nhận kết quả này." },
            { h: "羡慕", p: "xiànmù", m: "Ngưỡng mộ, ghen tị", ex: "我很羡慕他们的生活。", exp: "Wǒ hěn xiànmù tāmen de shēnghuó.", exv: "Tôi rất ngưỡng mộ cuộc sống của họ." },
            { h: "星星", p: "xīngxing", m: "Ngôi sao", ex: "晚上可以看到很多星星。", exp: "Wǎnshang kěyǐ kàndào hěn duō xīngxing.", exv: "Buổi tối có thể nhìn thấy rất nhiều ngôi sao." },
            { h: "即使…也…", p: "jíshǐ... yě...", m: "Cho dù... cũng...", ex: "即使很忙，他也会陪家人。", exp: "Jíshǐ hěn máng, tā yě huì péi jiārén.", exv: "Dù rất bận, anh ấy cũng sẽ ở bên gia đình." },
            { h: "加班", p: "jiābān", m: "Tăng ca", ex: "他昨天加班到很晚。", exp: "Tā zuótiān jiābān dào hěn wǎn.", exv: "Hôm qua anh ấy tăng ca rất muộn." },
            { h: "亮", p: "liàng", m: "Sáng", ex: "今天的月亮很亮。", exp: "Jīntiān de yuèliang hěn liàng.", exv: "Mặt trăng hôm nay rất sáng." },
            { h: "其实", p: "qíshí", m: "Thực ra", ex: "其实我早就知道了。", exp: "Qíshí wǒ zǎo jiù zhīdào le.", exv: "Thực ra tôi đã biết từ lâu rồi." },
            { h: "感动", p: "gǎndòng", m: "Cảm động", ex: "他的故事让我很感动。", exp: "Tā de gùshi ràng wǒ hěn gǎndòng.", exv: "Câu chuyện của anh ấy khiến tôi rất cảm động." },
            { h: "自然", p: "zìrán", m: "Tự nhiên", ex: "他说话很自然。", exp: "Tā shuōhuà hěn zìrán.", exv: "Anh ấy nói chuyện rất tự nhiên." },

        // --- TRẠNG THÁI HỆ THỐNG ---
        let completedStatus = { flashcard: false, dictation: false };

        function playAudio(id) { const a = document.getElementById(id); if(a) { a.currentTime = 0; a.play().catch(()=>{}); } }

        function returnToStart() {
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('start-screen').classList.remove('hidden');
        }

        // Kiểm tra mở khóa Form
        function checkUnlockForm() {
            if (completedStatus.flashcard && completedStatus.dictation) {
                const btn = document.getElementById('btn-form');
                btn.disabled = false;
                btn.style.backgroundColor = '#d1fae5'; // emerald-100
                btn.style.borderColor = '#10b981'; // emerald-500
                btn.style.color = '#065f46'; // emerald-800
                btn.innerHTML = '📝 Phần 3: Bài Tập Google Form (Đã mở khóa)';
                
                // --- THAY LINK GOOGLE FORM CỦA BẠN VÀO ĐÂY ---
                btn.onclick = () => window.open('https://forms.google.com/', '_blank'); 
            }
        }

        // ==========================================
        // PHẦN 1: FLASHCARD LOGIC
        // ==========================================
        let currentFlashList = [], flashcardIdx = 0, learnedCount = 0, unlearnedItems = [];

        function startFlashcards(list) {
            playAudio('audio-click');
            currentFlashList = [...list];
            flashcardIdx = 0; learnedCount = 0; unlearnedItems = [];
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('flashcard-screen').classList.remove('hidden');
            document.getElementById('card-total').innerText = currentFlashList.length;
            updateFlashcard();
        }

        function updateFlashcard() {
            const card = currentFlashList[flashcardIdx];
            document.getElementById('card-index').innerText = flashcardIdx + 1;
            document.getElementById('card-hanzi').innerText = card.h;
            document.getElementById('card-pinyin').innerText = card.p;
            document.getElementById('card-mean').innerText = card.m;
            document.getElementById('card-example-cn').innerText = card.ex;
            document.getElementById('card-example-py').innerText = card.exp;
            document.getElementById('card-example-vi').innerText = card.exv;
            document.getElementById('flashcard-inner').classList.remove('is-flipped');
        }

        function flipCard() { playAudio('audio-flip'); document.getElementById('flashcard-inner').classList.toggle('is-flipped'); }

        function markCard(learned) {
            if (learned) learnedCount++;
            else unlearnedItems.push(currentFlashList[flashcardIdx]);
            
            flashcardIdx++;
            if (flashcardIdx < currentFlashList.length) updateFlashcard();
            else showFlashcardStats();
        }

        function showFlashcardStats() {
            document.getElementById('flashcard-screen').classList.add('hidden');
            document.getElementById('flashcard-stat-screen').classList.remove('hidden');
            
            const total = currentFlashList.length;
            const learnedPercent = Math.round((learnedCount / total) * 100);
            const unlearnedPercent = 100 - learnedPercent;

            document.getElementById('stat-learned-percent').innerText = learnedPercent + "%";
            document.getElementById('stat-unlearned-percent').innerText = unlearnedPercent + "%";

            const listContainer = document.getElementById('unlearned-list');
            listContainer.innerHTML = '';
            
            if (unlearnedItems.length > 0) {
                unlearnedItems.forEach(item => {
                    listContainer.innerHTML += `
                        <div class="flex justify-between items-center border-b border-amber-200 pb-1 text-sm">
                            <span class="font-bold text-amber-900">${item.h} <span class="font-normal text-gray-500">(${item.p})</span></span>
                            <span class="text-amber-700">${item.m}</span>
                        </div>
                    `;
                });
                document.getElementById('btn-relearn').classList.remove('hidden');
            } else {
                listContainer.innerHTML = '<p class="text-center text-emerald-600 font-bold py-4">Tuyệt vời! Bạn đã thuộc hết từ vựng.</p>';
                document.getElementById('btn-relearn').classList.add('hidden');
            }
        }

        function relearnUnlearned() { startFlashcards(unlearnedItems); }

        function endFlashcardSession() {
            completedStatus.flashcard = true;
            document.getElementById('check-flashcard').classList.remove('hidden');
            checkUnlockForm();
            returnToStart();
        }


        // ==========================================
        // PHẦN 2: NGHE CHÉP CHÍNH TẢ THEO BÀI KHÓA
        // ==========================================
        let currentLessonIdx = -1;
        let dictStep = 0;
        let systemAudioPlayer = new Audio(); // Trình phát audio động cho từng câu

        function openDictationMenu() {
            playAudio('audio-click');
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('dictation-menu-screen').classList.remove('hidden');
            renderLessonList();
        }

        function renderLessonList() {
            const listContainer = document.getElementById('lesson-list');
            listContainer.innerHTML = '';
            
            let allCompleted = true;

            lessonsData.forEach((lesson, index) => {
                if (!lesson.completed) allCompleted = false;
                
                const btn = document.createElement('button');
                btn.className = `btn-ghibli text-left py-4 relative flex flex-col ${lesson.completed ? 'opacity-70 bg-emerald-100 border-emerald-400' : ''}`;
                btn.onclick = () => startDictationLesson(index);
                
                btn.innerHTML = `
                    <span class="font-bold text-lg text-amber-900">${lesson.title}</span>
                    <span class="text-sm text-gray-600">${lesson.desc} (${lesson.sentences.length} câu)</span>
                    ${lesson.completed ? '<span class="absolute right-4 top-1/2 -translate-y-1/2 text-2xl">✅</span>' : '▶️'}
                `;
                listContainer.appendChild(btn);
            });

            // Nếu học xong 5 bài thì mở thông báo hoàn thành
            if (allCompleted && lessonsData.length > 0) {
                document.getElementById('dictation-menu-screen').classList.add('hidden');
                document.getElementById('dictation-end-screen').classList.remove('hidden');
            }
        }

        function startDictationLesson(index) {
            playAudio('audio-click');
            currentLessonIdx = index;
            dictStep = 0;
            
            document.getElementById('dictation-menu-screen').classList.add('hidden');
            document.getElementById('dictation-screen').classList.remove('hidden');
            
            loadDictationStep();
        }

        function backToDictationMenu() {
            systemAudioPlayer.pause();
            openDictationMenu();
        }

        function loadDictationStep() {
            const lesson = lessonsData[currentLessonIdx];
            document.getElementById('dictation-title-display').innerHTML = `${lesson.title}: Câu <span id="dict-step">${dictStep + 1}</span>/${lesson.sentences.length}`;
            
            document.getElementById('dict-input').value = "";
            document.getElementById('dict-input').disabled = false;
            
            // Reset UI
            const feedback = document.getElementById('dict-feedback');
            feedback.classList.add('hidden');
            document.getElementById('dict-hint').classList.add('hidden');
            
            document.getElementById('btn-check-dict').classList.remove('hidden');
            document.getElementById('btn-show-hint').classList.remove('hidden');
            document.getElementById('btn-next-dict').classList.add('hidden');
            
            // Tự động focus vào ô nhập
            document.getElementById('dict-input').focus();
        }

        function playDictAudio() {
            const sentenceData = lessonsData[currentLessonIdx].sentences[dictStep];
            if(sentenceData.audioSrc && sentenceData.audioSrc.trim() !== "") {
                systemAudioPlayer.src = sentenceData.audioSrc;
                systemAudioPlayer.play().catch(e => {
                    alert("Không thể phát audio. Link audio bị lỗi hoặc không hỗ trợ.");
                });
            } else {
                alert("Bạn chưa dán Link Audio cho câu này. Hãy xem Hướng dẫn Github bên ngoài code nhé!");
            }
        }

        function showDictHint() {
            const data = lessonsData[currentLessonIdx].sentences[dictStep];
            document.getElementById('hint-hanzi').innerText = data.h;
            document.getElementById('hint-pinyin').innerText = data.p;
            document.getElementById('hint-vi').innerText = data.vi;
            document.getElementById('dict-hint').classList.remove('hidden');
        }

        // Hàm xóa sạch dấu câu, khoảng trắng để so sánh chính xác chữ Hán
        function cleanChineseText(text) {
            return text.replace(/[^\u4e00-\u9fa5]/g, '');
        }

        function checkDictation() {
            const userInput = document.getElementById('dict-input').value;
            const targetText = lessonsData[currentLessonIdx].sentences[dictStep].h;
            
            const cleanedInput = cleanChineseText(userInput);
            const cleanedTarget = cleanChineseText(targetText);

            const feedback = document.getElementById('dict-feedback');
            feedback.classList.remove('hidden');

            if (cleanedInput === cleanedTarget && cleanedInput !== "") {
                playAudio('audio-correct');
                feedback.innerText = "Chính xác! 🌟";
                feedback.className = "w-full mt-4 p-3 rounded-lg text-center font-bold bg-emerald-100 text-emerald-700";
                
                document.getElementById('dict-input').disabled = true;
                document.getElementById('btn-check-dict').classList.add('hidden');
                document.getElementById('btn-show-hint').classList.add('hidden');
                
                const btnNext = document.getElementById('btn-next-dict');
                btnNext.classList.remove('hidden');
                
                // Đổi text nút bấm nếu là câu cuối cùng của bài
                if (dictStep === lessonsData[currentLessonIdx].sentences.length - 1) {
                    btnNext.innerText = "Hoàn thành Bài khóa 🏆";
                } else {
                    btnNext.innerText = "Tiếp theo ➡️";
                }
                
                // Hiển thị luôn đáp án đúng đẹp đẽ
                showDictHint();
            } else {
                playAudio('audio-wrong');
                feedback.innerText = "Chưa đúng rồi! Hãy thử lại hoặc xem gợi ý nhé.";
                feedback.className = "w-full mt-4 p-3 rounded-lg text-center font-bold bg-rose-100 text-rose-700";
            }
        }

        function nextDictation() {
            dictStep++;
            if (dictStep < lessonsData[currentLessonIdx].sentences.length) {
                loadDictationStep();
            } else {
                // Hoàn thành Bài khóa hiện tại
                lessonsData[currentLessonIdx].completed = true;
                openDictationMenu(); // Trở về Menu Bài khóa để chọn bài tiếp theo
            }
        }

        function endDictationSession() {
            completedStatus.dictation = true;
            document.getElementById('check-dictation').classList.remove('hidden');
            checkUnlockForm();
            returnToStart();
        }

        // Enter để check
        document.getElementById("dict-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                if(!document.getElementById('btn-check-dict').classList.contains('hidden')) {
                    checkDictation();
                } else if (!document.getElementById('btn-next-dict').classList.contains('hidden')) {
                    nextDictation();
                }
            }
        });

    </script>
</body>
</html>
