<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 9: Con trai anh làm việc ở đâu? - Ghibli Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-pink: #ffb7c5;
            --white: #ffffff;
            --success-color: #2e7d32;
            --error-color: #c62828;
            --info-color: #1976d2;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.85);
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--ghibli-green);
            backdrop-filter: blur(5px);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 { margin: 0; color: var(--ghibli-dark-green); font-size: 1.1rem; }

        .home-btn {
            background: var(--ghibli-green);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .home-btn:hover { background: var(--ghibli-dark-green); transform: scale(1.05); }

        .game-wrapper {
            width: 95%;
            max-width: 700px;
            margin: 20px;
            text-align: center;
        }

        #main-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 40px 20px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .menu-btn {
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--ghibli-green);
            background: #f0f9f0;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 20px;
            text-align: left;
        }

        .menu-btn:hover { transform: translateY(-5px); background: var(--ghibli-green); color: white; }

        .game-container {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: 600;
            color: var(--ghibli-wood);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-inner {
            height: 100%;
            background: var(--ghibli-pink);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Flashcards */
        .flashcard-container { perspective: 1000px; width: 100%; height: 300px; margin-bottom: 20px; }
        .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-radius: 25px; border: 2px solid var(--ghibli-green); background: white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 20px; box-sizing: border-box;
        }
        .flashcard-back { transform: rotateY(180deg); background: #f0f9f0; }
        .flashcard .cn { font-size: 5rem; color: var(--ghibli-dark-green); }
        .flashcard .pinyin { font-size: 1.5rem; color: #666; font-weight: 600; margin-top: 10px; }
        .flashcard .vi { font-size: 1.8rem; color: var(--ghibli-wood); font-weight: 700; margin-top: 5px; }
        .flashcard .example { font-size: 1rem; color: #555; font-style: italic; margin-top: 10px; max-width: 90%; }

        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-primary { background: var(--ghibli-green); color: white; box-shadow: 0 4px 0 var(--ghibli-dark-green); }
        .btn-secondary { background: #eee; color: #666; }
        .btn-success { background: var(--success-color); color: white; flex: 1; }
        .btn-error { background: var(--error-color); color: white; flex: 1; }
        
        .memory-controls { width: 100%; display: flex; gap: 15px; margin-bottom: 10px; }

        /* Vocabulary Result Summary */
        .summary-title { color: var(--ghibli-dark-green); margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-item { padding: 15px; border-radius: 15px; background: #f9f9f9; border: 2px solid #eee; }
        .stat-item.green { border-color: var(--success-color); color: var(--success-color); }
        .stat-item.red { border-color: var(--error-color); color: var(--error-color); }
        .stat-val { font-size: 1.8rem; font-weight: bold; }
        
        .review-list { text-align: left; background: #fffaf0; border-radius: 20px; padding: 20px; border: 1px solid #ffe4b5; margin-bottom: 20px; max-height: 250px; overflow-y: auto; }
        .review-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .review-item:last-child { border-bottom: none; }
        .review-cn { font-weight: bold; color: var(--ghibli-dark-green); font-size: 1.1rem; }

        /* Grammar Styles */
        .question-box { background: #fdfdfd; padding: 25px; border-radius: 20px; border: 2px dashed var(--ghibli-green); margin-bottom: 25px; }
        .question-text { font-size: 1.4rem; color: var(--ghibli-dark-green); font-weight: 600; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 20px; }
        .option-card { padding: 15px; border: 2px solid #eee; border-radius: 15px; cursor: pointer; transition: 0.2s; background: white; font-weight: 600; }
        .option-card.selected { background: var(--ghibli-green); color: white; border-color: var(--ghibli-green); }
        .answer-zone { min-height: 70px; border: 2px solid #eee; border-radius: 15px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px; padding: 15px; justify-content: center; align-items: center; background: #fafafa; }
        .word-tag { background: var(--ghibli-green); color: white; padding: 10px 18px; border-radius: 12px; cursor: pointer; }
        .feedback { padding: 15px; border-radius: 15px; margin-top: 15px; display: none; font-weight: 600; }
        .success { background: #e8f5e9; color: var(--success-color); border: 2px solid var(--success-color); }
        .error { background: #ffebee; color: var(--error-color); border: 2px solid var(--error-color); }
        .explanation-box { margin-top: 15px; padding: 15px; background: #e3f2fd; border-left: 5px solid var(--info-color); border-radius: 10px; text-align: left; display: none; }

        .rank-badge { font-size: 3.5rem; font-weight: 900; color: var(--ghibli-pink); margin: 15px 0; }
    </style>
</head>
<body>

<header class="header">
    <h1>Khu Vườn Bài 9 🌿</h1>
    <a href="index.html" class="home-btn">🏡 Về vườn</a>
</header>

<div class="game-wrapper">
    <!-- MENU CHÍNH -->
    <div id="main-menu">
        <h2 style="color: var(--ghibli-dark-green); margin-bottom: 10px;">Chào bạn! Hôm nay bạn muốn luyện tập gì?</h2>
        <button class="menu-btn" onclick="startVocabulary()">
            <div class="icon" style="font-size: 2.5rem;">🌸</div>
            <div class="text">
                <h3>Ôn tập Từ vựng</h3>
                <p>Mặt trước chữ Hán, mặt sau đầy đủ thông tin.</p>
            </div>
        </button>
        <button class="menu-btn" onclick="startGrammar()">
            <div class="icon" style="font-size: 2.5rem;">📝</div>
            <div class="text">
                <h3>Thách thức Ngữ pháp</h3>
                <p>20 câu hỏi tính điểm & giải thích chi tiết.</p>
            </div>
        </button>
    </div>

    <!-- FLASHCARDS -->
    <div id="vocab-game" class="game-container">
        <div class="stats">
            <span>Bài 9: Từ vựng</span>
            <span><span id="vocab-current">1</span>/14</span>
        </div>
        <div class="progress-bar"><div id="vocab-progress" class="progress-inner"></div></div>
        
        <div class="flashcard-container" onclick="flipCard()">
            <div id="flashcard" class="flashcard">
                <div class="flashcard-face">
                    <div id="vocab-cn" class="cn">猫</div>
                    <p style="font-size: 0.8rem; color: #999; margin-top: 20px;">(Chạm để lật thẻ)</p>
                </div>
                <div class="flashcard-face flashcard-back">
                    <div id="vocab-pinyin" class="pinyin">māo</div>
                    <div id="vocab-vi" class="vi">con mèo</div>
                    <div id="vocab-ex" class="example">"那儿有一只小猫。"</div>
                </div>
            </div>
        </div>

        <div class="memory-controls">
            <button class="btn btn-error" onclick="markMemory(false)">Chưa nhớ ❌</button>
            <button class="btn btn-success" onclick="markMemory(true)">Đã nhớ ✅</button>
        </div>

        <div class="btn-group">
            <button class="btn btn-secondary" onclick="prevVocab()">◀ Quay lại</button>
            <button class="btn btn-primary" onclick="nextVocab()">Bỏ qua ▶</button>
        </div>
    </div>

    <!-- TỔNG KẾT TỪ VỰNG -->
    <div id="vocab-result" class="game-container">
        <h2 class="summary-title">Kết quả ôn tập 🌿</h2>
        
        <div class="stats-grid">
            <div class="stat-item green">
                <div>Đã thuộc</div>
                <div id="res-percent-known" class="stat-val">0%</div>
                <div id="res-count-known" style="font-size: 0.9rem;">0 từ</div>
            </div>
            <div class="stat-item red">
                <div>Chưa thuộc</div>
                <div id="res-percent-unknown" class="stat-val">0%</div>
                <div id="res-count-unknown" style="font-size: 0.9rem;">0 từ</div>
            </div>
        </div>

        <div id="review-section">
            <p style="text-align: left; font-weight: 600; color: var(--ghibli-wood);">Danh sách cần ôn lại:</p>
            <div id="review-list" class="review-list">
                <!-- Items will be added here -->
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-secondary" onclick="startVocabulary()">Ôn tập lại</button>
            <button class="btn btn-primary" onclick="location.reload()">Về thực đơn</button>
        </div>
    </div>

    <!-- NGỮ PHÁP (GIỮ NGUYÊN) -->
    <div id="grammar-game" class="game-container">
        <div class="stats">
            <span>Câu hỏi: <span id="grammar-current">1</span>/20</span>
            <span class="score-display">Điểm: <span id="score-val">0</span></span>
        </div>
        <div class="progress-bar"><div id="grammar-progress" class="progress-inner"></div></div>
        <div id="grammar-content">
            <div id="q-box" class="question-box"><div id="q-text" class="question-text"></div></div>
            <div id="ans-zone" class="answer-zone"></div>
            <div id="opt-grid" class="options-grid"></div>
            <div id="grammar-feedback" class="feedback"></div>
            <div id="explanation-box" class="explanation-box">
                <h4>💡 Giải thích:</h4>
                <p id="explanation-text"></p>
            </div>
            <div class="btn-group" id="grammar-actions">
                <button class="btn btn-secondary" onclick="resetGrammarAnswer()">Làm lại</button>
                <button class="btn btn-primary" onclick="checkGrammarAnswer()">Kiểm tra ✅</button>
            </div>
            <button id="btn-next-q" class="btn btn-primary" style="display:none; margin: 20px auto 0;" onclick="nextQuestion()">Tiếp theo ➔</button>
        </div>
    </div>
</div>

<script>
    const vocabulary = [
        {cn: '小', p: 'xiǎo', vi: 'nhỏ, bé', ex: '这只猫很小。'},
        {cn: '猫', p: 'māo', vi: 'con mèo', ex: '小猫在那儿。'},
        {cn: '在', p: 'zài', vi: 'ở, tại', ex: '你在哪儿？'},
        {cn: '哪儿', p: 'nǎr', vi: 'đâu, chỗ nào', ex: '我的杯子在哪儿？'},
        {cn: '狗', p: 'gǒu', vi: 'con chó', ex: '那儿有一只小狗。'},
        {cn: '椅子', p: 'yǐzi', vi: 'cái ghế', ex: '小狗在椅子下面。'},
        {cn: '下面', p: 'xiàmiàn', vi: 'phía dưới', ex: '他在椅子下面。'},
        {cn: '工作', p: 'gōngzuò', vi: 'làm việc', ex: '他在哪儿工作？'},
        {cn: '儿子', p: 'érzi', vi: 'con trai', ex: '他儿子在医院工作。'},
        {cn: '医院', p: 'yīyuàn', vi: 'bệnh viện', ex: '他在医院工作。'},
        {cn: '医生', p: 'yīshēng', vi: 'bác sĩ', ex: '我爸爸是医生。'},
        {cn: '爸爸', p: 'bàba', vi: 'bố, cha', ex: '我爸爸在医院。'},
        {cn: '女儿', p: 'nǚ\'ér', vi: 'con gái', ex: '我女儿在学校。'},
        {cn: '学校', p: 'xuéxiào', vi: 'trường học', ex: '他在学校工作。'}
    ];

    const grammarQuestions = [
        { type: 'SẮP XẾP', q: 'Sắp xếp: "Con trai tôi làm việc ở bệnh viện."', opt: ['我', '儿子', '在', '医院', '工作'], ans: '我儿子在医院工作', exp: 'Cấu ngữ pháp: Chủ ngữ + 在 + Địa điểm + Hành động.' },
        { type: 'PINYIN', q: 'Pinyin của "工作" (Làm việc):', opt: ['gōngzuò', 'gōngsuò', 'kōngzuò', 'gōngzuó'], ans: 'gōngzuò', exp: '工作 (gōngzuò) nghĩa là làm việc.' },
        { type: 'CHỮ HÁN', q: 'Chọn chữ Hán cho: "Cái ghế"', opt: ['椅子', '桌子', '杯子', '衣服'], ans: '椅子', exp: '椅子 (yǐzi): Cái ghế.' },
        { type: 'ĐIỀN TỪ', q: '我的小猫___哪儿？', opt: ['在', '有', '是', '去'], ans: '在', exp: 'Dùng "在" chỉ vị trí.' },
        { type: 'SẮP XẾP', q: 'Sắp xếp: "Con mèo nhỏ ở dưới cái ghế."', opt: ['小猫', '在', '椅子', '下面'], ans: '小猫在椅子下面', exp: 'Vật mốc đứng trước từ chỉ phương hướng.' },
        // ... Thêm đủ các câu hỏi như bản cũ
    ];

    let currentVocabIdx = 0, currentGrammarIdx = 0, score = 0, selectedWords = [];
    let memoryStatus = new Array(vocabulary.length).fill(null); // null: skipped, true: remembered, false: not remembered

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();
    function playSfx(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        if(type==='pop'){ o.frequency.setValueAtTime(400, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1); o.start(); o.stop(audioCtx.currentTime+0.1); }
    }

    // --- NAVIGATION ---
    function startVocabulary() {
        playSfx('pop');
        currentVocabIdx = 0;
        memoryStatus.fill(null);
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('vocab-game').style.display = 'block';
        document.getElementById('vocab-result').style.display = 'none';
        updateVocabCard();
    }

    function flipCard() { playSfx('pop'); document.getElementById('flashcard').classList.toggle('flipped'); }

    function updateVocabCard() {
        const v = vocabulary[currentVocabIdx];
        document.getElementById('vocab-cn').innerText = v.cn;
        document.getElementById('vocab-pinyin').innerText = v.p;
        document.getElementById('vocab-vi').innerText = v.vi;
        document.getElementById('vocab-ex').innerText = v.ex;
        document.getElementById('vocab-current').innerText = currentVocabIdx + 1;
        document.getElementById('vocab-progress').style.width = ((currentVocabIdx + 1) / 14 * 100) + '%';
        document.getElementById('flashcard').classList.remove('flipped');
    }

    function markMemory(isKnown) {
        playSfx('pop');
        memoryStatus[currentVocabIdx] = isKnown;
        if (currentVocabIdx < 13) {
            currentVocabIdx++;
            updateVocabCard();
        } else {
            showVocabSummary();
        }
    }

    function nextVocab() {
        if (currentVocabIdx < 13) {
            currentVocabIdx++;
            updateVocabCard();
        } else {
            showVocabSummary();
        }
    }

    function prevVocab() {
        if (currentVocabIdx > 0) {
            currentVocabIdx--;
            updateVocabCard();
        }
    }

    function showVocabSummary() {
        document.getElementById('vocab-game').style.display = 'none';
        document.getElementById('vocab-result').style.display = 'block';
        
        const knownItems = memoryStatus.filter(x => x === true).length;
        const unknownItems = 14 - knownItems;
        const knownPercent = Math.round((knownItems / 14) * 100);
        const unknownPercent = 100 - knownPercent;

        document.getElementById('res-percent-known').innerText = knownPercent + '%';
        document.getElementById('res-count-known').innerText = knownItems + ' từ';
        document.getElementById('res-percent-unknown').innerText = unknownPercent + '%';
        document.getElementById('res-count-unknown').innerText = unknownItems + ' từ';

        const listContainer = document.getElementById('review-list');
        listContainer.innerHTML = '';
        
        let hasUnknown = false;
        memoryStatus.forEach((status, idx) => {
            if (status === false || status === null) {
                hasUnknown = true;
                const v = vocabulary[idx];
                const div = document.createElement('div');
                div.className = 'review-item';
                div.innerHTML = `<span class="review-cn">${v.cn}</span> <span>${v.p} - ${v.vi}</span>`;
                listContainer.appendChild(div);
            }
        });

        if (!hasUnknown) {
            listContainer.innerHTML = '<p style="text-align:center; color: var(--success-color);">Tuyệt vời! Bạn đã thuộc hết từ vựng rồi! 🎉</p>';
        }
    }

    // --- GRAMMAR LOGIC (GIỮ NGUYÊN) ---
    function startGrammar() {
        playSfx('pop');
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('grammar-game').style.display = 'block';
        currentGrammarIdx = 0; score = 0;
        document.getElementById('score-val').innerText = '0';
        loadGrammarQuestion();
    }

    function loadGrammarQuestion() {
        const q = grammarQuestions[currentGrammarIdx];
        document.getElementById('grammar-current').innerText = currentGrammarIdx + 1;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('grammar-feedback').style.display = 'none';
        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('btn-next-q').style.display = 'none';
        document.getElementById('grammar-actions').style.display = 'flex';
        
        const ansZone = document.getElementById('ans-zone');
        const optGrid = document.getElementById('opt-grid');
        ansZone.innerHTML = ''; optGrid.innerHTML = '';
        selectedWords = [];

        if (q.type === 'SẮP XẾP') {
            ansZone.style.display = 'flex';
            [...q.opt].sort(() => Math.random() - 0.5).forEach(w => {
                const b = document.createElement('div'); b.className = 'option-card'; b.innerText = w;
                b.onclick = () => {
                    if(!b.classList.contains('selected')){
                        b.classList.add('selected'); selectedWords.push(w);
                        const tag = document.createElement('div'); tag.className = 'word-tag'; tag.innerText = w;
                        tag.onclick = (e) => { e.stopPropagation(); b.classList.remove('selected'); selectedWords = selectedWords.filter(x => x!==w); tag.remove(); };
                        ansZone.appendChild(tag);
                    }
                };
                optGrid.appendChild(b);
            });
        } else {
            ansZone.style.display = 'none';
            q.opt.forEach(w => {
                const b = document.createElement('div'); b.className = 'option-card'; b.innerText = w;
                b.onclick = () => { document.querySelectorAll('.option-card').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); selectedWords = [w]; };
                optGrid.appendChild(b);
            });
        }
        document.getElementById('grammar-progress').style.width = ((currentGrammarIdx + 1) / 20 * 100) + '%';
    }

    function checkGrammarAnswer() {
        const q = grammarQuestions[currentGrammarIdx];
        const userStr = selectedWords.join('').replace(/\s/g,'');
        const correctStr = q.ans.replace(/\s/g,'');
        const fb = document.getElementById('grammar-feedback');
        
        if(userStr === correctStr) {
            score += 5;
            fb.innerText = "Chính xác! 🎉"; fb.className = "feedback success";
            document.getElementById('explanation-text').innerText = q.exp;
            document.getElementById('explanation-box').style.display = 'block';
            document.getElementById('grammar-actions').style.display = 'none';
            document.getElementById('btn-next-q').style.display = 'block';
        } else {
            fb.innerText = "Sai rồi! Hãy thử lại nào 💪"; fb.className = "feedback error";
        }
        fb.style.display = 'block';
        document.getElementById('score-val').innerText = score;
    }

    function nextQuestion() {
        currentGrammarIdx++;
        if(currentGrammarIdx < grammarQuestions.length) loadGrammarQuestion();
        else alert("Hoàn thành bài tập!");
    }

    function resetGrammarAnswer() {
        selectedWords = [];
        document.getElementById('ans-zone').innerHTML = '';
        document.querySelectorAll('.option-card').forEach(x => x.classList.remove('selected'));
    }
</script>
</body>
</html>
