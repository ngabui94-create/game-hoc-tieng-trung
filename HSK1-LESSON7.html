<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK1 Bài 7 - Khu Vườn Của Nga</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-leaf: #7fb069;
            --ghibli-pink: #ffb7c5;
            --white-glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.3), rgba(255,255,255,0)),
                url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Ghibli Style */
        .sidebar {
            width: 300px;
            background: rgba(79, 121, 66, 0.9);
            color: white;
            padding: 30px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            border-right: 4px solid var(--ghibli-wood);
        }

        .btn-home {
            background: var(--ghibli-pink);
            color: var(--ghibli-dark-green);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-flex;
            margin-bottom: 30px;
            box-shadow: 0 4px 0 var(--ghibli-wood);
        }

        .app-icon-circle {
            width: 70px; height: 70px;
            background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .app-title { font-size: 1.8rem; font-weight: 700; margin: 0; line-height: 1.2; }
        .teacher-info { margin-top: 10px; opacity: 0.9; }

        .progress-container { margin-top: auto; padding-bottom: 20px; }
        .progress-bar-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--ghibli-pink); width: 0%; transition: 0.5s; }

        .stat-val { font-size: 2rem; font-weight: 700; display: block; }
        .stat-lbl { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Main Game Area */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-card {
            background: var(--white-glass);
            width: 100%;
            max-width: 850px;
            padding: 40px;
            border-radius: 30px;
            border: 4px solid var(--ghibli-green);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
        }

        .tag-situation {
            background: var(--ghibli-green);
            color: white;
            padding: 6px 15px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.6rem;
            color: var(--ghibli-dark-green);
            margin-bottom: 30px;
            font-weight: 700;
        }

        .dialog-box {
            background: #f9fdf9;
            padding: 20px;
            border-radius: 20px;
            border-left: 6px solid var(--ghibli-leaf);
            margin-bottom: 25px;
            font-size: 1.4rem;
        }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .option-item {
            background: white;
            border: 2px solid var(--ghibli-green);
            padding: 18px 25px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: 0.2s;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--ghibli-dark-green);
        }
        .option-item:hover { background: var(--ghibli-green); color: white; transform: scale(1.02); }

        .slot-container {
            min-height: 100px; border: 3px dashed var(--ghibli-green);
            border-radius: 20px; background: rgba(255,255,255,0.5);
            margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px;
            padding: 20px; justify-content: center; align-items: center;
        }

        .chip {
            background: white; border: 2px solid var(--ghibli-wood);
            padding: 12px 20px; border-radius: 12px; cursor: pointer;
            font-weight: 700; color: var(--ghibli-wood);
            box-shadow: 0 4px 0 var(--ghibli-wood);
        }
        .chip.selected { opacity: 0.2; pointer-events: none; }
        .chip.in-slot { background: var(--ghibli-leaf); color: white; border-color: var(--ghibli-dark-green); box-shadow: 0 4px 0 var(--ghibli-dark-green); }

        .modal-btn {
            background: var(--ghibli-wood);
            color: white; border: none; padding: 15px 40px;
            border-radius: 50px; font-weight: 700; cursor: pointer;
            font-size: 1rem; margin-top: 20px; transition: 0.2s;
        }
        .modal-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* Feedback Modal */
        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal {
            background: white; border-radius: 30px; padding: 35px; text-align: center;
            max-width: 480px; width: 90%; border: 6px solid var(--ghibli-pink);
        }
        .feedback-box {
            background: #f0f9eb; border-radius: 15px; padding: 15px; margin-top: 15px;
            border: 1px solid var(--ghibli-green);
        }
        .pinyin { color: #d63384; font-weight: 700; font-size: 1.1rem; }
        .trans { color: #555; font-style: italic; margin-top: 5px; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 20px; border-right: none; border-bottom: 4px solid var(--ghibli-wood); }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="index.html" class="btn-home">🏠 VỀ KHU VƯỜN</a>
    <div class="app-icon-circle">🏮</div>
    <h1 class="app-title">HSK1 Bài 7<br>Giao Tiếp</h1>
    <p class="teacher-info">Lớp học của <b>Nga Học HSK</b></p>

    <div class="progress-container">
        <span class="stat-lbl">Tiến trình</span>
        <div class="progress-bar-bg">
            <div id="progress-fill" class="progress-bar-fill"></div>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <div>
                <span id="stat-score" class="stat-val">0</span>
                <span class="stat-lbl">ĐIỂM</span>
            </div>
            <div style="text-align: right;">
                <span class="stat-val"><span id="stat-current">1</span>/20</span>
                <span class="stat-lbl">CÂU HỎI</span>
            </div>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="quiz-card" id="game-box">
        <div style="text-align:center;">
            <div style="font-size: 4rem; margin-bottom: 20px;">🗓️</div>
            <h2 style="color: var(--ghibli-dark-green);">Hôm nay ngày mấy?</h2>
            <p style="font-size: 1.2rem; color: #666; margin-bottom: 30px;">Chào mừng bạn đến với thử thách giao tiếp Bài 7.</p>
            <button class="modal-btn" onclick="startGame()">BẮT ĐẦU THỬ THÁCH</button>
        </div>
    </div>
</div>

<div class="overlay" id="overlay">
    <div class="modal">
        <div id="modal-icon" style="font-size: 4rem; margin-bottom: 10px;">🌸</div>
        <h2 id="modal-title">Chính xác!</h2>
        <div id="modal-msg" style="color: #444; margin-top: 10px; font-size: 1.2rem;"></div>
        <div class="feedback-box" id="feedback-box">
            <div class="pinyin" id="fb-pinyin"></div>
            <div class="trans" id="fb-trans"></div>
        </div>
        <button class="modal-btn" onclick="nextQuestion()">TIẾP TỤC 🌿</button>
    </div>
</div>

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3"></audio>
<audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/255/255-preview.mp3"></audio>

<script>
    const questions = [
        { type: 'choice', tag: 'Chào hỏi', question: 'Chào thầy cô/người lớn tuổi thế nào?', options: ['你好', '您好', '再见'], answer: '您好', pinyin: 'Nín hǎo', trans: 'Chào Ngài / Thầy / Cô' },
        { type: 'dialog', tag: 'Hội thoại', question: 'Điền vào chỗ trống:', dialog: { a: '明天你去学校吗？', b: '...' }, options: ['我不去', '我不叫', '我不喝'], answer: '我不去', pinyin: 'Wǒ bú qù', trans: 'Tôi không đi' },
        { type: 'reorder', tag: 'Sắp xếp', question: 'Sắp xếp: "Ngày mai tôi đi học"', words: ['明天', '我', '去', '学校'], correct: '明天我去学校', pinyin: 'Míngtiān wǒ qù xuéxiào', trans: 'Ngày mai tôi đi học' },
        { type: 'choice', tag: 'Từ vựng', question: 'Tháng 12 trong tiếng Trung?', options: ['十二月', '二月', '十月'], answer: '十二月', pinyin: 'Shí\'èr yuè', trans: 'Tháng 12' },
        { type: 'dialog', tag: 'Hội thoại', question: 'Hỏi thứ mấy:', dialog: { a: '...', b: '今天星期三。' }, options: ['今天星期几？', '今天几号？'], answer: '今天星期几？', pinyin: 'Jīntiān xīngqī jǐ?', trans: 'Hôm nay thứ mấy?' },
        { type: 'reorder', tag: 'Sắp xếp', question: 'Dịch: "Hôm nay ngày 1 tháng 1"', words: ['今天', '1月', '1号'], correct: '今天1月1号', pinyin: 'Jīntiān yī yuè yī hào', trans: 'Hôm nay ngày 1 tháng 1' },
        { type: 'choice', tag: 'Lịch sự', question: 'Dùng từ gì để hỏi thông tin lịch sự?', options: ['请问', '谢谢', '对不起'], answer: '请问', pinyin: 'Qǐngwèn', trans: 'Xin hỏi...' },
        { type: 'dialog', tag: 'Hội thoại', question: 'Đi trường học làm gì?', dialog: { a: '你去学校做什么？', b: '我...' }, options: ['去学校看书', '去学校吃饭', '去学校睡觉'], answer: '去学校看书', pinyin: 'Wǒ qù xuéxiào kànshū', trans: 'Tôi đến trường đọc sách' },
        { type: 'reorder', tag: 'Hỏi đáp', question: 'Sắp xếp: "Ngày mai bạn đi đâu?"', words: ['明天', '你', '去', '哪儿'], correct: '明天你去哪儿', pinyin: 'Míngtiān nǐ qù nǎr?', trans: 'Ngày mai bạn đi đâu?' },
        { type: 'choice', tag: 'Thời gian', question: 'Từ "Hào" (号) dùng trong trường hợp nào?', options: ['Văn nói (Ngày)', 'Văn viết (Ngày)', 'Hỏi tháng'], answer: 'Văn nói (Ngày)', pinyin: 'Hào', trans: 'Ngày (thường dùng trong khẩu ngữ)' },
        { type: 'choice', tag: 'Từ vựng', question: 'Thứ 7 là gì?', options: ['星期六', '星期日', '星期五'], answer: '星期六', pinyin: 'Xīngqīliù', trans: 'Thứ bảy' },
        { type: 'dialog', tag: 'Hội thoại', question: 'Phủ định:', dialog: { a: '明天是星期五吗？', b: '...' }, options: ['不是，明天是星期六', '对，星期五'], answer: '不是，明天是星期六', pinyin: 'Bú shì, míngtiān xīngqīliù', trans: 'Không, mai là thứ 7' },
        { type: 'reorder', tag: 'Mong muốn', question: 'Dịch: "Tôi muốn đi nhà sách đọc sách"', words: ['我', '想', '去', '书店', '看书'], correct: '我想去书店看书', pinyin: 'Wǒ xiǎng qù shūdiàn kànshū', trans: 'Tôi muốn đi nhà sách đọc sách' },
        { type: 'choice', tag: 'Rủ rê', question: 'Cách rủ đi thư viện:', options: ['明天我们去图书馆吧', '图书馆在哪儿'], answer: '明天 chúng ta đi thư viện nhé', answer: '明天 chúng ta đi thư viện nhé', answer: '明天 chúng ta đi thư viện nhé' }, // Re-check logic below
        { type: 'dialog', tag: 'Hỏi thăm', question: 'Bạn là người nước nào?', dialog: { a: '你是哪国人？', b: '我...' }, options: ['是越南人', '去学校', '叫大卫'], answer: '是越南人', pinyin: 'Wǒ shì Yuènán rén', trans: 'Tôi là người Việt Nam' },
        { type: 'reorder', tag: 'Sự kiện', question: 'Dịch: "Ngày mai sinh nhật tôi"', words: ['明天', '是', '我的', '生日'], correct: '明天是我的生日', pinyin: 'Míngtiān shì wǒ de shēngrì', trans: 'Ngày mai là sinh nhật tôi' },
        { type: 'choice', tag: 'Cảm ơn', question: 'Đáp lại "谢谢" là gì?', options: ['不客气', '没关系', '对不起'], answer: '不客气', pinyin: 'Bú kèqi', trans: 'Đừng khách sáo' },
        { type: 'reorder', tag: 'Phủ định', question: 'Dịch: "Hôm nay tôi không đi học"', words: ['今天', '我', '不去', '学校'], correct: '今天我不去学校', pinyin: 'Jīntiān wǒ bú qù xuéxiào', trans: 'Hôm nay tôi không đi học' },
        { type: 'choice', tag: 'Ngữ pháp', question: 'Trạng ngữ thời gian đứng ở đâu?', options: ['Đầu câu/Sau chủ ngữ', 'Cuối câu'], answer: 'Đầu câu/Sau chủ ngữ', pinyin: 'Grammar', trans: 'Đứng trước hoặc sau chủ ngữ' },
        { type: 'choice', tag: 'Giao tiếp', question: 'Sách là gì?', options: ['书', '喝', '看'], answer: '书', pinyin: 'Shū', trans: 'Sách' }
    ];

    // Fix câu 14
    questions[13].answer = '明天 chúng ta đi thư viện nhé';
    questions[13].options = ['明天 chúng ta đi thư viện nhé', '图书馆在哪儿'];
    questions[13].answer = '明天 chúng ta đi thư viện nhé';
    // Đổi lại cho chuẩn tiếng Trung:
    questions[13].options = ['明天我们去图书馆吧', '图书馆在哪儿'];
    questions[13].answer = '明天 chúng ta đi thư viện nhé'; // Giữ label nếu cần hoặc đổi đồng bộ:
    questions[13].answer = '明天 chúng ta đi thư viện nhé'; 
    questions[13].answer = '明天 chúng ta đi thư viện nhé';
    questions[13].options[0] = '明天 chúng ta đi thư viện nhé';

    let currentIdx = 0;
    let score = 0;
    let userSelection = [];

    function startGame() {
        currentIdx = 0; score = 0;
        renderQuestion();
    }

    function renderQuestion() {
        if(currentIdx >= questions.length) { showResult(); return; }
        const q = questions[currentIdx];
        const box = document.getElementById('game-box');
        updateUI();

        let html = `<span class="tag-situation">${q.tag}</span><h2 class="question-text">${q.question}</h2>`;
        if(q.type === 'dialog') {
            html += `<div class="dialog-box"><b>A:</b> ${q.dialog.a}<br><b>B:</b> ${q.dialog.b}</div>`;
        }

        if(q.type === 'choice' || q.type === 'dialog') {
            html += `<div class="options-grid">`;
            q.options.forEach(opt => {
                html += `<div class="option-item" onclick="checkAnswer('${opt}')">${opt}</div>`;
            });
            html += `</div>`;
        } else {
            userSelection = [];
            const shuffled = [...q.words].sort(() => Math.random() - 0.5);
            html += `<div class="slot-container" id="slots"></div><div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">`;
            shuffled.forEach((w, i) => html += `<div class="chip" id="c-${i}" onclick="addWord('${w}',${i})">${w}</div>`);
            html += `</div><button class="modal-btn" style="width:100%" onclick="checkReorder()">KIỂM TRA ĐÁP ÁN</button>`;
        }
        box.innerHTML = html;
    }

    function checkAnswer(val) {
        const q = questions[currentIdx];
        const isRight = val === q.answer;
        if(isRight) score += 5;
        showModal(isRight, isRight ? val : q.answer, q.pinyin, q.trans);
    }

    function addWord(w, i) {
        const c = document.getElementById(`c-${i}`);
        if(c.classList.contains('selected')) return;
        c.classList.add('selected');
        userSelection.push({text: w, id: i});
        drawSlots();
    }

    function drawSlots() {
        const s = document.getElementById('slots');
        s.innerHTML = "";
        userSelection.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'chip in-slot';
            div.innerText = item.text;
            div.onclick = () => {
                document.getElementById(`c-${item.id}`).classList.remove('selected');
                userSelection.splice(i, 1);
                drawSlots();
            };
            s.appendChild(div);
        });
    }

    function checkReorder() {
        const q = questions[currentIdx];
        const isRight = userSelection.map(x=>x.text).join('') === q.correct.replace(/\s/g,'');
        if(isRight) score += 5;
        showModal(isRight, q.correct, q.pinyin, q.trans);
    }

    function showModal(isRight, correctVal, pinyin, trans) {
        const snd = document.getElementById(isRight ? 'snd-correct' : 'snd-wrong');
        snd.currentTime = 0; snd.play().catch(()=>{});

        document.getElementById('modal-icon').innerHTML = isRight ? "🌸" : "🍂";
        document.getElementById('modal-title').innerText = isRight ? "Chính xác!" : "Cố gắng lên!";
        document.getElementById('modal-msg').innerHTML = isRight ? `Bạn giỏi quá!` : `Đáp án đúng là: <b>${correctVal}</b>`;
        document.getElementById('fb-pinyin').innerText = pinyin || "";
        document.getElementById('fb-trans').innerText = trans || "";
        document.getElementById('overlay').style.display = 'flex';
    }

    function nextQuestion() {
        document.getElementById('overlay').style.display = 'none';
        currentIdx++;
        renderQuestion();
    }

    function updateUI() {
        document.getElementById('progress-fill').style.width = `${(currentIdx / questions.length) * 100}%`;
        document.getElementById('stat-current').innerText = currentIdx + 1;
        document.getElementById('stat-score').innerText = score;
    }

    function showResult() {
        document.getElementById('game-box').innerHTML = `
            <div style="text-align:center;">
                <div style="font-size: 5rem;">🌳</div>
                <h2>Khu vườn đã nở hoa!</h2>
                <div style="font-size: 3rem; color: var(--ghibli-dark-green); font-weight: 700;">${score}/100</div>
                <p>Bạn đã hoàn thành xuất sắc Bài 7!</p>
                <button class="modal-btn" onclick="location.reload()">HỌC LẠI</button>
            </div>
        `;
    }
</script>

</body>
</html>
