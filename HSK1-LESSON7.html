<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tiếng Trung cùng Nga - Bài 7</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-leaf: #7fb069;
            --ghibli-pink: #ffb7c5;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky) url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.85);
            width: 100%;
            border-bottom: 5px solid var(--ghibli-green);
            backdrop-filter: blur(5px);
            position: relative;
            box-sizing: border-box;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 20px;
            text-decoration: none;
            background: var(--ghibli-wood);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* Status Bar: Điểm và Tiến trình */
        .status-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 650px;
            margin-top: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .progress-bar-bg {
            flex-grow: 1;
            height: 12px;
            background: #eee;
            border-radius: 10px;
            margin: 0 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--ghibli-leaf);
            transition: width 0.5s ease;
        }

        .score-text { font-weight: 600; color: var(--ghibli-dark-green); }

        /* Game Box */
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid var(--ghibli-green);
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            max-width: 650px;
            width: 90%;
            margin: 20px auto;
            box-shadow: 0 15px 30px rgba(79, 121, 66, 0.2);
        }

        #vietnamese-hint {
            font-size: 1.2rem;
            color: var(--ghibli-wood);
            font-weight: 600;
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 2px dashed var(--ghibli-pink);
        }

        /* Slot Styling */
        .slot-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            min-height: 80px;
            margin: 20px 0;
            padding: 15px;
            background-color: rgba(157, 193, 131, 0.1);
            border-radius: 15px;
        }

        .slot {
            min-width: 80px;
            height: 65px;
            border-bottom: 4px solid var(--ghibli-leaf);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .slot .pinyin { font-size: 0.8rem; color: #666; }
        .slot .hanzi { font-size: 1.4rem; font-weight: bold; color: var(--ghibli-dark-green); }

        /* Word Seed Styling */
        .word-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 25px 0;
        }

        .word-seed {
            background-color: white;
            border: 2px solid var(--ghibli-leaf);
            border-radius: 15px;
            padding: 8px 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .word-seed:hover { transform: translateY(-3px); border-color: var(--ghibli-dark-green); }
        .word-seed .pinyin { font-size: 0.75rem; color: #777; }
        .word-seed .hanzi { font-size: 1.2rem; font-weight: 600; color: #333; }

        .controls button {
            background-color: var(--ghibli-dark-green);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .controls button:disabled { background-color: #ccc; cursor: not-allowed; }

        #feedback { margin-top: 15px; font-weight: 600; font-size: 1.1rem; }
        #tree-growth { font-size: 4rem; margin-top: 10px; }

        footer { margin-top: auto; padding: 20px; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">⬅ Trở về</a>
    <h1>Bài 7: 今天几号？ 🗓️</h1>
</header>

<div class="status-container">
    <span class="score-text">Điểm: <span id="score">0</span></span>
    <div class="progress-bar-bg"><div id="progress-fill" class="progress-fill"></div></div>
    <span class="score-text" id="level-indicator">Câu 1/5</span>
</div>

<div class="game-container">
    <div id="vietnamese-hint">Đang tải...</div>
    <div id="drop-zone" class="slot-container"></div>
    <div id="word-bank" class="word-container"></div>

    <div class="controls">
        <button id="check-btn" onclick="checkSentence()">Kiểm tra ✨</button>
        <button id="next-btn" onclick="nextLevel()" style="display:none;">Câu tiếp theo 🌿</button>
    </div>
    
    <div id="feedback"></div>
    <div id="tree-growth">🪴</div>
</div>

<footer>© 2026 - Khu Vườn Tiếng Trung của Nga</footer>

<audio id="sound-click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_790b1e60b4.mp3"></audio>
<audio id="sound-win" src="https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3"></audio>
<audio id="sound-wrong" src="https://cdn.pixabay.com/audio/2022/03/24/audio_eb3ee10eb8.mp3"></audio>

<script>
    const levels = [
        {
            hint: "Dịch: Ngày mai là thứ tư.",
            correct: ["明天", "星期三"],
            words: [
                {h: "明天", p: "míngtiān"}, 
                {h: "星期三", p: "xīngqīsān"}, 
                {h: "昨天", p: "zuótiān"}, 
                {h: "号", p: "hào"}
            ]
        },
        {
            hint: "Dịch: Tôi đi đến trường đọc sách.",
            correct: ["我", "去", "学校", "看书"],
            words: [
                {h: "学校", p: "xuéxiào"}, 
                {h: "我", p: "wǒ"}, 
                {h: "去", p: "qù"}, 
                {h: "看书", p: "kànshū"}, 
                {h: "问", p: "wèn"}
            ]
        },
        {
            hint: "Dịch: Hôm nay là ngày 1 tháng 9.",
            correct: ["今天", "9月", "1号"],
            words: [
                {h: "1号", p: "yī hào"}, 
                {h: "今天", p: "jīntiān"}, 
                {h: "9月", p: "jiǔyuè"}, 
                {h: "明天", p: "míngtiān"}
            ]
        },
        {
            hint: "Dịch: Xin hỏi, hôm nay ngày mấy?",
            correct: ["请", "问", "今天", "几号"],
            words: [
                {h: "问", p: "wèn"}, 
                {h: "今天", p: "jīntiān"}, 
                {h: "几号", p: "jǐ hào"}, 
                {h: "请", p: "qǐng"}, 
                {h: "去", p: "qù"}
            ]
        },
        {
            hint: "Dịch: Tôi đi Trung Quốc học tiếng Hán.",
            correct: ["我", "去", "中国", "学习", "汉语"],
            words: [
                {h: "我", p: "wǒ"}, 
                {h: "去", p: "qù"}, 
                {h: "中国", p: "Zhōngguó"}, 
                {h: "学习", p: "xuéxí"}, 
                {h: "汉语", p: "Hànyǔ"},
                {h: "看", p: "kàn"}
            ]
        }
    ];

    let currentLevel = 0;
    let score = 0;
    const sfxClick = document.getElementById('sound-click');
    const sfxWin = document.getElementById('sound-win');
    const sfxWrong = document.getElementById('sound-wrong');

    function playSfx(audio) {
        audio.currentTime = 0;
        audio.play().catch(() => {});
    }

    function initLevel() {
        const level = levels[currentLevel];
        document.getElementById('vietnamese-hint').innerText = level.hint;
        document.getElementById('feedback').innerText = "";
        document.getElementById('level-indicator').innerText = `Câu ${currentLevel + 1}/${levels.length}`;
        document.getElementById('progress-fill').style.width = `${(currentLevel / levels.length) * 100}%`;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('check-btn').style.display = 'inline-block';
        document.getElementById('tree-growth').innerText = "🪴";

        const wordBank = document.getElementById('word-bank');
        const dropZone = document.getElementById('drop-zone');
        wordBank.innerHTML = '';
        dropZone.innerHTML = '';

        // Tạo slot trống
        level.correct.forEach(() => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.onclick = () => returnToBank(slot);
            dropZone.appendChild(slot);
        });

        // Tạo hạt giống từ vựng kèm Pinyin
        const shuffled = [...level.words].sort(() => Math.random() - 0.5);
        shuffled.forEach((wordObj, index) => {
            const seed = document.createElement('div');
            seed.className = 'word-seed';
            seed.id = `seed-${index}`;
            seed.innerHTML = `<span class="pinyin">${wordObj.p: ""}</span><span class="hanzi">${wordObj.h}</span>`;
            seed.onclick = () => moveToSlot(seed, wordObj);
            wordBank.appendChild(seed);
        });
    }

    function moveToSlot(seed, wordObj) {
        const emptySlot = Array.from(document.querySelectorAll('.slot')).find(s => s.innerText === '');
        if (emptySlot) {
            playSfx(sfxClick);
            emptySlot.innerHTML = `<span class="pinyin">${wordObj.p}</span><span class="hanzi">${wordObj.h}</span>`;
            emptySlot.dataset.seedId = seed.id;
            seed.style.visibility = 'hidden';
            seed.style.pointerEvents = 'none';
        }
    }

    function returnToBank(slot) {
        if (slot.innerText !== '') {
            playSfx(sfxClick);
            const seedId = slot.dataset.seedId;
            const originalSeed = document.getElementById(seedId);
            if (originalSeed) {
                originalSeed.style.visibility = 'visible';
                originalSeed.style.pointerEvents = 'auto';
            }
            slot.innerHTML = '';
            delete slot.dataset.seedId;
        }
    }

    function checkSentence() {
        const slots = document.querySelectorAll('.slot');
        const userAnswers = Array.from(slots).map(s => s.querySelector('.hanzi')?.innerText || "");
        const correctAnswers = levels[currentLevel].correct;

        if (userAnswers.includes("")) {
            playSfx(sfxWrong);
            document.getElementById('feedback').innerText = "⚠️ Đừng bỏ trống ô nào nhé!";
            return;
        }

        if (JSON.stringify(userAnswers) === JSON.stringify(correctAnswers)) {
            playSfx(sfxWin);
            score += 20;
            document.getElementById('score').innerText = score;
            document.getElementById('feedback').innerHTML = "<span style='color:green'>✅ Xuất sắc! +20 điểm</span>";
            document.getElementById('tree-growth').innerText = "🌳";
            document.getElementById('check-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'inline-block';
            
            if (currentLevel === levels.length - 1) {
                document.getElementById('next-btn').innerText = "Hoàn thành vườn 🏆";
                document.getElementById('progress-fill').style.width = "100%";
            }
        } else {
            playSfx(sfxWrong);
            document.getElementById('feedback').innerHTML = "<span style='color:red'>❌ Sai thứ tự rồi, thử lại nhé!</span>";
        }
    }

    function nextLevel() {
        if (currentLevel < levels.length - 1) {
            currentLevel++;
            initLevel();
        } else {
            alert(`Chúc mừng Nga! Bạn đã hoàn thành bài học với ${score} điểm!`);
            location.reload();
        }
    }

    window.onload = initLevel;
</script>
</body>
</html>
