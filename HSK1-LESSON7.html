<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Tiếng Trung - Nuôi Cây HSK</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-leaf: #7fb069;
            --ghibli-pink: #ffb7c5;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky) url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            text-align: center; padding: 15px;
            background: rgba(255, 255, 255, 0.85);
            width: 100%; border-bottom: 5px solid var(--ghibli-green);
            backdrop-filter: blur(5px); position: relative; z-index: 10;
        }

        .back-btn {
            position: absolute; left: 15px; top: 15px;
            text-decoration: none; background: var(--ghibli-wood);
            color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem;
        }

        /* Layout Chính */
        .main-layout {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            width: 95%;
            max-width: 1100px;
            margin: 20px auto;
        }

        /* Khung Game */
        .game-side { flex: 2; max-width: 650px; }
        
        /* Khung Cây */
        .tree-side {
            flex: 1;
            background: rgba(255, 255, 255, 0.7);
            border: 3px solid white;
            border-radius: 25px;
            height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 40px;
            position: sticky;
            top: 100px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .status-bar {
            background: white; padding: 10px 20px; border-radius: 50px;
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .progress-bg { flex-grow: 1; height: 10px; background: #eee; border-radius: 10px; margin: 0 15px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--ghibli-leaf); transition: 0.4s; }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid var(--ghibli-green); border-radius: 25px;
            padding: 20px; text-align: center; box-shadow: 0 15px 30px rgba(79, 121, 66, 0.2);
            min-height: 420px; display: flex; flex-direction: column;
        }

        #hint-box {
            font-size: 1.1rem; color: var(--ghibli-wood); font-weight: 600;
            margin-bottom: 15px; padding: 12px; border-radius: 12px;
            background: rgba(255, 183, 197, 0.1); border: 2px dashed var(--ghibli-pink);
        }

        .question-display { font-size: 1.8rem; font-weight: bold; margin: 20px 0; color: #333; }

        .slot-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; min-height: 80px; margin-bottom: 20px; }
        .slot {
            min-width: 75px; height: 70px; border-bottom: 4px solid var(--ghibli-leaf);
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        .slot.filled { background: var(--ghibli-sky); border-radius: 10px 10px 0 0; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .word-seed {
            background: white; border: 2px solid var(--ghibli-leaf); border-radius: 15px; padding: 10px;
            cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.2s;
        }
        .word-seed:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .word-seed .pinyin { font-size: 0.75rem; color: #777; }
        .word-seed .hanzi { font-size: 1.3rem; font-weight: 600; }

        /* Hiệu ứng Cái Cây */
        #the-tree { font-size: 100px; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: default; user-select: none; }
        #watering-can {
            font-size: 40px; position: absolute; top: 20%; right: -50px;
            transition: 0.5s; opacity: 0;
        }
        .watering #watering-can { right: 20%; opacity: 1; transform: rotate(-20deg); }

        .controls button {
            background: var(--ghibli-dark-green); color: white; border: none;
            padding: 12px 30px; border-radius: 25px; font-weight: 600; cursor: pointer; margin-top: auto;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-8px);} 75% {transform: translateX(8px);} }

        @media (max-width: 800px) {
            .main-layout { flex-direction: column; }
            .tree-side { width: 100%; height: 200px; position: static; order: -1; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">⬅ Về Vườn</a>
    <h1>Bài 7: Gieo Mầm Thời Gian 🗓️</h1>
</header>

<div class="main-layout">
    <div class="game-side">
        <div class="status-bar">
            <span class="score-text">Điểm: <span id="score">0</span></span>
            <div class="progress-bg"><div id="progress-fill" class="progress-fill"></div></div>
            <span id="level-indicator" class="score-text">1/30</span>
        </div>

        <div class="game-container" id="game-box">
            <div id="hint-box">Đang chuẩn bị hạt giống...</div>
            <div id="question-area" class="question-display"></div>
            <div id="drop-zone" class="slot-container"></div>
            <div id="word-bank" class="options-grid"></div>
            <div class="controls"><button id="main-btn" onclick="handleButtonClick()">Kiểm tra ✨</button></div>
            <div id="feedback" style="margin-top:10px; font-weight:600; height:20px;"></div>
        </div>
    </div>

    <div class="tree-side" id="tree-container">
        <div id="watering-can">🚿</div>
        <div id="the-tree">🌱</div>
        <div style="font-weight: 600; color: var(--ghibli-dark-green); margin-top: 10px;">Cây của Nga</div>
    </div>
</div>

<audio id="sfx-click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_790b1e60b4.mp3"></audio>
<audio id="sfx-win" src="https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3"></audio>
<audio id="sfx-wrong" src="https://cdn.pixabay.com/audio/2022/03/24/audio_eb3ee10eb8.mp3"></audio>

<script>
    const levels = [
        { type: "scramble", hint: "Dịch: Ngày mai là thứ tư.", correct: ["明天", "星期三"], options: [{h:"明天",p:"míngtiān"},{h:"星期三",p:"xīngqīsān"},{h:"昨天",p:"zuótiān"},{h:"号",p:"hào"}] },
        { type: "choice", hint: "Chọn từ đúng: Hôm nay ngày 5 tháng 9.", q: "今天9月____。", correct: "5号", options: ["5号", "5月", "星期五", "昨天"] },
        { type: "pinyin", hint: "Pinyin đúng cho: 学校", q: "学校", correct: "xuéxiào", options: ["xuéxiào", "xuěxiào", "xuéxiǎo", "xuéxiáo"] },
        { type: "hanzi", hint: "Chữ Hán của 'Trung Quốc' là gì?", q: "Zhōngguó", correct: "中国", options: ["中国", "国中", "中医", "学校"] },
        { type: "scramble", hint: "Dịch: Tôi đi trường học xem sách.", correct: ["我", "去", "学校", "看书"], options: [{h:"我",p:"wǒ"},{h:"去",p:"qù"},{h:"学校",p:"xuéxiào"},{h:"看书",p:"kànshū"}] },
        { type: "choice", hint: "Xin hỏi, hôm nay ngày mấy?", q: "请问，今天____？", correct: "几号", options: ["几号", "几月", "星期几", "什么"] },
        { type: "pinyin", hint: "Pinyin của 'Thứ/Tuần':", q: "星期", correct: "xīngqī", options: ["xīngqī", "xíngqī", "xǐngqī", "xìngqī"] },
        { type: "choice", hint: "Hôm qua là thứ sáu.", q: "____星期五。", correct: "昨天", options: ["昨天", "明天", "今天", "月"] },
        { type: "hanzi", hint: "Chữ Hán của 'Thứ bảy':", q: "xīngqīliù", correct: "星期六", options: ["星期六", "星期五", "星期天", "星期日"] },
        { type: "scramble", hint: "Dịch: Bạn đi đâu?", correct: ["你", "去", "哪儿"], options: [{h:"你",p:"nǐ"},{h:"去",p:"qù"},{h:"哪儿",p:"nǎr"}] },
        { type: "choice", hint: "Hôm nay là ____ tháng 1.", q: "今天____1月。", correct: "是", options: ["是", "去", "叫", "看"] },
        { type: "pinyin", hint: "Pinyin 'Đọc sách':", q: "看书", correct: "kànshū", options: ["kànshū", "kānshū", "kànshǔ", "kànshú"] },
        { type: "hanzi", hint: "Chữ Hán 'Tháng 10':", q: "shíyuè", correct: "10月", options: ["10月", "10号", "10日", "12月"] },
        { type: "scramble", hint: "Dịch: Hôm nay là thứ mấy?", correct: ["今天", "星期几"], options: [{h:"今天",p:"jīntiān"},{h:"星期几",p:"xīngqījǐ"},{h:"几号",p:"jǐ hào"}] },
        { type: "choice", hint: "Tôi ____ nhà bạn uống trà.", q: "我____朋友家喝茶。", correct: "去", options: ["去", "是", "叫", "在"] },
        { type: "pinyin", hint: "Pinyin 'Hôm qua':", q: "昨天", correct: "zuótiān", options: ["zuótiān", "zuōtiān", "zuòtiān", "zuǒtiān"] },
        { type: "hanzi", hint: "Chữ Hán 'Xin hỏi':", q: "qǐngwèn", correct: "请问", options: ["请问", "请教", "问请", "叫请"] },
        { type: "scramble", hint: "Dịch: Ngày mai là ngày 1 tháng 9.", correct: ["明天", "9月", "1号"], options: [{h:"明天",p:"míngtiān"},{h:"9月",p:"jiǔyuè"},{h:"1号",p:"yī hào"}] },
        { type: "choice", hint: "Bạn ____ tên là gì?", q: "你____什么名字？", correct: "叫", options: ["叫", "是", "去", "看"] },
        { type: "pinyin", hint: "Pinyin 'Ở đâu/Chỗ nào':", q: "哪儿", correct: "nǎr", options: ["nǎr", "nàr", "nár", "nā"] },
        { type: "hanzi", hint: "Chữ Hán 'Hôm nay':", q: "jīntiān", correct: "今天", options: ["今天", "明天", "昨天", "哪儿"] },
        { type: "scramble", hint: "Dịch: Tôi đi Trung Quốc học tiếng Hán.", correct: ["我", "去", "中国", "学习", "汉语"], options: [{h:"我",p:"wǒ"},{h:"去",p:"qù"},{h:"中国",p:"Zhōngguó"},{h:"学习",p:"xuéxí"},{h:"汉语",p:"Hànyǔ"}] },
        { type: "choice", hint: "Ngày mai là thứ ____ (Chủ nhật)", q: "明天是星期____。", correct: "天", options: ["天", "六", "五", "七"] },
        { type: "pinyin", hint: "Pinyin 'Cảm ơn':", q: "谢谢", correct: "xièxie", options: ["xièxie", "xiéxié", "xièxiè", "xiéxie"] },
        { type: "hanzi", hint: "Chữ Hán 'Ngày mai':", q: "míngtiān", correct: "明天", options: ["明天", "今天", "昨天", "学校"] },
        { type: "scramble", hint: "Dịch: Cô ấy là giáo viên của tôi.", correct: ["她", "是", "我的", "老师"], options: [{h:"她",p:"tā"},{h:"是",p:"shì"},{h:"我的",p:"wǒde"},{h:"老师",p:"lǎoshī"}] },
        { type: "choice", hint: "Tôi không đi ____.", q: "我不去____。", correct: "学校", options: ["学校", "看书", "汉语", "中国"] },
        { type: "pinyin", hint: "Pinyin 'Giáo viên':", q: "老师", correct: "lǎoshī", options: ["lǎoshī", "lǎoshì", "láoshī", "lāoshī"] },
        { type: "hanzi", hint: "Chữ Hán 'Tạm biệt':", q: "zàijiàn", correct: "再见", options: ["再见", "再看", "见再", "你好"] },
        { type: "scramble", hint: "Dịch: Thứ hai tôi đi làm.", correct: ["星期一", "我", "去", "工作"], options: [{h:"星期一",p:"xīngqīyī"},{h:"工作",p:"gōngzuò"},{h:"我",p:"wǒ"},{h:"去",p:"qù"}] }
    ];

    let currentLevel = 0;
    let score = 0;
    let treeGrowth = 1; // 1 to 10
    let isCorrect = false;

    const treeStages = ["🌱", "🌿", "🍀", "🪴", "🌳", "🌳", "🌲", "🌲", "🌸", "🌸"];

    function playSfx(id) {
        const s = document.getElementById(id);
        s.currentTime = 0; s.play().catch(()=>{});
    }

    function updateTree(isWin) {
        const treeImg = document.getElementById('the-tree');
        const container = document.getElementById('tree-container');

        if (isWin) {
            treeGrowth = Math.min(10, treeGrowth + 1);
            container.classList.add('watering');
            setTimeout(() => container.classList.remove('watering'), 1000);
        } else {
            treeGrowth = Math.max(1, treeGrowth - 1);
        }

        const stageIdx = Math.floor((treeGrowth - 1));
        treeImg.innerText = treeStages[stageIdx] || "🌳";
        treeImg.style.transform = `scale(${0.5 + treeGrowth * 0.15})`;
        
        if (treeGrowth < 3) treeImg.style.filter = "grayscale(0.5)";
        else treeImg.style.filter = "none";
    }

    function initLevel() {
        const lv = levels[currentLevel];
        const wordBank = document.getElementById('word-bank');
        const dropZone = document.getElementById('drop-zone');
        const qArea = document.getElementById('question-area');
        
        isCorrect = false;
        document.getElementById('hint-box').innerText = lv.hint;
        document.getElementById('feedback').innerText = "";
        document.getElementById('main-btn').innerText = "Kiểm tra ✨";
        document.getElementById('main-btn').style.background = "var(--ghibli-dark-green)";
        document.getElementById('level-indicator').innerText = `${currentLevel + 1}/${levels.length}`;
        document.getElementById('progress-fill').style.width = `${(currentLevel / levels.length) * 100}%`;

        wordBank.innerHTML = ''; dropZone.innerHTML = ''; qArea.innerHTML = '';

        if (lv.type === "scramble") {
            qArea.style.display = "none"; dropZone.style.display = "flex";
            lv.correct.forEach(() => {
                const s = document.createElement('div');
                s.className = 'slot';
                s.innerHTML = `<span style="font-size:0.7rem;color:#777"></span><span class="hz" style="font-size:1.4rem;font-weight:bold"></span>`;
                s.onclick = () => {
                    if (s.querySelector('.hz').innerText !== "") {
                        playSfx('sfx-click');
                        const origin = document.getElementById(s.dataset.originId);
                        origin.style.visibility = "visible"; origin.style.pointerEvents = "auto";
                        s.querySelector('span').innerText = ""; s.querySelector('.hz').innerText = "";
                        s.classList.remove('filled');
                    }
                };
                dropZone.appendChild(s);
            });

            [...lv.options].sort(() => Math.random() - 0.5).forEach((opt, i) => {
                const b = document.createElement('div');
                b.className = 'word-seed'; b.id = `opt-${i}`;
                b.innerHTML = `<span class="pinyin">${opt.p}</span><span class="hanzi">${opt.h}</span>`;
                b.onclick = () => {
                    const empty = Array.from(document.querySelectorAll('.slot')).find(s => s.querySelector('.hz').innerText === "");
                    if (empty) {
                        playSfx('sfx-click');
                        empty.querySelector('span').innerText = opt.p;
                        empty.querySelector('.hz').innerText = opt.h;
                        empty.classList.add('filled');
                        empty.dataset.originId = b.id;
                        b.style.visibility = "hidden"; b.style.pointerEvents = "none";
                    }
                };
                wordBank.appendChild(b);
            });
        } else {
            qArea.style.display = "block"; qArea.innerText = lv.q; dropZone.style.display = "none";
            [...lv.options].sort(() => Math.random() - 0.5).forEach(opt => {
                const b = document.createElement('div');
                b.className = 'word-seed'; b.innerHTML = `<span class="hanzi">${opt}</span>`;
                b.onclick = () => {
                    if (isCorrect) return;
                    if (opt === lv.correct) { handleWin(); b.style.background = "#9dc183"; }
                    else { handleLoss(); b.style.background = "#ffb7c5"; }
                };
                wordBank.appendChild(b);
            });
        }
    }

    function handleWin() {
        if (isCorrect) return;
        playSfx('sfx-win');
        score += 20; isCorrect = true;
        document.getElementById('score').innerText = score;
        document.getElementById('feedback').innerHTML = "<span style='color:green'>Chính xác! Cây đang lớn lên! 🚿</span>";
        document.getElementById('main-btn').innerText = "Tiếp theo ➔";
        document.getElementById('main-btn').style.background = "var(--ghibli-leaf)";
        updateTree(true);
    }

    function handleLoss() {
        playSfx('sfx-wrong');
        score = Math.max(-500, score - 10);
        document.getElementById('score').innerText = score;
        document.getElementById('game-box').classList.add('shake');
        setTimeout(() => document.getElementById('game-box').classList.remove('shake'), 400);
        document.getElementById('feedback').innerHTML = "<span style='color:red'>Sai rồi! Cây bị héo đi một chút... 🥀</span>";
        updateTree(false);
    }

    function handleButtonClick() {
        if (isCorrect) {
            currentLevel++;
            if (currentLevel < levels.length) initLevel();
            else { alert("Cây đã nở hoa rực rỡ! Nga thật tuyệt vời!"); location.reload(); }
            return;
        }
        if (levels[currentLevel].type === "scramble") {
            const user = Array.from(document.querySelectorAll('.slot')).map(s => s.querySelector('.hz').innerText);
            if (JSON.stringify(user) === JSON.stringify(levels[currentLevel].correct)) handleWin();
            else handleLoss();
        }
    }

    window.onload = initLevel;
</script>
</body>
</html>
