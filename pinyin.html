<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Pinyin Yoyo Style - Nga Học HSK</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark: #4f7942;
            --accent-pink: #ffb7c5;
        }
        body { font-family: 'Quicksand', sans-serif; background: #fdfcf0; margin: 0; padding: 5px; }
        .back-btn { text-decoration: none; color: white; background: var(--ghibli-green); padding: 5px 15px; border-radius: 15px; font-weight: bold; display: inline-block; margin: 5px; box-shadow: 0 2px 0 var(--ghibli-dark); font-size: 0.8rem; }
        h1 { text-align: center; color: var(--ghibli-dark); font-size: 1.2rem; margin: 5px 0; }

        .table-container {
            width: 100%;
            max-height: 88vh;
            overflow: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: white;
        }

        table { border-collapse: separate; border-spacing: 0; }
        
        thead th {
            position: sticky; top: 0; z-index: 10;
            background: var(--ghibli-green); color: white;
            padding: 4px 2px; font-size: 1.4rem; 
            border: 1px solid #ffffff33;
            min-width: 40px; 
        }
        
        .final-header {
            position: sticky; left: 0; z-index: 11;
            background: #eef2ed !important; color: var(--ghibli-dark);
            font-weight: bold; padding: 4px 6px;
            font-size: 1.4rem; border: 1px solid #ddd;
            text-align: left;
        }

        td {
            padding: 4px 2px; 
            text-align: center; border: 0.5px solid #eee;
            font-size: 1.35rem; min-width: 42px;
        }

        tr:nth-child(even) td { background-color: #fafdfa; }

        .syllable { cursor: pointer; color: #222; font-weight: 600; white-space: nowrap; }
        .syllable:hover, .syllable.active { background: var(--accent-pink) !important; color: white; border-radius: 3px; }
        
        .empty { color: #f2f2f2; pointer-events: none; font-size: 0.8rem; }

        #toneMenu {
            display: none; position: fixed; background: white;
            border: 2px solid var(--ghibli-green); border-radius: 8px;
            padding: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 1000;
        }
        .tone-grid { display: flex; gap: 5px; }
        .t-btn { 
            border: none; background: #f0f0f0; padding: 8px 12px; 
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.1rem; 
            transition: 0.1s;
        }
        .t-btn:hover { background: var(--ghibli-green); color: white; }
        .t-btn:active { transform: scale(0.9); background: var(--ghibli-dark); } /* Hiệu ứng lún xuống khi bấm */
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ VỀ VƯỜN</a>
    <h1>Bảng Pinyin Đầy Đủ (400+ Âm) 🎹</h1>

    <div class="table-container">
        <table id="pinyinMainTable">
            <thead>
                <tr id="initialHeaders">
                    <th class="final-header">V\T</th>
                </tr>
            </thead>
            <tbody id="pinyinBody"></tbody>
        </table>
    </div>

    <div id="toneMenu">
        <div id="toneLabel" style="text-align:center; font-size: 1.1rem; font-weight:bold; margin-bottom:5px; color:var(--ghibli-dark)"></div>
        <div class="tone-grid">
            <button class="t-btn" onclick="playSyllable(1)">1</button>
            <button class="t-btn" onclick="playSyllable(2)">2</button>
            <button class="t-btn" onclick="playSyllable(3)">3</button>
            <button class="t-btn" onclick="playSyllable(4)">4</button>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const initials = ['', 'b', 'p', 'm', 'f', 'd', 't', 'n', 'l', 'g', 'k', 'h', 'j', 'q', 'x', 'zh', 'ch', 'sh', 'r', 'z', 'c', 's'];
        const finals = [
            'a', 'o', 'e', 'ai', 'ei', 'ao', 'ou', 'an', 'en', 'ang', 'eng', 'er',
            'i', 'ia', 'iao', 'ie', 'iu', 'ian', 'in', 'iang', 'ing', 'iong',
            'u', 'ua', 'uo', 'uai', 'ui', 'uan', 'un', 'uang', 'ueng',
            'ü', 'üe', 'üan', 'ün'
        ];

        // Đã cập nhật đủ hơn 400 âm tiết chuẩn xác
        const validData = new Set([
            'a', 'o', 'e', 'ai', 'ei', 'ao', 'ou', 'an', 'en', 'ang', 'eng', 'er',
            'ba', 'bo', 'bai', 'bei', 'bao', 'ban', 'ben', 'bang', 'beng', 'bi', 'biao', 'bie', 'bian', 'bin', 'bing',
            'pa', 'po', 'pai', 'pei', 'pao', 'pou', 'pan', 'pen', 'pang', 'peng', 'pi', 'piao', 'pie', 'pian', 'pin', 'ping',
            'ma', 'mo', 'me', 'mai', 'mei', 'mao', 'mou', 'man', 'men', 'mang', 'meng', 'mi', 'miao', 'mie', 'miu', 'mian', 'min', 'ming',
            'fa', 'fo', 'fei', 'fou', 'fan', 'fen', 'fang', 'feng',
            'da', 'de', 'dai', 'dei', 'dao', 'dou', 'dan', 'den', 'dang', 'deng', 'dong', 'di', 'diao', 'die', 'diu', 'dian', 'ding', 'du', 'duo', 'dui', 'duan', 'dun',
            'ta', 'te', 'tai', 'tao', 'tou', 'tan', 'tang', 'teng', 'tong', 'ti', 'tiao', 'tie', 'tian', 'ting', 'tu', 'tuo', 'tui', 'tuan', 'tun',
            'na', 'ne', 'nai', 'nei', 'nao', 'nou', 'nan', 'nen', 'nang', 'neng', 'nong', 'ni', 'niao', 'nie', 'niu', 'nian', 'nin', 'niang', 'ning', 'nu', 'nuo', 'nuan', 'nü', 'nüe',
            'la', 'le', 'lai', 'lei', 'lao', 'lou', 'lan', 'lang', 'leng', 'long', 'li', 'lia', 'liao', 'lie', 'liu', 'lian', 'lin', 'liang', 'ling', 'lu', 'luo', 'luan', 'lun', 'lü', 'lüe',
            'ga', 'ge', 'gai', 'gei', 'gao', 'gou', 'gan', 'gen', 'gang', 'geng', 'gong', 'gu', 'gua', 'guo', 'guai', 'gui', 'guan', 'gun', 'guang',
            'ka', 'ke', 'kai', 'kei', 'kao', 'kou', 'kan', 'ken', 'kang', 'keng', 'kong', 'ku', 'kua', 'kuo', 'kuai', 'kui', 'kuan', 'kun', 'kuang',
            'ha', 'he', 'hai', 'hei', 'hao', 'hou', 'han', 'hen', 'hang', 'heng', 'hong', 'hu', 'hua', 'huo', 'huai', 'hui', 'huan', 'hun', 'huang',
            'zha', 'zhe', 'zhi', 'zhai', 'zhei', 'zhao', 'zhou', 'zhan', 'zhen', 'zhang', 'zheng', 'zhong', 'zhu', 'zhua', 'zhuo', 'zhuai', 'zhui', 'zhuan', 'zhun', 'zhuang',
            'cha', 'che', 'chi', 'chai', 'chao', 'chou', 'chan', 'chen', 'chang', 'cheng', 'chong', 'chu', 'chua', 'chuo', 'chuai', 'chui', 'chuan', 'chun', 'chuang',
            'sha', 'she', 'shi', 'shai', 'shei', 'shao', 'shou', 'shan', 'shen', 'shang', 'sheng', 'shu', 'shua', 'shuo', 'shuai', 'shui', 'shuan', 'shun', 'shuang',
            're', 'ri', 'rao', 'rou', 'ran', 'ren', 'rang', 'reng', 'rong', 'ru', 'ruo', 'rui', 'ruan', 'run',
            'za', 'ze', 'zi', 'zai', 'zei', 'zao', 'zou', 'zan', 'zen', 'zang', 'zeng', 'zong', 'zu', 'zuo', 'zui', 'zuan', 'zun',
            'ca', 'ce', 'ci', 'cai', 'cao', 'cou', 'can', 'cen', 'cang', 'ceng', 'cong', 'cu', 'cuo', 'cui', 'cuan', 'cun',
            'sa', 'se', 'si', 'sai', 'sao', 'sou', 'san', 'sen', 'sang', 'seng', 'song', 'su', 'suo', 'sui', 'suan', 'sun',
            'ji', 'jia', 'jiao', 'jie', 'jiu', 'jian', 'jin', 'jiang', 'jing', 'jiong', 'ju', 'jue', 'juan', 'jun',
            'qi', 'qia', 'qiao', 'qie', 'qiu', 'qian', 'qin', 'qiang', 'qing', 'qiong', 'qu', 'que', 'quan', 'qun',
            'xi', 'xia', 'xiao', 'xie', 'xiu', 'xian', 'xin', 'xiang', 'xing', 'xiong', 'xu', 'xue', 'xuan', 'xun',
            'yi', 'ya', 'yao', 'ye', 'you', 'yan', 'yin', 'yang', 'ying', 'yong',
            'wu', 'wa', 'wo', 'wai', 'wei', 'wan', 'wen', 'wang', 'weng',
            'yu', 'yue', 'yuan', 'yun'
        ]);

        let currentSyllable = "";
        let activeCell = null;
        const toneMenu = document.getElementById('toneMenu');
        const audioPlayer = document.getElementById('audioPlayer');

        // Hàm thông minh tự động đổi quy tắc chính tả Pinyin
        function getSpelling(initial, final) {
            if (initial === '') {
                const zeroMap = {
                    'a': 'a', 'o': 'o', 'e': 'e', 'ai': 'ai', 'ei': 'ei', 'ao': 'ao', 'ou': 'ou', 'an': 'an', 'en': 'en', 'ang': 'ang', 'eng': 'eng', 'er': 'er',
                    'i': 'yi', 'ia': 'ya', 'iao': 'yao', 'ie': 'ye', 'iu': 'you', 'ian': 'yan', 'in': 'yin', 'iang': 'yang', 'ing': 'ying', 'iong': 'yong',
                    'u': 'wu', 'ua': 'wa', 'uo': 'wo', 'uai': 'wai', 'ui': 'wei', 'uan': 'wan', 'un': 'wen', 'uang': 'wang', 'ueng': 'weng',
                    'ü': 'yu', 'üe': 'yue', 'üan': 'yuan', 'ün': 'yun'
                };
                return zeroMap[final];
            }
            if (['j', 'q', 'x'].includes(initial) && final.startsWith('ü')) {
                return initial + final.replace('ü', 'u'); // Biến ü thành u sau j, q, x
            }
            return initial + final;
        }

        function initTable() {
            const head = document.getElementById('initialHeaders');
            const body = document.getElementById('pinyinBody');

            initials.forEach(i => {
                const th = document.createElement('th');
                th.innerText = i === '' ? 'Ø' : i;
                head.appendChild(th);
            });

            finals.forEach(f => {
                const tr = document.createElement('tr');
                const th = document.createElement('th');
                th.className = 'final-header';
                th.innerText = f;
                tr.appendChild(th);

                initials.forEach(i => {
                    const td = document.createElement('td');
                    let s = getSpelling(i, f); // Sử dụng hàm thông minh
                    
                    if (validData.has(s)) {
                        td.className = 'syllable';
                        td.innerText = s;
                        td.onclick = (e) => openTones(e, s, td);
                    } else {
                        td.className = 'empty';
                        td.innerText = '·';
                    }
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        function openTones(e, s, cell) {
            currentSyllable = s;
            document.getElementById('toneLabel').innerText = s;
            toneMenu.style.display = 'block';
            
            // Xoá highlight ô cũ, highlight ô mới
            if (activeCell) activeCell.classList.remove('active');
            activeCell = cell;
            activeCell.classList.add('active');

            let posX = e.clientX;
            let posY = e.clientY;
            if (posX + 100 > window.innerWidth) posX -= 100;
            if (posY + 80 > window.innerHeight) posY -= 80;
            toneMenu.style.left = posX + 'px';
            toneMenu.style.top = posY + 'px';
            e.stopPropagation();
        }

        function playSyllable(tone) {
            // Tự động chuyển ü thành v để khớp tên file .mp3 của Nga
            let fileName = currentSyllable.replace(/ü/g, 'v') + tone; 
            audioPlayer.src = `audio/${fileName}.mp3`;
            
            audioPlayer.play().catch(err => {
                console.log("Thiếu file: " + fileName + ".mp3");
                // Đổi màu chữ label thành đỏ nếu thiếu file để Nga dễ biết
                document.getElementById('toneLabel').style.color = 'red';
                setTimeout(() => document.getElementById('toneLabel').style.color = 'var(--ghibli-dark)', 1000);
            });
            // MENU SẼ KHÔNG TỰ TẮT ĐI NỮA
        }

        // Bấm ra ngoài vùng menu thì mới tắt menu
        document.addEventListener('click', (e) => {
            if (!toneMenu.contains(e.target)) {
                toneMenu.style.display = 'none';
                if (activeCell) activeCell.classList.remove('active');
            }
        });

        initTable();
    </script>
</body>
</html>
