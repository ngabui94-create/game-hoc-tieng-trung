<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cùng Nga Học HSK học Pinyin nhé! 👩‍🏫🌿</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark: #4f7942;
            --ghibli-wood: #8b5a2b;
            --accent-pink: #ffb7c5;
            --sky-blue: #a2d2ff;
        }
        body { font-family: 'Quicksand', sans-serif; background: #fdfcf0; margin: 0; padding: 5px; color: #444; }
        
        /* Nút quay về kiểu cổ điển */
        .back-btn { 
            text-decoration: none; color: white; background: var(--ghibli-green); 
            padding: 6px 18px; border-radius: 20px; font-weight: bold; 
            display: inline-block; margin: 5px; box-shadow: 0 3px 0 var(--ghibli-dark); 
            font-size: 0.85rem; transition: 0.2s;
        }
        .back-btn:hover { transform: translateY(-2px); }

        h1 { text-align: center; color: var(--ghibli-dark); font-size: 1.4rem; margin: 10px 0; text-shadow: 1px 1px 0 white; }
        .instruction { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 12px; font-style: italic; }

        .table-container {
            width: 100%; max-height: 80vh; overflow: auto;
            border: 4px solid white; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(79, 121, 66, 0.15); background: white;
        }

        table { border-collapse: separate; border-spacing: 0; }
        
        /* Thanh mẫu ngang với màu sắc theo nhóm */
        thead th {
            position: sticky; top: 0; z-index: 10;
            color: white; padding: 6px 2px; font-size: 1.25rem; 
            border: 1px solid #ffffff44; min-width: 44px;
        }
        
        /* CSS Classes cho nhóm màu thanh mẫu */
        .group-labial { background: #ffcad4 !important; } /* b p m f */
        .group-alveolar { background: #ffe5d9 !important; } /* d t n l */
        .group-velar { background: #ffecb3 !important; } /* g k h */
        .group-palatal { background: #e2cfea !important; } /* j q x */
        .group-retroflex { background: #d1e7dd !important; } /* zh ch sh r */
        .group-sibilant { background: #d0f4de !important; } /* z c s */
        .group-zero { background: var(--ghibli-green) !important; }

        .final-header {
            position: sticky; left: 0; z-index: 11;
            background: #f8fbf8 !important; color: var(--ghibli-dark);
            font-weight: bold; padding: 6px 10px;
            font-size: 1.25rem; border-right: 2px solid var(--ghibli-green);
            text-align: left;
        }

        td {
            padding: 6px 2px; text-align: center; 
            border: 0.5px solid #f0f0f0; font-size: 1.15rem; 
            min-width: 45px; transition: 0.2s;
        }

        tr:nth-child(even) td { background-color: #fafdfa; }

        .syllable { cursor: pointer; color: #444; font-weight: 600; border-radius: 4px; }
        .syllable:hover, .syllable.active { 
            background: var(--accent-pink) !important; color: white; 
            transform: scale(1.1); z-index: 5;
        }
        
        .empty { color: #eee; pointer-events: none; font-size: 0.7rem; }

        /* Pop-up Ghibli Style */
        #toneMenu {
            display: none; position: fixed; background: rgba(255,255,255,0.98);
            border: 3px solid var(--ghibli-green); border-radius: 15px;
            padding: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1000;
            backdrop-filter: blur(5px);
        }
        #toneLabel { text-align:center; font-size: 1.3rem; margin-bottom:10px; color:var(--ghibli-dark); }
        
        .tone-grid { display: flex; gap: 6px; align-items: center; }
        .t-btn { 
            border: none; background: #f0f7ef; padding: 10px 14px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; 
            transition: 0.2s; color: var(--ghibli-dark);
            box-shadow: 0 3px 0 #d4e4d0;
        }
        .t-btn:hover { background: var(--ghibli-green); color: white; transform: translateY(-2px); }
        
        .play-all-btn {
            background: var(--accent-pink); color: white; border: none;
            padding: 10px; border-radius: 10px; cursor: pointer;
            font-size: 1.1rem; box-shadow: 0 3px 0 #e0a4b1;
        }
        .play-all-btn:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">🍃 VỀ VƯỜN</a>
    <h1>Cùng Nga Học HSK học Pinyin nhé! 👩‍🏫✨</h1>
    <div class="instruction">Nhấn vào âm tiết để nghe 4 thanh điệu chuẩn cơm mẹ nấu nhé!</div>

    <div class="table-container">
        <table id="pinyinMainTable">
            <thead>
                <tr id="initialHeaders">
                    <th class="final-header" style="background: var(--ghibli-green) !important; color: white;">V\T</th>
                </tr>
            </thead>
            <tbody id="pinyinBody"></tbody>
        </table>
    </div>

    <div id="toneMenu">
        <div id="toneLabel"></div>
        <div class="tone-grid">
            <button class="t-btn" id="btn-t1" onclick="playSyllable(1)">1</button>
            <button class="t-btn" id="btn-t2" onclick="playSyllable(2)">2</button>
            <button class="t-btn" id="btn-t3" onclick="playSyllable(3)">3</button>
            <button class="t-btn" id="btn-t4" onclick="playSyllable(4)">4</button>
            <button class="play-all-btn" onclick="playAllTones()" title="Nghe cả 4 âm">▶️</button>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        const initials = ['', 'b', 'p', 'm', 'f', 'd', 't', 'n', 'l', 'g', 'k', 'h', 'j', 'q', 'x', 'zh', 'ch', 'sh', 'r', 'z', 'c', 's'];
        const finals = [
            'a', 'o', 'e', 'ai', 'ei', 'ao', 'ou', 'an', 'en', 'ang', 'eng', 'er',
            'i', 'ia', 'iao', 'ie', 'iu', 'ian', 'in', 'iang', 'ing', 'iong',
            'u', 'ua', 'uo', 'uai', 'ui', 'uan', 'un', 'uang', 'ueng',
            'ü', 'üe', 'üan', 'ün'
        ];

        // Phân loại nhóm màu
        const groupMap = {
            '': 'group-zero', 'b':'group-labial','p':'group-labial','m':'group-labial','f':'group-labial',
            'd':'group-alveolar','t':'group-alveolar','n':'group-alveolar','l':'group-alveolar',
            'g':'group-velar','k':'group-velar','h':'group-velar',
            'j':'group-palatal','q':'group-palatal','x':'group-palatal',
            'zh':'group-retroflex','ch':'group-retroflex','sh':'group-retroflex','r':'group-retroflex',
            'z':'group-sibilant','c':'group-sibilant','s':'group-sibilant'
        };

        const validData = new Set(['a', 'o', 'e', 'ai', 'ei', 'ao', 'ou', 'an', 'en', 'ang', 'eng', 'er','ba', 'bo', 'bai', 'bei', 'bao', 'ban', 'ben', 'bang', 'beng', 'bi', 'biao', 'bie', 'bian', 'bin', 'bing','pa', 'po', 'pai', 'pei', 'pao', 'pou', 'pan', 'pen', 'pang', 'peng', 'pi', 'piao', 'pie', 'pian', 'pin', 'ping','ma', 'mo', 'me', 'mai', 'mei', 'mao', 'mou', 'man', 'men', 'mang', 'meng', 'mi', 'miao', 'mie', 'miu', 'mian', 'min', 'ming','fa', 'fo', 'fei', 'fou', 'fan', 'fen', 'fang', 'feng','da', 'de', 'dai', 'dei', 'dao', 'dou', 'dan', 'den', 'dang', 'deng', 'dong', 'di', 'diao', 'die', 'diu', 'dian', 'ding', 'du', 'duo', 'dui', 'duan', 'dun','ta', 'te', 'tai', 'tao', 'tou', 'tan', 'tang', 'teng', 'tong', 'ti', 'tiao', 'tie', 'tian', 'ting', 'tu', 'tuo', 'tui', 'tuan', 'tun','na', 'ne', 'nai', 'nei', 'nao', 'nou', 'nan', 'nen', 'nang', 'neng', 'nong', 'ni', 'niao', 'nie', 'niu', 'nian', 'nin', 'niang', 'ning', 'nu', 'nuo', 'nuan', 'nü', 'nüe', 'la', 'le', 'lai', 'lei', 'lao', 'lou', 'lan', 'lang', 'leng', 'long', 'li', 'lia', 'liao', 'lie', 'liu', 'lian', 'lin', 'liang', 'ling', 'lu', 'luo', 'luan', 'lun', 'lü', 'lüe','ga', 'ge', 'gai', 'gei', 'gao', 'gou', 'gan', 'gen', 'gang', 'geng', 'gong', 'gu', 'gua', 'guo', 'guai', 'gui', 'guan', 'gun', 'guang','ka', 'ke', 'kai', 'kei', 'kao', 'kou', 'kan', 'ken', 'kang', 'keng', 'kong', 'ku', 'kua', 'kuo', 'kuai', 'kui', 'kuan', 'kun', 'kuang','ha', 'he', 'hai', 'hei', 'hao', 'hou', 'han', 'hen', 'hang', 'heng', 'hong', 'hu', 'hua', 'huo', 'huai', 'hui', 'huan', 'hun', 'huang','zha', 'zhe', 'zhi', 'zhai', 'zhei', 'zhao', 'zhou', 'zhan', 'zhen', 'zhang', 'zheng', 'zhong', 'zhu', 'zhua', 'zhuo', 'zhuai', 'zhui', 'zhuan', 'zhun', 'zhuang','cha', 'che', 'chi', 'chai', 'chao', 'chou', 'chan', 'chen', 'chang', 'cheng', 'chong', 'chu', 'chua', 'chuo', 'chuai', 'chui', 'chuan', 'chun', 'chuang','sha', 'she', 'shi', 'shai', 'shei', 'shao', 'shou', 'shan', 'shen', 'shang', 'sheng', 'shu', 'shua', 'shuo', 'shuai', 'shui', 'shuan', 'shun', 'shuang','re', 'ri', 'rao', 'rou', 'ran', 'ren', 'rang', 'reng', 'rong', 'ru', 'ruo', 'rui', 'ruan', 'run','za', 'ze', 'zi', 'zai', 'zei', 'zao', 'zou', 'zan', 'zen', 'zang', 'zeng', 'zong', 'zu', 'zuo', 'zui', 'zuan', 'zun','ca', 'ce', 'ci', 'cai', 'cao', 'cou', 'can', 'cen', 'cang', 'ceng', 'cong', 'cu', 'cuo', 'cui', 'cuan', 'cun','sa', 'se', 'si', 'sai', 'sao', 'sou', 'san', 'sen', 'sang', 'seng', 'song', 'su', 'suo', 'sui', 'suan', 'sun','ji', 'jia', 'jiao', 'jie', 'jiu', 'jian', 'jin', 'jiang', 'jing', 'jiong', 'ju', 'jue', 'juan', 'jun','qi', 'qia', 'qiao', 'qie', 'qiu', 'qian', 'qin', 'qiang', 'qing', 'qiong', 'qu', 'que', 'quan', 'qun','xi', 'xia', 'xiao', 'xie', 'xiu', 'xian', 'xin', 'xiang', 'xing', 'xiong', 'xu', 'xue', 'xuan', 'xun','yi', 'ya', 'yao', 'ye', 'you', 'yan', 'yin', 'yang', 'ying', 'yong','wu', 'wa', 'wo', 'wai', 'wei', 'wan', 'wen', 'wang', 'weng','yu', 'yue', 'yuan', 'yun']);

        // Hàm đổi chữ thành dấu Pinyin
        function getToneMarked(syllable, tone) {
            const marks = {
                'a': ['ā', 'á', 'ǎ', 'à'], 'e': ['ē', 'é', 'ě', 'è'], 'o': ['ō', 'ó', 'ǒ', 'ò'],
                'i': ['ī', 'í', 'ǐ', 'ì'], 'u': ['ū', 'ú', 'ǔ', 'ù'], 'ü': ['ǖ', 'ǘ', 'ǚ', 'ǜ']
            };
            let res = syllable;
            if (res.includes('a')) res = res.replace('a', marks['a'][tone-1]);
            else if (res.includes('e')) res = res.replace('e', marks['e'][tone-1]);
            else if (res.includes('o')) res = res.replace('o', marks['o'][tone-1]);
            else if (res.includes('iu')) res = res.replace('u', marks['u'][tone-1]);
            else if (res.includes('ui')) res = res.replace('i', marks['i'][tone-1]);
            else if (res.includes('i')) res = res.replace('i', marks['i'][tone-1]);
            else if (res.includes('u')) res = res.replace('u', marks['u'][tone-1]);
            else if (res.includes('ü')) res = res.replace('ü', marks['ü'][tone-1]);
            return res;
        }

        let currentSyllable = "";
        let activeCell = null;
        const toneMenu = document.getElementById('toneMenu');
        const audioPlayer = document.getElementById('audioPlayer');

        function initTable() {
            const head = document.getElementById('initialHeaders');
            const body = document.getElementById('pinyinBody');

            initials.forEach(i => {
                const th = document.createElement('th');
                th.className = groupMap[i] || '';
                th.innerText = i === '' ? 'Ø' : i;
                head.appendChild(th);
            });

            finals.forEach(f => {
                const tr = document.createElement('tr');
                const th = document.createElement('th');
                th.className = 'final-header';
                th.innerText = f;
                tr.appendChild(th);

                initials.forEach(i => {
                    const td = document.createElement('td');
                    let s = (i === '' && ['i','u','ü'].some(v => f.startsWith(v))) ? getZeroSpelling(f) : 
                            (['j','q','x'].includes(i) && f.startsWith('ü')) ? i + f.replace('ü','u') : i+f;
                    
                    if (validData.has(s)) {
                        td.className = 'syllable';
                        td.innerText = s;
                        td.onclick = (e) => openTones(e, s, td);
                    } else {
                        td.className = 'empty';
                        td.innerText = '·';
                    }
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        function getZeroSpelling(f) {
            const map = {'i':'yi','ia':'ya','iao':'yao','ie':'ye','iu':'you','ian':'yan','in':'yin','iang':'yang','ing':'ying','iong':'yong','u':'wu','ua':'wa','uo':'wo','uai':'wai','ui':'wei','uan':'wan','un':'wen','uang':'wang','ueng':'weng','ü':'yu','üe':'yue','üan':'yuan','ün':'yun'};
            return map[f] || f;
        }

        function openTones(e, s, cell) {
            currentSyllable = s;
            document.getElementById('toneLabel').innerText = s;
            
            // Cập nhật text cho các nút thanh điệu
            for(let t=1; t<=4; t++) {
                document.getElementById(`btn-t${t}`).innerText = getToneMarked(s, t);
            }

            toneMenu.style.display = 'block';
            if (activeCell) activeCell.classList.remove('active');
            activeCell = cell;
            activeCell.classList.add('active');

            let posX = e.clientX;
            let posY = e.clientY;
            if (posX + 150 > window.innerWidth) posX -= 150;
            if (posY + 100 > window.innerHeight) posY -= 100;
            toneMenu.style.left = posX + 'px';
            toneMenu.style.top = posY + 'px';
            e.stopPropagation();
        }

        function playSyllable(tone) {
            let fileName = currentSyllable.replace(/ü/g, 'v') + tone; 
            audioPlayer.src = `audio/${fileName}.mp3`;
            audioPlayer.play().catch(() => {
                document.getElementById('toneLabel').style.color = 'red';
                setTimeout(() => document.getElementById('toneLabel').style.color = 'var(--ghibli-dark)', 800);
            });
        }

        async function playAllTones() {
            for (let t = 1; t <= 4; t++) {
                playSyllable(t);
                // Đợi âm thanh phát xong hoặc đợi 0.8s mới phát âm tiếp theo
                await new Promise(resolve => setTimeout(resolve, 800));
            }
        }

        document.addEventListener('click', (e) => {
            if (!toneMenu.contains(e.target)) {
                toneMenu.style.display = 'none';
                if (activeCell) activeCell.classList.remove('active');
            }
        });

        initTable();
    </script>
</body>
</html>
