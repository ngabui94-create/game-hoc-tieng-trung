<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK3 Bài 1 - Khu Vườn Của Nga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #a8d5ba;
            --ghibli-brown: #d4a373;
            --ghibli-sky: #caf0f8;
            --ghibli-wood: #6d4c41;
            --ghibli-dark-green: #4f7942;
        }

        body {
            font-family: 'Quicksand', 'Nunito', sans-serif;
            background: linear-gradient(180deg, var(--ghibli-sky) 0%, #fff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chinese-text { font-family: 'Noto Sans SC', sans-serif; font-weight: 700; }
        .chinese-sub { font-family: 'Noto Sans SC', sans-serif; }

        .ghibli-card {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid var(--ghibli-wood);
            border-radius: 20px;
            box-shadow: 0 10px 0 var(--ghibli-brown);
        }

        .btn-ghibli {
            background-color: var(--ghibli-green);
            color: var(--ghibli-wood);
            border: 2px solid var(--ghibli-wood);
            border-radius: 12px;
            transition: all 0.2s;
            font-weight: bold;
            padding: 12px;
            cursor: pointer;
        }

        .btn-ghibli:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 0 var(--ghibli-brown);
            background-color: #95c7a9;
        }

        /* Flashcard Styles */
        .flashcard-inner {
            position: relative; width: 100%; height: 380px;
            transition: transform 0.6s; transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard-inner.is-flipped { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 15px;
            padding: 24px; border: 2px solid var(--ghibli-wood);
        }
        .flashcard-front { background-color: #fff; }
        .flashcard-back { background-color: #fef3c7; transform: rotateY(180deg); }

        /* Vocab Game Styles */
        .word-pill {
            display: inline-block; padding: 8px 16px; margin: 4px;
            background: white; border: 2px solid var(--ghibli-wood);
            border-radius: 20px; cursor: pointer; font-weight: bold; transition: all 0.2s;
        }
        .word-pill:hover { background: var(--ghibli-sky); }
        .word-pill.selected { opacity: 0.4; pointer-events: none; }
        
        .result-bar { height: 24px; border-radius: 12px; display: flex; overflow: hidden; border: 2px solid var(--ghibli-wood); background: #eee; }
        .hidden { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--ghibli-brown); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="game-container" class="w-full max-w-xl px-4 mt-10 mb-10">
        <div id="start-screen" class="ghibli-card p-8 text-center">

            <h2 class="text-xl text-emerald-700 font-bold mb-4 italic">Cuối tuần bạn có dự định gì?</h2>
            <div class="mx-auto mb-4 text-6xl">🌲</div>
            
            <div class="grid grid-cols-1 gap-4">
                <button onclick="startFlashcards(vocabulary)" class="btn-ghibli text-lg">🎴 Phần 1: Ôn Flashcards (15 từ)</button>
                <button onclick="startVocabularyGame()" class="btn-ghibli text-lg" style="background-color: #fef3c7;">🎮 Phần 2: Game Từ Vựng</button>
                <button onclick="startQuiz('p3')" class="btn-ghibli text-lg" style="background-color: #fff1f2;">✨ Phần 3: Ngữ pháp V+好</button>

                <button onclick="startQuiz('p5')" class="btn-ghibli text-lg" style="background-color: #f0f9ff;">🔗 Phần 5: Liên từ 那</button>
                <button onclick="window.location.href='index.html'" class="text-amber-700 font-bold text-sm mt-2 hover:underline">🏠 Trở về Khu Vườn chính</button>
            </div>
        </div>

        <div id="flashcard-screen" class="ghibli-card p-6 hidden">

            </div>

                            </div>

                        </div>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="markCard(false)" class="bg-rose-100 border-2 border-rose-400 text-rose-700 p-4 rounded-xl font-bold hover:bg-rose-200">Chưa thuộc</button>
                <button onclick="markCard(true)" class="bg-emerald-100 border-2 border-emerald-400 text-emerald-700 p-4 rounded-xl font-bold hover:bg-emerald-200">Đã thuộc</button>
            </div>
        </div>

        <div id="vocab-game-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-4">
                    <button onclick="window.location.href='index.html'" class="text-emerald-700 text-xs font-bold hover:underline">🏠 Về Vườn</button>
                    <button onclick="returnToStart()" class="text-amber-700 text-xs font-bold hover:underline">🔙 Bài 1</button>
                </div>

        <div id="play-screen" class="ghibli-card p-6 hidden">

                </div>
                <button onclick="showNextQuestion()" class="bg-amber-600 text-white px-4 py-2 rounded-lg w-full font-bold shadow-md">Tiếp theo</button>

        </div>

        <div id="flashcard-stat-screen" class="ghibli-card p-8 text-center hidden">
            <h2 class="text-2xl font-bold text-amber-900 mb-2">Kết quả luyện tập</h2>
            <div class="result-bar mb-6">

                <div id="stat-bar-unlearned" class="bg-rose-400 h-full transition-all duration-1000" style="width: 0%"></div>
            </div>
            <div class="flex justify-between font-bold text-sm px-1 mb-8">
                <span class="text-emerald-700">✅ Thuộc: <span id="stat-percent-learned">0</span>%</span>

            </div>
            <div id="unlearned-container" class="hidden text-left mb-8">

            </div>
            <div class="flex gap-3 mt-2">

                <button onclick="returnToStart()" class="btn-ghibli flex-1">🔙 Lại Bài 1</button>

            },
            p5: { 
                name: "Liên từ 那", 
                questions: [

                    { q: "A: 外边下大雨了，不能去踢球了。\nB: ______", options: ["那我们在家看电影吧。", "我很喜欢踢球。", "今天星期六。", "你会踢足球吗？"], correct: 0, res: "那我们在家看电影吧。", py: "Nà wǒmen zài jiā kàn diànyǐng ba.", vi: "Vậy thì chúng ta ở nhà xem phim đi.", exp: "Đưa ra giải pháp thay thế dựa trên tình huống thực tế." },

                    { q: "A: 今天老师不在。\nB: ______", options: ["那我们自己复习吧。", "老师很好。", "今天星期一。", "我喜欢老师。"], correct: 0, res: "那我们自己复习吧。", py: "Nà wǒmen zìjǐ fùxí ba.", vi: "Vậy chúng ta tự mình ôn tập thôi.", exp: "Tự quyết định hành động khi điều kiện thay đổi." },
                    { q: "A: 我已经吃过饭了。\nB: ______", options: ["那我们去散步吧。", "饭很好吃。", "我喜欢吃面。", "你会做饭吗？"], correct: 0, res: "那我们去散步吧。", py: "Nà wǒmen qù sànbù ba.", vi: "Vậy chúng ta đi tản bộ đi.", exp: "Đề xuất hoạt động sau khi hoàn tất việc ăn uống." }
                ] 
            }
        };

        // --- Core Logic ---
        let currentQuizKey = '', quizIdx = 0, quizScore = 0, quizAnswered = false;
        let currentFlashList = [], flashcardIdx = 0, learnedCount = 0, unlearnedItems = [];
        let vgStep = 0, vgScore = 0;

        function playAudio(id) { const a = document.getElementById(id); if(a) { a.currentTime = 0; a.play().catch(()=>{}); } }

        function startFlashcards(list) {
            playAudio('audio-click'); currentFlashList = [...list]; flashcardIdx = 0; learnedCount = 0; unlearnedItems = [];
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('flashcard-screen').classList.remove('hidden');
            document.getElementById('card-total').innerText = list.length;
            updateFlashcard();
        }

        function updateFlashcard() {
            const card = currentFlashList[flashcardIdx];
            document.getElementById('card-index').innerText = flashcardIdx + 1;
            document.getElementById('card-hanzi').innerText = card.h;
            document.getElementById('card-pinyin').innerText = card.p;
            document.getElementById('card-mean').innerText = card.m;
            document.getElementById('card-example-cn').innerText = card.ex;
            document.getElementById('card-example-py').innerText = card.exp;
            document.getElementById('card-example-vi').innerText = card.exv;
            document.getElementById('flashcard-inner').classList.remove('is-flipped');
        }

        function flipCard() { playAudio('audio-flip'); document.getElementById('flashcard-inner').classList.toggle('is-flipped'); }
        
        function markCard(learned) {
            if (learned) learnedCount++; else unlearnedItems.push(currentFlashList[flashcardIdx]);
            flashcardIdx++;
            if (flashcardIdx < currentFlashList.length) updateFlashcard();
            else showFlashcardStats();
        }

        function showFlashcardStats() {
            document.getElementById('flashcard-screen').classList.add('hidden');
            document.getElementById('flashcard-stat-screen').classList.remove('hidden');
            const total = currentFlashList.length;
            const pLearned = Math.round((learnedCount / total) * 100);
            document.getElementById('stat-bar-learned').style.width = pLearned + '%';
            document.getElementById('stat-bar-unlearned').style.width = (100 - pLearned) + '%';
            document.getElementById('stat-percent-learned').innerText = pLearned;
            document.getElementById('stat-percent-unlearned').innerText = 100 - pLearned;
            const listEl = document.getElementById('unlearned-list');
            if (unlearnedItems.length > 0) {
                document.getElementById('unlearned-container').classList.remove('hidden');
                listEl.innerHTML = unlearnedItems.map(item => `<div class="bg-rose-50 p-2 rounded"><b>${item.h}</b>: ${item.m}</div>`).join('');
            }
        }

        function startVocabularyGame() {
            playAudio('audio-click'); vgStep = 0; vgScore = 0;
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('vocab-game-screen').classList.remove('hidden');
            nextVocabStep();
        }

        function nextVocabStep() {
            if (vgStep >= vocabulary.length) {
                document.getElementById('vocab-game-screen').classList.add('hidden');
                document.getElementById('end-screen').classList.remove('hidden');
                document.getElementById('result-text').innerText = `Kết quả Game: ${vgScore}/${vocabulary.length}`;
                return;
            }
            document.getElementById('vg-step').innerText = vgStep + 1;
            document.getElementById('vg-feedback').classList.add('hidden');
            document.getElementById('vg-next-btn').classList.add('hidden');
            document.getElementById('vg-check-btn').classList.remove('hidden');
            
            const card = vocabulary[vgStep];
            const content = document.getElementById('vg-content');
            content.innerHTML = `
                <div class="text-4xl font-bold text-amber-900 mb-6 chinese-text">${card.h}</div>
                <div class="grid grid-cols-2 gap-3 w-full">
                    ${shuffle([...vocabulary]).slice(0, 3).concat(card)
                        .sort(() => Math.random() - 0.5)
                        .map(item => `<button class="btn-ghibli py-3 text-sm" onclick="selectVocabOption(this, '${item.m}')">${item.m}</button>`).join('')}
                </div>
            `;
            vgStep++;
        }

        let selectedOption = null;
        function selectVocabOption(btn, mean) {
            const btns = document.querySelectorAll('#vg-content button');
            btns.forEach(b => b.style.backgroundColor = '');
            btn.style.backgroundColor = '#caf0f8';
            selectedOption = mean;
        }

        function checkVocabGame() {
            if (!selectedOption) return;
            const card = vocabulary[vgStep - 1];
            const feedback = document.getElementById('vg-feedback');
            feedback.classList.remove('hidden');
            if (selectedOption === card.m) {
                playAudio('audio-correct'); vgScore++;
                feedback.innerText = "Chính xác! 🌟";
                feedback.className = "mt-4 p-3 rounded-lg text-center font-bold bg-emerald-100 text-emerald-700";
            } else {
                playAudio('audio-wrong');
                feedback.innerText = "Sai rồi! Đáp án là: " + card.m;
                feedback.className = "mt-4 p-3 rounded-lg text-center font-bold bg-rose-100 text-rose-700";
            }
            document.getElementById('vg-check-btn').classList.add('hidden');
            document.getElementById('vg-next-btn').classList.remove('hidden');
            selectedOption = null;
        }

        function startQuiz(key) {
            playAudio('audio-click'); currentQuizKey = key; quizIdx = 0; quizScore = 0;
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('play-screen').classList.remove('hidden');
            document.getElementById('quiz-part-name').innerText = quizData[key].name;
            document.getElementById('quiz-total-display').innerText = quizData[key].questions.length;
            showQuizQuestion();
        }

        function showQuizQuestion() {
            quizAnswered = false; const q = quizData[currentQuizKey].questions[quizIdx];
            document.getElementById('quiz-idx-display').innerText = quizIdx + 1;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('explanation-container').classList.add('hidden');
            const container = document.getElementById('options-container'); container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "btn-ghibli text-left transition-all duration-300"; btn.innerText = (i+1) + ". " + opt;
                btn.onclick = () => checkQuiz(i, btn); container.appendChild(btn);
            });
        }

        function checkQuiz(idx, btn) {
            if (quizAnswered) return; quizAnswered = true;
            const q = quizData[currentQuizKey].questions[quizIdx];
            document.getElementById('explanation-container').classList.remove('hidden');
            if (idx === q.correct) {
                playAudio('audio-correct'); quizScore++;
                document.getElementById('feedback-title').innerText = "Chính xác! ✨";
                btn.classList.add('bg-emerald-500', 'text-white');
            } else {
                playAudio('audio-wrong');
                document.getElementById('feedback-title').innerText = "Chưa đúng! ❌";
                btn.classList.add('bg-rose-500', 'text-white');
            }
            document.getElementById('exp-full-sentence').innerText = q.res;
            document.getElementById('exp-pinyin').innerText = q.py;
            document.getElementById('exp-translation').innerText = "Dịch: " + q.vi;
            document.getElementById('explanation-text').innerText = "💡 " + q.exp;
        }

        function showNextQuestion() {
            quizIdx++;
            if (quizIdx < quizData[currentQuizKey].questions.length) showQuizQuestion();
            else {
                document.getElementById('play-screen').classList.add('hidden');
                document.getElementById('end-screen').classList.remove('hidden');
                document.getElementById('result-text').innerText = `Kết quả: ${quizScore}/${quizData[currentQuizKey].questions.length}`;
            }
        }

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }
        function returnToStart() {
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
