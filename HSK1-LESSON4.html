<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK1 - Bài 4: 她 market là cô giáo của tôi</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-leaf: #7fb069;
            --ghibli-pink: #ffb7c5;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0)), url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .exit-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--ghibli-dark-green);
            padding: 10px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid var(--ghibli-green);
            z-index: 1000;
            transition: 0.3s;
        }
        .exit-button:hover { background: var(--ghibli-green); color: white; }

        .game-container {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 25px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border: 5px solid var(--ghibli-green);
        }

        .game-stats { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; color: var(--ghibli-dark-green); }
        #score-display { color: var(--ghibli-wood); font-size: 1.2rem; }
        #quiz-screen, #result-screen { display: none; }
        
        .progress-bar { width: 100%; height: 12px; background: #eee; border-radius: 6px; margin-bottom: 20px; overflow: hidden; }
        #progress { height: 100%; background: linear-gradient(90deg, var(--ghibli-green), var(--ghibli-leaf)); width: 0%; transition: width 0.4s ease; }

        .question-text { font-size: 1.4rem; color: var(--ghibli-wood); margin-bottom: 25px; font-weight: 600; line-height: 1.6; }
        .pinyin-sub { display: block; font-size: 0.9rem; color: #666; font-weight: 400; margin-top: -5px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { background: white; border: 2px solid var(--ghibli-leaf); padding: 15px 10px; border-radius: 15px; font-size: 1.1rem; cursor: pointer; transition: 0.2s; font-family: inherit; font-weight: 600; }
        .option-btn:hover:not(:disabled) { background: var(--ghibli-sky); }
        .option-btn.correct { background: var(--ghibli-dark-green) !important; color: white !important; }
        .option-btn.wrong { background: #ff7675 !important; color: white !important; }

        .btn-main { background: var(--ghibli-wood); color: white; border: none; padding: 12px 35px; font-size: 1.2rem; border-radius: 30px; cursor: pointer; margin-top: 25px; font-weight: bold; box-shadow: 0 4px 0 #5d3d1d; }
        
        .rank-badge { font-size: 5rem; margin: 15px 0; display: block; }
        .evaluation-box { background: var(--ghibli-sky); padding: 15px; border-radius: 15px; margin: 20px 0; font-style: italic; color: var(--ghibli-dark-green); }

        ruby { ruby-align: center; }
        rt { font-size: 0.6em; color: #666; }
    </style>
</head>
<body>

<a href="index.html" class="exit-button">🏠 Quay về vườn</a>

<div class="game-container">
    <div id="intro-screen">
        <div style="background: var(--ghibli-pink); color: white; display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 15px;">🌸 Nga Học HSK</div>
        <h1><ruby>Bài<rt>bà i</rt></ruby> 4: <ruby>她是我的汉语老师<rt>Tā shì wǒ de Hànyǔ lǎoshī</rt></ruby></h1>
        <p>Thử thách 20 câu hỏi về từ vựng & hội thoại Bài 4.<br>
        <b style="color: var(--ghibli-dark-green);">Đúng +10đ</b> | <b style="color: #d63031;">Sai -5đ</b></p>
        <button class="btn-main" onclick="startQuiz()">Bắt đầu ngay 🌿</button>
    </div>

    <div id="quiz-screen">
        <div class="game-stats">
            <span id="question-count">Câu: 1/20</span>
            <span id="score-display">Điểm: 0</span>
        </div>
        <div class="progress-bar"><div id="progress"></div></div>
        <div class="question-text" id="question-text"></div>
        <div class="options-grid" id="options-grid"></div>
        <div id="feedback" style="margin-top: 15px; font-weight: bold; min-height: 24px;"></div>
        <button id="next-btn" class="btn-main" style="display: none;" onclick="nextQuestion()">Câu tiếp theo ➡</button>
    </div>

    <div id="result-screen">
        <h1>Kết Quả Học Tập</h1>
        <span class="rank-badge" id="rank-icon">🌱</span>
        <div style="font-size: 2.5rem; font-weight: bold; color: var(--ghibli-dark-green);" id="final-score">0đ</div>
        <div id="correct-count" style="font-weight: bold; margin-top: 10px;">Đúng: 0/20</div>
        <div class="evaluation-box" id="evaluation-text"></div>
        <button class="btn-main" onclick="location.reload()">Chơi lại 🔄</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(f1, f2, type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type; o.connect(g); g.connect(audioCtx.destination);
        o.frequency.setValueAtTime(f1, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(f2, audioCtx.currentTime + 0.2);
        g.gain.setValueAtTime(0.2, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
        o.start(); o.stop(audioCtx.currentTime + 0.2);
    }

    const questions = [
        { q: "Từ 'Cô ấy' viết là <ruby>她<rt>tā</rt></ruby>, vậy 'Anh ấy' viết là gì?", options: ["<ruby>他<rt>tā</rt></ruby>", "<ruby>你<rt>nǐ</rt></ruby>", "<ruby>我<rt>wǒ</rt></ruby>", "<ruby>谁<rt>shéi</rt></ruby>"], a: 0 },
        { q: "Nghĩa của từ <ruby>谁<rt>shéi</rt></ruby> là gì?", options: ["Cái gì", "Ai", "Ở đâu", "Nào"], a: 1 },
        { q: "Chọn chữ Hán cho 'Tiếng Trung': <ruby>Hànyǔ<rt></rt></ruby>", options: ["<ruby>英语<rt>Yīngyǔ</rt></ruby>", "<ruby>汉语<rt>Hànyǔ</rt></ruby>", "<ruby>国<rt>guó</rt></ruby>", "<ruby>老师<rt>lǎoshī</rt></ruby>"], a: 1 },
        { q: "Bạn cùng lớp được viết là gì?", options: ["<ruby>同学<rt>tóngxué</rt></ruby>", "<ruby>朋友<rt>péngyou</rt></ruby>", "<ruby>老师<rt>lǎoshī</rt></ruby>", "<ruby>学生<rt>xuésheng</rt></ruby>"], a: 0 },
        { q: "Điền từ: <ruby>她 是<rt>Tā shì</rt></ruby> ___ <ruby>的 汉语 老师<rt>de Hànyǔ lǎoshī</rt></ruby> (Cô ấy là cô giáo tiếng Trung của tôi)", options: ["<ruby>你<rt>nǐ</rt></ruby>", "<ruby>他<rt>tā</rt></ruby>", "<ruby>我<rt>wǒ</rt></ruby>", "<ruby>谁<rt>shéi</rt></ruby>"], a: 2 },
        { q: "Trợ từ dùng để hỏi ngược lại 'Còn bạn thì sao?': <ruby>你<rt>nǐ</rt></ruby> ___ ?", options: ["<ruby>的<rt>de</rt></ruby>", "<ruby>吗<rt>ma</rt></ruby>", "<ruby>呢<rt>ne</rt></ruby>", "<ruby>不<rt>bù</rt></ruby>"], a: 2 },
        { q: "Nghĩa của từ <ruby>朋友<rt>péngyou</rt></ruby> là gì?", options: ["Người Mỹ", "Bạn bè", "Người Trung Quốc", "Thầy giáo"], a: 1 },
        { q: "Từ <ruby>国<rt>guó</rt></ruby> có nghĩa là gì?", options: ["Người", "Nào", "Quốc gia", "Đẹp"], a: 2 },
        { q: "Dịch: 'Cô ấy là ai?'", options: ["<ruby>她是哪国人？<rt>Tā shì nǎ guó rén?</rt></ruby>", "<ruby>她是谁？<rt>Tā shì shéi?</rt></ruby>", "<ruby>他是谁？<rt>Tā shì shéi?</rt></ruby>", "<ruby>她叫李月。<rt>Tā jiào Lǐ Yuè.</rt></ruby>"], a: 1 },
        { q: "Điền từ: <ruby>你 是<rt>Nǐ shì</rt></ruby> ___ <ruby>国 人<rt>guó rén</rt></ruby>? (Bạn là người nước nào?)", options: ["<ruby>哪<rt>nǎ</rt></ruby>", "<ruby>那<rt>nà</rt></ruby>", "<ruby>谁<rt>shéi</rt></ruby>", "<ruby>呢<rt>ne</rt></ruby>"], a: 0 },
        { q: "Điền chữ: <ruby>我是<rt>Wǒ shì</rt></ruby> ___ <ruby>国人<rt>guó rén</rt></ruby> (Tôi là người Mỹ)", options: ["<ruby>中<rt>Zhōng</rt></ruby>", "<ruby>哪<rt>nǎ</rt></ruby>", "<ruby>美<rt>Měi</rt></ruby>", "<ruby>大<rt>dà</rt></ruby>"], a: 2 },
        { q: "Đại từ dùng cho nam giới (Anh ấy/Ông ấy) là:", options: ["<ruby>她<rt>tā</rt></ruby>", "<ruby>他<rt>tā</rt></ruby>", "<ruby>我<rt>wǒ</rt></ruby>", "<ruby>你<rt>nǐ</rt></ruby>"], a: 1 },
        { q: "Dịch: Cô ấy tên là Lý Nguyệt.", options: ["<ruby>她叫李月。<rt>Tā jiào Lǐ Yuè.</rt></ruby>", "<ruby>她是李月。<rt>Tā shì Lǐ Yuè.</rt></ruby>", "<ruby>她叫月亮。<rt>Tā jiào yuèliang.</rt></ruby>", "<ruby>他是李月。<rt>Tā shì Lǐ Yuè.</rt></ruby>"], a: 0 },
        { q: "Trợ từ <ruby>的<rt>de</rt></ruby> trong bài 4 dùng để làm gì?", options: ["Hỏi", "Phủ định", "Biểu thị sở hữu", "Cảm thán"], a: 2 },
        { q: "Cô ấy KHÔNG PHẢI bạn học tôi: <ruby>她<rt>Tā</rt></ruby> ___ <ruby>是 我 同学<rt>shì wǒ tóngxué</rt></ruby>", options: ["<ruby>不<rt>bù</rt></ruby>", "<ruby>没<rt>méi</rt></ruby>", "<ruby>的<rt>de</rt></ruby>", "<ruby>呢<rt>ne</rt></ruby>"], a: 0 },
        { q: "Dịch pinyin: péngyou", options: ["<ruby>老师<rt>lǎoshī</rt></ruby>", "<ruby>汉语<rt>Hànyǔ</rt></ruby>", "<ruby>朋友<rt>péngyou</rt></ruby>", "<ruby>国<rt>guó</rt></ruby>"], a: 2 },
        { q: "Pinyin của chữ <ruby>哪<rt></rt></ruby> là gì?", options: ["nà", "nǎ", "ne", "nǐ"], a: 1 },
        { q: "Nghĩa của câu: <ruby>他是我同学。<rt>Tā shì wǒ tóngxué.</rt></ruby>", options: ["Cô ấy là cô giáo tôi", "Anh ấy là bạn học tôi", "Bạn là người nước nào", "Ai là bạn tôi"], a: 1 },
        { q: "Trong câu '<ruby>你呢？<rt>Nǐ ne?</rt></ruby>', từ '<ruby>呢<rt>ne</rt></ruby>' dùng để:", options: ["Hỏi tên", "Hỏi ngược lại ý đã nêu", "Chào hỏi", "Phủ định"], a: 1 },
        { q: "Chữ Hán nào có nghĩa là 'Ảnh'?", options: ["<ruby>同学<rt>tóngxué</rt></ruby>", "<ruby>照片<rt>zhàopiàn</rt></ruby>", "<ruby>汉语<rt>Hànyǔ</rt></ruby>", "<ruby>谁<rt>shéi</rt></ruby>"], a: 1 }
    ];

    let idx = 0, score = 0, correct = 0, answered = false;

    function startQuiz() {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQ();
    }

    function showQ() {
        answered = false;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('feedback').innerText = '';
        const q = questions[idx];
        document.getElementById('question-count').innerText = `Câu: ${idx+1}/${questions.length}`;
        document.getElementById('question-text').innerHTML = q.q;
        document.getElementById('progress').style.width = `${(idx/questions.length)*100}%`;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        q.options.forEach((o, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = o;
            btn.onclick = () => check(i, btn);
            grid.appendChild(btn);
        });
    }

    function check(i, btn) {
        if(answered) return;
        answered = true;
        const q = questions[idx];
        const btns = document.querySelectorAll('.option-btn');
        const fb = document.getElementById('feedback');

        if(i === q.a) {
            btn.classList.add('correct');
            score += 10; correct++;
            fb.innerText = '✨ Chính xác! +10đ';
            fb.style.color = 'var(--ghibli-dark-green)';
            playSfx(600, 1000, 'sine');
        } else {
            btn.classList.add('wrong');
            btns[q.a].classList.add('correct');
            score = Math.max(0, score - 5);
            fb.innerText = '❌ Sai rồi! -5đ';
            fb.style.color = '#d63031';
            playSfx(200, 100, 'triangle');
        }
        document.getElementById('score-display').innerText = `Điểm: ${score}`;
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        idx++;
        if(idx < questions.length) showQ();
        else finish();
    }

    function finish() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${score}đ`;
        document.getElementById('correct-count').innerText = `Đúng: ${correct}/${questions.length}`;
        
        let icon = "🌱", text = "";
        if(score >= 180) { icon = "🌳"; text = "ĐẠI THỤ TRONG VƯỜN! Bạn nắm vững bài 4 cực tốt."; }
        else if(score >= 120) { icon = "🌿"; text = "CÂY NON MẠNH MẼ! Kiến thức rất chắc chắn."; }
        else if(score >= 60) { icon = "🍀"; text = "MẦM NHỎ VƯƠN LÊN! Cần cố gắng thêm chút nữa nhé."; }
        else { icon = "🌱"; text = "HẠT MẦM ĐANG NGỦ! Hãy ôn lại bài khóa bài 4 nhé."; }
        
        document.getElementById('rank-icon').innerText = icon;
        document.getElementById('evaluation-text').innerText = text;
    }
</script>
</body>
</html>
