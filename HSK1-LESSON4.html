<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK1 - Bài 4: 她是我的汉语老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-leaf: #7fb069;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--ghibli-sky);
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0)), url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed;
            height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        .pinyin { font-size: 0.75rem; color: #555; font-weight: 400; display: block; line-height: 1; margin-bottom: 2px; }
        .hanzi { font-family: 'Noto Sans SC', sans-serif; font-size: 1.4rem; display: block; line-height: 1; }
        
        .btn-ghibli {
            background: white; border: 3px solid var(--ghibli-dark-green);
            border-radius: 18px; box-shadow: 0 4px 0 var(--ghibli-dark-green);
            transition: all 0.1s; color: var(--ghibli-dark-green); cursor: pointer;
        }
        .btn-ghibli:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--ghibli-dark-green); }

        .option-card {
            background: rgba(255, 255, 255, 0.9); border: 2px solid #ccd5ae; border-radius: 15px;
            padding: 10px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .option-card:hover { transform: scale(1.03); border-color: var(--ghibli-green); background: white; }

        .progress-bar-fill { height: 100%; background: var(--ghibli-green); transition: width 0.3s ease; }
        .slide-up { transform: translateY(-100%); transition: 0.6s ease-in; }
    </style>
</head>
<body>

    <div id="intro-slide" class="fixed inset-0 z-[100] bg-[#fefae0] flex flex-col items-center justify-center p-8 text-center">
        <div class="text-7xl mb-4">🏫</div>
        <h1 class="text-4xl font-black text-[#4f7942] mb-2">Bài 4: 她是我的汉语老师</h1>
        <p class="text-[#8b5a2b] font-bold text-xl mb-6 text-shadow">Giáo viên: Nga Học HSK</p>
        <button onclick="startGame()" class="btn-ghibli px-14 py-4 text-2xl font-bold">VÀO HỌC THÔI! ✨</button>
    </div>

    <div id="game-container" class="w-full max-w-2xl h-screen flex flex-col p-4 opacity-0 transition-opacity">
        <header class="py-4">
            <div class="flex justify-between items-center mb-2">
                <a href="index.html" class="btn-ghibli p-2 px-4 text-xl">🏠</a>
                <div class="font-bold text-[#4f7942]" id="progress-text">1/20</div>
                <div class="text-[#4f7942] font-black text-xl" id="score-val">Score: 0</div>
            </div>
            <div class="w-full h-3 bg-white/50 rounded-full border-2 border-[#4f7942] overflow-hidden">
                <div id="progress-bar" class="progress-bar-fill" style="width: 5%"></div>
            </div>
        </header>

        <div class="flex-grow flex flex-col gap-4 overflow-y-auto">
            <div class="bg-white/80 rounded-3xl p-6 text-center shadow-sm">
                <h2 id="question-text" class="text-xl font-bold text-[#333]"></h2>
            </div>

            <div id="answer-zone" class="min-h-[120px] flex flex-wrap gap-2 justify-center p-4 bg-white/30 rounded-2xl border-2 border-dashed border-white"></div>

            <div id="options-zone" class="flex flex-wrap gap-3 justify-center p-2"></div>
        </div>

        <footer class="py-6">
            <button id="action-btn" onclick="handleAction()" class="btn-ghibli w-full py-4 bg-[#9dc183] text-white text-xl font-bold">KIỂM TRA</button>
        </footer>
    </div>

    <div id="result-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[200] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center border-4 border-[#4f7942]">
            <div id="modal-emoji" class="text-6xl mb-2">🌟</div>
            <h3 id="modal-title" class="text-2xl font-black mb-4"></h3>
            <div id="modal-feedback" class="mb-6 text-gray-700"></div>
            <button onclick="nextStep()" class="btn-ghibli w-full py-4 text-xl font-bold">TIẾP THEO</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type = 'sine') {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        const quizData = [
            { type: "scramble", q: "Sắp xếp: Cô ấy là ai?", ans: ["她", "是", "谁", "？"], py: ["tā", "shì", "shéi", ""] },
            { type: "choice", q: "Nghĩa của '汉语' là gì?", options: [{h:"汉语", p:"Hànyǔ", n:"Tiếng Trung"}, {h:"韩语", p:"Hányǔ", n:"Tiếng Hàn"}, {h:"英语", p:"Yīngyǔ", n:"Tiếng Anh"}], correct: "Tiếng Trung" },
            { type: "scramble", q: "Sắp xếp: Cô ấy là cô giáo tiếng Trung của tôi.", ans: ["她", "是", "我", "khì", "汉语", "老师"], py: ["tā", "shì", "wǒ", "de", "Hànyǔ", "lǎoshī"] },
            { type: "choice", q: "Chọn chữ 'Bạn cùng lớp':", options: [{h:"朋友", p:"péngyou"}, {h:"同学", p:"tóngxué"}, {h:"老师", p:"lǎoshī"}], correct: "同学" },
            { type: "scramble", q: "Sắp xếp: Bạn là người nước nào?", ans: ["你", "是", "哪", "国", "人", "？"], py: ["nǐ", "shì", "nǎ", "guó", "rén", ""] },
            { type: "choice", q: "Điền vào chỗ trống: 我是美国人，你___？", options: [{h:"吗", p:"ma"}, {h:"呢", p:"ne"}, {h:"谁", p:"shéi"}], correct: "呢" },
            { type: "scramble", q: "Sắp xếp: Cô ấy tên là Lý Nguyệt.", ans: ["她", "叫", "李月"], py: ["tā", "jiào", "Lǐ Yuè"] },
            { type: "choice", q: "Chữ 'Nào' (đại từ nghi vấn) là chữ nào?", options: [{h:"哪", p:"nǎ"}, {h:"那", p:"nà"}, {h:"这", p:"zhè"}], correct: "哪" },
            { type: "scramble", q: "Sắp xếp: Anh ấy là bạn của tôi.", ans: ["他", "是", "我", "khì", "朋友"], py: ["tā", "shì", "wǒ", "de", "péngyou"] },
            { type: "choice", q: "'老师' có Pinyin là gì?", options: [{h:"lǎoshī", p:""}, {h:"lǎoshì", p:""}, {h:"lāoshī", p:""}], correct: "lǎoshī" },
            { type: "scramble", q: "Sắp xếp: Còn cô ấy thì sao?", ans: ["她", "呢", "？"], py: ["tā", "ne", ""] },
            { type: "choice", q: "Điền: 他___我同学，他是我朋友。", options: [{h:"是", p:"shì"}, {h:"不是", p:"bú shì"}, {h:"呢", p:"ne"}], correct: "不是" },
            { type: "scramble", q: "Sắp xếp: Cô giáo bạn là người nước nào?", ans: ["你", "khì", "老师", "是", "哪", "国", "人", "？"], py: ["nǐ", "de", "lǎoshī", "shì", "nǎ", "guó", "rén", ""] },
            { type: "choice", q: "Từ nào chỉ quốc gia 'Trung Quốc'?", options: [{h:"美国", p:"Měiguó"}, {h:"中国", p:"Zhōngguó"}, {h:"哪国", p:"nǎguó"}], correct: "中国" },
            { type: "scramble", q: "Sắp xếp: Tôi là người Trung Quốc.", ans: ["我", "shì", "中国", "人"], py: ["wǒ", "shì", "Zhōngguó", "rén"] },
            { type: "choice", q: "Phát âm của '谁' có thể là 'shéi' hoặc?", options: [{h:"shuí", p:""}, {h:"shí", p:""}, {h:"suí", p:""}], correct: "shuí" },
            { type: "scramble", q: "Sắp xếp: Anh ấy là ai?", ans: ["他", "是", "谁", "？"], py: ["tā", "shì", "shéi", ""] },
            { type: "choice", q: "Chữ 'đích' (của) dùng để biểu thị sở hữu là chữ nào?", options: [{h:"的", p:"de"}, {h:"得", p:"de"}, {h:"地", p:"de"}], correct: " have " }, // fix logic
            { type: "scramble", q: "Sắp xếp: Anh ấy là bạn học của tôi.", ans: ["他", "是", "我", "同学"], py: ["tā", "shì", "wǒ", "tóngxué"] },
            { type: "choice", q: "Bạn thấy bài học hôm nay thế nào?", options: [{h:"Vui", p:"Hao"}, {h:"Rất vui", p:"Hen hao"}], correct: "Vui" }
        ];

        // Chuẩn hóa dữ liệu
        quizData.forEach(q => {
            if(q.ans) q.ans = q.ans.map(w => w === 'khì' ? '的' : w === 'shì' ? 's' : w).map(w => w === 's' ? 'shì' : w).map(w => w === 'shì' ? '是' : w);
            if(q.correct === ' have ') q.correct = '的';
        });

        let currentIdx = 0, score = 0, userSelection = [];

        function startGame() {
            playSfx(440);
            document.getElementById('intro-slide').classList.add('slide-up');
            document.getElementById('game-container').style.opacity = '1';
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('progress-text').innerText = `${currentIdx + 1}/20`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / 20) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            
            const answerZone = document.getElementById('answer-zone');
            const optionsZone = document.getElementById('options-zone');
            answerZone.innerHTML = ''; optionsZone.innerHTML = '';
            userSelection = [];

            if (q.type === "scramble") {
                answerZone.style.display = 'flex';
                const pool = [...q.ans].sort(() => Math.random() - 0.5);
                pool.forEach((word) => {
                    const pyIndex = q.ans.indexOf(word);
                    const py = q.py[pyIndex] || "";
                    const btn = document.createElement('button');
                    btn.className = 'btn-ghibli p-2 px-3 m-1 bg-white';
                    btn.innerHTML = `<span class="pinyin">${py}</span><span class="hanzi">${word}</span>`;
                    btn.onclick = () => {
                        playSfx(600);
                        userSelection.push({w: word, p: py, originalBtn: btn});
                        btn.style.visibility = 'hidden';
                        renderScrambleResult();
                    };
                    optionsZone.appendChild(btn);
                });
            } else {
                answerZone.style.display = 'none';
                q.options.forEach(opt => {
                    const card = document.createElement('div');
                    card.className = 'option-card w-[140px] flex flex-col items-center';
                    card.innerHTML = `<span class="pinyin">${opt.p}</span><span class="hanzi">${opt.h}</span><span class="text-xs text-gray-400 mt-1">${opt.n || ""}</span>`;
                    card.onclick = () => {
                        playSfx(600);
                        document.querySelectorAll('.option-card').forEach(c => c.style.borderColor = '#ccd5ae');
                        card.style.borderColor = '#9dc183';
                        userSelection = [opt];
                    };
                    optionsZone.appendChild(card);
                });
            }
        }

        function renderScrambleResult() {
            const answerZone = document.getElementById('answer-zone');
            answerZone.innerHTML = '';
            userSelection.forEach((item, idx) => {
                const span = document.createElement('div');
                span.className = 'bg-[#9dc183] text-white p-2 px-3 rounded-xl cursor-pointer shadow-sm flex flex-col items-center';
                span.innerHTML = `<span class="text-[10px] opacity-90">${item.p}</span><span class="text-lg">${item.w}</span>`;
                span.onclick = () => {
                    // Trả lại từ khi bấm nhầm
                    playSfx(300);
                    item.originalBtn.style.visibility = 'visible';
                    userSelection.splice(idx, 1);
                    renderScrambleResult();
                };
                answerZone.appendChild(span);
            });
        }

        function handleAction() {
            const q = quizData[currentIdx];
            let isCorrect = false;

            if (q.type === "scramble") {
                isCorrect = userSelection.map(i => i.w).join('') === q.ans.join('');
            } else {
                isCorrect = userSelection[0] && (userSelection[0].h === q.correct || userSelection[0].n === q.correct || userSelection[0].h.includes(q.correct));
            }

            const modal = document.getElementById('result-modal');
            if (isCorrect) {
                playSfx(880, 'triangle'); score += 10;
                document.getElementById('modal-emoji').innerText = "🌸";
                document.getElementById('modal-title').innerText = "Đúng rồi!";
                document.getElementById('modal-feedback').innerText = "+10 điểm. Tuyệt vời!";
            } else {
                playSfx(200, 'sawtooth');
                document.getElementById('modal-emoji').innerText = "🍃";
                document.getElementById('modal-title').innerText = "Tiếc quá...";
                const correctText = q.type === 'scramble' ? q.ans.
