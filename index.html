<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Học Tập Của Nga - Ghibli Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-leaf: #7fb069;
            --ghibli-pink: #ffb7c5;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            background-image: 
                linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0)),
                url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* Ngăn thanh cuộn ngang do lá bay */
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.75);
            width: 100%;
            margin-bottom: 30px;
            border-bottom: 5px solid var(--ghibli-green);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative; /* Để chứa các hạt lá bay */
            z-index: 1;
        }

        h1 {
            margin: 0;
            color: var(--ghibli-dark-green);
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Khung tiêu đề phụ "Nga Học HSK" */
        .sub-title-box {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 25px;
            border: 2px dashed var(--ghibli-dark-green);
            border-radius: 15px;
            background-color: rgba(255, 183, 197, 0.3);
            color: var(--ghibli-dark-green);
            font-weight: 600;
            font-size: 1.2rem;
            position: relative;
        }

        .sub-title-box::before {
            content: '🌸';
            position: absolute;
            left: -18px;
            top: -5px;
        }

        .sub-title-box::after {
            content: '🌸';
            position: absolute;
            right: -18px;
            top: -5px;
        }

        /* Câu quote tiếng Việt */
        p.vietnamese-quote {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: #444;
            margin-top: 20px;
            max-width: 600px;
            line-height: 1.5;
        }

        /* CSS cho hiệu ứng lá bay */
        .leaves-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1; /* Đặt phía sau nội dung header */
        }

        .leaf {
            position: absolute;
            display: block;
            width: 15px;
            height: 15px;
            background: var(--ghibli-leaf);
            opacity: 0.7;
            border-radius: 50% 0 50% 0; /* Tạo hình chiếc lá đơn giản */
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                opacity: 0;
                top: -10px;
                transform: translateX(0px) rotate(0deg);
            }
            10% {
                opacity: 0.7;
            }
            100% {
                opacity: 0;
                top: 100%;
                transform: translateX(100px) rotate(720deg);
            }
        }

        /* Tạo nhiều lá với kích thước, vị trí và thời gian bay khác nhau */
        .leaf:nth-child(1) { left: 10%; width: 18px; height: 18px; animation-duration: 5s; animation-delay: 0s; }
        .leaf:nth-child(2) { left: 25%; width: 12px; height: 12px; animation-duration: 7s; animation-delay: 1s; }
        .leaf:nth-child(3) { left: 40%; width: 15px; height: 15px; animation-duration: 6s; animation-delay: 2s; }
        .leaf:nth-child(4) { left: 55%; width: 20px; height: 20px; animation-duration: 8s; animation-delay: 0.5s; }
        .leaf:nth-child(5) { left: 70%; width: 14px; height: 14px; animation-duration: 5s; animation-delay: 1.5s; }
        .leaf:nth-child(6) { left: 85%; width: 16px; height: 16px; animation-duration: 7s; animation-delay: 2.5s; }
        .leaf:nth-child(7) { left: 15%; width: 10px; height: 10px; animation-duration: 9s; animation-delay: 3s; }
        .leaf:nth-child(8) { left: 95%; width: 19px; height: 19px; animation-duration: 6s; animation-delay: 4s; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1000px;
            width: 90%;
            padding-bottom: 50px;
            position: relative;
            z-index: 1;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 3px solid transparent;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--ghibli-leaf);
            box-shadow: 0 15px 30px rgba(79, 121, 66, 0.2);
        }

        .game-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .game-title {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--ghibli-wood);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: var(--ghibli-dark-green);
            position: relative;
            z-index: 1;
        }
    </style>
</head>
