<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Học Tập Của Nga - Ghibli Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-leaf: #7fb069;
            --ghibli-pink: #ffb7c5;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            background-image: 
                linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0)),
                url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 50px 20px;
            background: rgba(255, 255, 255, 0.75);
            width: 100%;
            margin-bottom: 30px;
            border-bottom: 5px solid var(--ghibli-green);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            margin: 0;
            color: var(--ghibli-dark-green);
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .sub-title-box {
            display: inline-block;
            margin: 15px 0;
            padding: 8px 25px;
            border: 2px dashed var(--ghibli-dark-green);
            border-radius: 15px;
            background-color: rgba(255, 183, 197, 0.3);
            color: var(--ghibli-dark-green);
            font-weight: 600;
            font-size: 1.2rem;
            position: relative;
        }

        .sub-title-box::before { content: '🌸'; position: absolute; left: -18px; top: -5px; }
        .sub-title-box::after { content: '🌸'; position: absolute; right: -18px; top: -5px; }

        .welcome-quote {
            font-weight: 600;
            font-size: 1.15rem;
            max-width: 800px;
            line-height: 1.8;
            margin-top: 10px;
            background: linear-gradient(45deg, #4f7942, #8b5a2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .leaves-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .leaf {
            position: absolute;
            display: block;
            width: 15px;
            height: 15px;
            background: var(--ghibli-leaf);
            opacity: 0.6;
            border-radius: 50% 0 50% 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { opacity: 0; top: -10px; transform: translateX(0px) rotate(0deg); }
            10% { opacity: 0.6; }
            100% { opacity: 0; top: 100%; transform: translateX(100px) rotate(720deg); }
        }

        .leaf:nth-child(1) { left: 10%; animation-duration: 6s; }
        .leaf:nth-child(2) { left: 30%; animation-duration: 8s; animation-delay: 1s; }
        .leaf:nth-child(3) { left: 50%; animation-duration: 7s; animation-delay: 2s; }
        .leaf:nth-child(4) { left: 70%; animation-duration: 9s; animation-delay: 0.5s; }
        .leaf:nth-child(5) { left: 90%; animation-duration: 6s; animation-delay: 3s; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            width: 95%;
            padding-bottom: 50px;
            z-index: 1;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: var(--ghibli-leaf);
            box-shadow: 0 15px 30px rgba(79, 121, 66, 0.2);
        }

        .game-icon { font-size: 45px; margin-bottom: 12px; }
        .game-title { font-weight: 600; font-size: 1.1rem; color: var(--ghibli-wood); }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: var(--ghibli-dark-green);
        }
    </style>
</head>
<body>

<header>
    <div class="leaves-container">
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
    </div>

    <h1>Khu Vườn Tiếng Trung 🌿</h1>
    
    <div class="sub-title-box">
        Nga Học HSK
    </div>

    <p class="welcome-quote">

        Nơi tiếng Trung nảy mầm mỗi ngày.
    </p>
</header>
