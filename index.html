<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Học Tập Của Nga - Ghibli Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-leaf: #7fb069;
            --ghibli-pink: #ffb7c5;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            background-image: 
                linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0)),
                url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed;
            color: #333; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; position: relative;
        }

        header {
            text-align: center; padding: 30px 15px; background: rgba(255, 255, 255, 0.75);
            width: 100%; border-bottom: 5px solid var(--ghibli-green);
            backdrop-filter: blur(5px); display: flex; flex-direction: column; align-items: center;
            z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 { margin: 0; color: var(--ghibli-dark-green); font-size: clamp(1.5rem, 5vw, 2.5rem); }
        .sub-title-box { display: inline-block; margin: 12px 0; padding: 6px 20px; border: 2px dashed var(--ghibli-dark-green); border-radius: 15px; background-color: rgba(255, 183, 197, 0.3); color: var(--ghibli-dark-green); font-weight: 600; }

        .container {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
            max-width: 1200px; width: 92%; padding: 30px 0 50px; z-index: 10;
        }
        @media (min-width: 768px) { .container { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; } }

        .game-card {
            background: white; border-radius: 20px; padding: 15px; text-align: center;
            transition: all 0.3s ease; border: 3px solid transparent; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; text-decoration: none; color: inherit; position: relative; overflow: hidden;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--ghibli-leaf); background-color: #f9fff6; }
        .game-icon { font-size: 32px; margin-bottom: 8px; }
        .game-title { font-weight: 600; font-size: 0.85rem; color: var(--ghibli-wood); }
        .new-badge { position: absolute; top: 8px; right: -28px; background: #ff6b6b; color: white; font-size: 0.6rem; padding: 2px 30px; transform: rotate(45deg); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Khu Vườn Tiếng Trung 🌿</h1>
    <div class="sub-title-box">Nga Học HSK</div>
</header>

<div class="container">
    <!-- NEW HSK3 CARD -->
    <a href="HSK3-LESSON1.html" class="game-card">
        <div class="new-badge">MỚI</div>
        <div class="game-icon">🌲</div>
        <div class="game-title">HSK3: BÀI 1</div>
    </a>

    <!-- PREVIOUS CARDS -->
    <a href="pinyin.html" class="game-card">
        <div class="new-badge" style="background: #ffcc00; color: #333;">HOT</div>
        <div class="game-icon">🎹</div>
        <div class="game-title">BẢNG PHÁT ÂM</div>
    </a>
    
    <a href="BO THU 1.html" class="game-card">
        <div class="game-icon">🌱</div>
        <div class="game-title">BỘ THỦ 1</div>
    </a>

    <a href="HSK1-LESSON1-2.html" class="game-card">
        <div class="game-icon">📚</div>
        <div class="game-title">HSK1: Bài 1-2</div>
    </a>
</div>

</body>
</html>
