<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 15: 我是坐飞机来的 - Nga Học HSK</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-pink: #ffb7c5;
            --white: #ffffff;
            --success-color: #2e7d32;
            --error-color: #c62828;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(255, 255, 255, 0.85);
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--ghibli-green);
            backdrop-filter: blur(5px);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 { margin: 0; color: var(--ghibli-dark-green); font-size: 1.1rem; }

        .home-btn {
            background: var(--ghibli-green);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .game-wrapper {
            width: 95%;
            max-width: 700px;
            margin: 20px;
            text-align: center;
        }

        #main-menu, .game-container {
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .menu-btn {
            width: 100%;
            padding: 20px;
            margin: 10px 0;
            border-radius: 20px;
            border: 2px solid var(--ghibli-green);
            background: #f0f9f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
            transition: 0.3s;
        }

        .menu-btn:hover { background: var(--ghibli-green); color: white; }

        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 600; color: var(--ghibli-wood); }
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--ghibli-pink); width: 0%; transition: 0.3s; }

        /* Flashcards */
        .flashcard-container { perspective: 1000px; width: 100%; height: 320px; margin-bottom: 20px; }
        .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: 0.6s; cursor: pointer; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 25px; border: 2px solid var(--ghibli-green); background: white; padding: 25px; box-sizing: border-box;
        }
        .flashcard-back { transform: rotateY(180deg); background: #f9fff9; }
        .cn { font-size: 4.5rem; color: var(--ghibli-dark-green); margin: 0; }
        .pinyin { font-size: 1.4rem; color: #d35400; font-weight: 600; margin-top: 5px; }
        .vi { font-size: 1.6rem; color: var(--ghibli-wood); font-weight: 700; margin: 10px 0; }
        .example-box { background: white; padding: 10px; border-radius: 12px; border-left: 4px solid var(--ghibli-pink); font-size: 0.95rem; width: 100%; text-align: left; }

        /* Questions */
        .question-box { background: #fdfdfd; padding: 20px; border-radius: 20px; border: 2px dashed var(--ghibli-green); margin-bottom: 20px; }
        .answer-zone { min-height: 50px; border: 2px solid #eee; border-radius: 15px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; justify-content: center; background: #fafafa; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .option-card { padding: 12px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; background: white; font-weight: 600; transition: 0.2s; }
        .option-card:hover { border-color: var(--ghibli-green); }
        .option-card.selected { opacity: 0.3; }
        .word-tag { background: var(--ghibli-green); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; }
        
        .feedback { padding: 15px; border-radius: 15px; margin-top: 15px; font-weight: 600; display: none; text-align: left; }
        .explain-text { font-weight: 400; font-size: 0.9rem; margin-top: 8px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 8px; color: #444; }
        .success { background: #e8f5e9; color: var(--success-color); border: 1px solid var(--success-color); }
        .error { background: #ffebee; color: var(--error-color); border: 1px solid var(--error-color); }

        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .btn { padding: 12px 20px; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; font-size: 1rem; flex: 1; }
        .btn-primary { background: var(--ghibli-green); color: white; }
        .btn-secondary { background: #eee; color: #666; }
        
        .review-list { text-align: left; background: #fffaf0; border-radius: 15px; padding: 15px; max-height: 250px; overflow-y: auto; margin: 15px 0; }
        .review-item { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .result-circle { width: 100px; height: 100px; border-radius: 50%; border: 6px solid var(--ghibli-pink); display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 15px auto; }
    </style>
</head>
<body>

<header class="header">
    <h1>Khu Vườn Bài 15 ✈️</h1>
    <a href="index.html" class="home-btn">🏡 Về vườn</a>
</header>

<div class="game-wrapper">
    <div id="main-menu">
        <h2 style="color: var(--ghibli-dark-green);">Giáo viên: Nga Học HSK chào bạn!</h2>
        <button class="menu-btn" onclick="startVocab(false)">
            <span style="font-size: 2rem;">🌸</span>
            <div><h3>Học Từ vựng</h3><p>Thẻ ghi nhớ kèm ví dụ & Pinyin</p></div>
        </button>
        <button class="menu-btn" onclick="startGrammar()">
            <span style="font-size: 2rem;">📝</span>
            <div><h3>Thách thức 20 Câu</h3><p>Đầy đủ Ngữ pháp & Dịch câu</p></div>
        </button>
    </div>

    <div id="vocab-game" class="game-container" style="display:none;">
        <div class="stats"><span>Từ vựng</span><span id="v-count">1/14</span></div>
        <div class="progress-bar"><div id="v-progress" class="progress-inner"></div></div>
        
        <div class="flashcard-container" onclick="document.getElementById('card').classList.toggle('flipped')">
            <div id="card" class="flashcard">
                <div class="flashcard-face">
                    <div id="v-cn" class="cn"></div>
                    <p style="color:#bbb; font-size: 0.8rem; margin-top: 20px;">(Chạm để lật thẻ)</p>
                </div>
                <div class="flashcard-face flashcard-back">
                    <div id="v-p" class="pinyin"></div>
                    <div id="v-vi" class="vi"></div>
                    <div class="example-box">
                        <div id="v-ex-cn" style="color: var(--ghibli-dark-green); font-weight: 600;"></div>
                        <div id="v-ex-p" style="color: #666; font-size: 0.85rem; font-style: italic;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn" style="background:#ffcdd2; color:#c62828" onclick="mark(false)">Chưa nhớ ❌</button>
            <button class="btn" style="background:#c8e6c9; color:#2e7d32" onclick="mark(true)">Đã nhớ ✅</button>
        </div>
    </div>

    <div id="grammar-game" class="game-container" style="display:none;">
        <div class="stats"><span>Câu: <span id="g-count">1</span>/20</span><span>Điểm: <span id="g-score">0</span></span></div>
        <div class="progress-bar"><div id="g-progress" class="progress-inner"></div></div>
        <div class="question-box"><div id="g-q" style="font-size:1.05rem; font-weight:600; color:var(--ghibli-dark-green)"></div></div>
        
        <div id="g-ans-container" style="display:none;">
            <div id="g-ans" class="answer-zone"></div>
        </div>

        <div id="g-opts" class="options-grid"></div>
        
        <div id="g-fb" class="feedback">
            <div id="fb-status"></div>
            <div id="fb-explain" class="explain-text"></div>
        </div>
        
        <div class="btn-group" id="g-btns">
            <button id="btn-reset" class="btn btn-secondary" onclick="resetG()" style="display:none">Làm lại</button>
            <button class="btn btn-primary" onclick="checkG()">Kiểm tra ✅</button>
        </div>
        <button id="g-next" class="btn btn-primary" style="display:none; width:100%; margin-top:10px" onclick="nextG()">Tiếp theo ➔</button>
    </div>

    <div id="result" class="game-container" style="display:none;">
        <h2 id="r-title">Hoàn thành!</h2>
        <div class="result-circle">
            <span id="r-percent" style="font-size: 1.5rem; font-weight: 800; color: var(--ghibli-dark-green);">0%</span>
            <span id="r-label" style="font-size: 0.7rem; color: #666;">KẾT QUẢ</span>
        </div>
        <div id="r-detail" style="margin-bottom:10px;"></div>
        <div id="r-list" class="review-list"></div>
        <button id="btn-re-wrong" class="btn btn-primary" style="display:none; background:var(--ghibli-wood); margin-bottom:10px" onclick="startVocab(true)">Ôn lại từ chưa thuộc 🔄</button>
        <button class="btn btn-primary" style="width:100%" onclick="location.reload()">Quay lại Menu</button>
    </div>
</div>

<script>
    const allVocabs = [
        {cn:'认识', p:'rènshi', vi:'Quen biết', ex_cn:'我不认识他。', ex_p:'Wǒ bù rènshi tā.'},
        {cn:'年', p:'nián', vi:'Năm', ex_cn:'2011年。', ex_p:'èr líng yī yī nián.'},
        {cn:'大学', p:'dàxué', vi:'Đại học', ex_cn:'他在大学工作。', ex_p:'Tā zài dàxué gōngzuò.'},
        {cn:'饭店', p:'fàndiàn', vi:'Nhà hàng', ex_cn:'我们在饭店吃饭。', ex_p:'Wǒmen zài fàndiàn chīfàn.'},
        {cn:'出租车', p:'chūzūchē', vi:'Xe taxi', ex_cn:'坐出租车去。', ex_p:'Zuò chūzūchē qù.'},
        {cn:'一起', p:'yìqǐ', vi:'Cùng nhau', ex_cn:' chúng ta cùng đi nhé.', ex_p:'Wǒmen yìqǐ qù ba.'},
        {cn:'高兴', p:'gāoxìng', vi:'Vui mừng', ex_cn:'认识 ni 很高兴。', ex_p:'Rènshi nǐ hěn gāoxìng.'},
        {cn:'听', p:'tīng', vi:'Nghe', ex_cn:'听，谁在说话？', ex_p:'Tīng, shéi zài shuōhuà?'},
        {cn:'飞机', p:'fēijī', vi:'Máy bay', ex_cn:'我坐飞机回北京。', ex_p:'Wǒ zuò fēijī huí Běijīng.'},
        {cn:'回来', p:'huílái', vi:'Trở về', ex_cn:'他什么时候回来？', ex_p:'Tā shénme shíhou huílái?'},
        {cn:'张', p:'zhāng', vi:'Họ Trương / Tờ', ex_cn:'张先生。', ex_p:'Zhāng xiānsheng.'},
        {cn:'先生', p:'xiānsheng', vi:'Ông / Ngài', ex_cn:'王先生在那儿。', ex_p:'Wáng xiānsheng zài nàr.'},
        {cn:'怎么', p:'zěnme', vi:'Thế nào', ex_cn:'你是怎么来的？', ex_p:'Nǐ shì zěnme lái de?'},
        {cn:'桌子', p:'zhuōzi', vi:'Cái bàn', ex_cn:'桌子上有电脑。', ex_p:'Zhuōzi shang yǒu diànnǎo.'}
    ];

    const grammars = [
        // Trắc nghiệm (10 câu)
        {type:'choice', q:'Từ nào sau đây có nghĩa là "quen biết"?', opts:['A. 学习', 'B. 认识', 'C. 喜欢', 'D. 身体'], ans:'B. 认识', explain:'"认识" (rènshi) nghĩa là quen biết ai đó.'},
        {type:'choice', q:'Cách đọc năm "2011年" đúng quy tắc là gì?', opts:['A. èr qiān yī shí yī nián', 'B. èr líng yī yī nián', 'C. èr líng yāo yāo nián', 'D. liǎng líng yāo yāo nián'], ans:'B. èr líng yī yī nián', explain:'Năm trong tiếng Trung được đọc bằng cách đọc từng con số đơn lẻ.'},
        {type:'choice', q:'Trong câu "我是昨天来的", từ nào có thể lược bỏ mà ý nghĩa không thay đổi?', opts:['A. 我', 'B. 是', 'C. 的', 'D. 昨天'], ans:'B. 是', explain:'Trong câu khẳng định cấu trúc "是...的", từ "sự" (là) có thể lược bỏ.'},
        {type:'choice', q:'Để phủ định câu "他是坐飞机来的", ta nói thế nào?', opts:['A. 他没坐飞机来的', 'B. 他不坐飞机来的', 'C. 他不是坐飞机来的', 'D. 他是没坐飞机来的'], ans:'C. 他不是坐飞机来的', explain:'Phủ định của cấu trúc nhấn mạnh "是... de" luôn là "不是... de".'},
        {type:'choice', q:'Từ "一起" (yìqǐ) trong câu "我们是一起来 an" có nghĩa là gì?', opts:['A. Một lát', 'B. Cùng nhau', 'C. Một ít', 'D. Một lần'], ans:'B. Cùng nhau', explain:'"一起" có nghĩa là cùng nhau làm một việc gì đó.'},
        {type:'choice', q:'Khi gặp một người bạn mới, bạn nên nói: "认识你很______。"', opts:['A. 漂亮', 'B. 好吃', 'C. 高兴', 'D. 怎么样'], ans:'C. 高兴', explain:'"认识你很高兴" là câu chào hỏi lịch sự: Rất vui được quen biết bạn.'},
        {type:'choice', q:'Từ nào chỉ phương tiện "xe taxi"?', opts:['A. 飞机', 'B. 火车', 'C. 出租车', 'D. 电脑'], ans:'C. 出出租车', explain:'"出租车" (chūzūchē) là xe taxi.'},
        {type:'choice', q:'Thứ tự diễn đạt thời gian đúng trong tiếng Trung là:', opts:['A. Năm-Tháng-Ngày-Thứ', 'B. Thứ-Ngày-Tháng-Năm', 'C. Ngày-Tháng-Năm-Thứ', 'D. Tháng-Ngày-Năm-Thứ'], ans:'A. Năm-Tháng-Ngày-Thứ', explain:'Tiếng Trung đi từ đơn vị lớn (Năm) đến đơn vị nhỏ (Thứ).'},
        {type:'choice', q:'Câu "这是在北京买" thiếu thành phần nào ở cuối?', opts:['A. 了', 'B. 呢', 'C. 的', 'D. 吧'], ans:'C. 的', explain:'Cấu trúc "是...的" dùng để nhấn mạnh nơi chốn đã xảy ra hành động.'},
        {type:'choice', q:'"Nghe ông Trương nói" trong tiếng Trung là gì?', opts:['A. 看张先生说', 'B. 听张先生说', 'C. 问张先生 nói', 'D. 学张先生说'], ans:'B. 听张先生说', explain:'"听" (tīng) là nghe.'},

        // Sắp xếp (5 câu)
        {type:'sort', q:'Sắp xếp: "Chúng tôi quen biết nhau năm 2011."', opts:['认识', '的', '2011年', '我们', 'sự'], ans:'我们是2011年认识的', explain:'Chủ ngữ + 是 + thời gian + động từ + 的.'},
        {type:'sort', q:'Sắp xếp: "Các bạn đến nhà hàng bằng cách nào?"', opts:['怎么', '你们', '来', '饭店', '是', '的'], ans:'你们是怎么来饭店的', explain:'"怎么" dùng để hỏi cách thức (bằng phương tiện gì).'},
        {type:'sort', q:'Sắp xếp: "Ông Trương là lái xe đến."', opts:['张先生', '开车', 'sự', '来的'], ans:'张先生是开车来的', explain:'Nhấn mạnh cách thức: Lái xe (开车).'},
        {type:'sort', q:'Sắp xếp: "Tôi không phải tới bằng taxi."', opts:['不', '我', '坐', '来的', '出租车', 'sự'], ans:'我不是坐出租车来的', explain:'Câu phủ định nhấn mạnh cách thức.'},
        {type:'sort', q:'Sắp xếp: "Chúng tôi học đại học cùng nhau."', opts:['大学', '一起', '我们', 'sự', '读', '的'], ans:'我们是一起读大学的', explain:'Nhấn mạnh cùng nhau (一起) làm gì đó.'},

        // Dịch & Điền (5 câu)
        {type:'choice', q:'Dịch: "Tôi đáp máy bay đến Bắc Kinh."', opts:['A. 我坐飞机去北京了', 'B. 我是坐飞机去北京的', 'C. 我去北京坐飞机', 'D. 我坐飞机是的北京'], ans:'B. 我是坐飞机去北京的', explain:'Sử dụng cấu trúc "是...的" để nhấn mạnh phương tiện máy bay.'},
        {type:'choice', q:'Dịch: "Rất vui được quen biết cô Lý."', opts:['A. 认识李小姐很高兴', 'B. 高兴认识李小姐', 'C. 我认识小姐李', 'D. 认识小姐李的高兴'], ans:'A. 认识李小姐很高兴', explain:'Đúng ngữ pháp câu xã giao.'},
        {type:'choice', q:'Điền từ: "2008年8月8号，______五。"', opts:['A. 星期', 'B. 月', 'C. 号', 'D. 年'], ans:'A. 星期', explain:'"星期五" nghĩa là thứ Sáu.'},
        {type:'choice', q:'Hoàn thành: "你们 ______ 哪儿认识 ______ ?"', opts:['A. 在...了', 'B. 是...的', 'C. 有...没', 'D. 想...吗'], ans:'B. 是... de', explain:'Dùng để hỏi về địa điểm đã xảy ra việc quen biết.'},
        {type:'choice', q:'Dịch: "Cái ly này được mua vào hôm qua."', opts:['A. 这个杯子昨天买的', 'B. 这个杯子是昨天买的', 'C. 昨天买 cái này 杯子', 'D. 这个杯子昨天 là 的买'], ans:'B. Cái này 杯子 là 昨天买的', explain:'Nhấn mạnh thời gian đã xảy ra hành động mua.'}
    ];

    let currentList = [], vIdx = 0, gIdx = 0, score = 0, vWrong = [], gSelected = [];

    // --- VOCAB ---
    function startVocab(isReview) {
        document.getElementById('main-menu').style.display='none';
        document.getElementById('result').style.display='none';
        document.getElementById('vocab-game').style.display='block';
        currentList = isReview ? [...vWrong] : [...allVocabs];
        vIdx = 0; vWrong = isReview ? [] : vWrong;
        showV();
    }
    function showV() {
        const v = currentList[vIdx];
        document.getElementById('v-cn').innerText = v.cn;
        document.getElementById('v-p').innerText = v.p;
        document.getElementById('v-vi').innerText = v.vi;
        document.getElementById('v-ex-cn').innerText = v.ex_cn;
        document.getElementById('v-ex-p').innerText = v.ex_p;
        document.getElementById('v-count').innerText = `${vIdx+1}/${currentList.length}`;
        document.getElementById('v-progress').style.width = `${(vIdx+1)/currentList.length*100}%`;
        document.getElementById('card').classList.remove('flipped');
    }
    function mark(isOk) {
        if(!isOk) {
            const exists = vWrong.find(x => x.cn === currentList[vIdx].cn);
            if(!exists) vWrong.push(currentList[vIdx]);
        }
        if(vIdx < currentList.length - 1) { vIdx++; showV(); }
        else endVocab();
    }
    function endVocab() {
        document.getElementById('vocab-game').style.display='none';
        document.getElementById('result').style.display='block';
        const percent = Math.round(((currentList.length - vWrong.length)/currentList.length)*100);
        document.getElementById('r-percent').innerText = percent + "%";
        document.getElementById('r-detail').innerText = `Bạn đã thuộc ${currentList.length - vWrong.length}/${currentList.length} từ.`;
        let html = '';
        if(vWrong.length > 0) {
            html = '<b>Cần ôn lại:</b>';
            vWrong.forEach(v => html += `<div class="review-item"><span>${v.cn}</span><span>${v.vi}</span></div>`);
            document.getElementById('btn-re-wrong').style.display = 'block';
        } else {
            html = '🌟 Tuyệt vời! Bạn đã thuộc hết từ vựng!';
            document.getElementById('btn-re-wrong').style.display = 'none';
        }
        document.getElementById('r-list').innerHTML = html;
    }

    // --- GRAMMAR ---
    function startGrammar() {
        document.getElementById('main-menu').style.display='none';
        document.getElementById('grammar-game').style.display='block';
        gIdx = 0; score = 0;
        showG();
    }
    function showG() {
        const g = grammars[gIdx];
        document.getElementById('g-q').innerText = g.q;
        document.getElementById('g-count').innerText = gIdx+1;
        document.getElementById('g-progress').style.width = `${(gIdx+1)/20*100}%`;
        document.getElementById('g-fb').style.display = 'none';
        document.getElementById('g-next').style.display = 'none';
        document.getElementById('g-btns').style.display = 'flex';
        gSelected = [];
        
        const ansZone = document.getElementById('g-ans');
        const ansContainer = document.getElementById('g-ans-container');
        if(g.type === 'sort') {
            ansContainer.style.display = 'block'; ansZone.innerHTML = '';
            document.getElementById('btn-reset').style.display = 'block';
        } else {
            ansContainer.style.display = 'none';
            document.getElementById('btn-reset').style.display = 'none';
        }

        let html = '';
        const opts = [...g.opts].sort(() => Math.random() - 0.5);
        opts.forEach((o, i) => html += `<div class="option-card" id="opt-${i}" onclick="handleG('${o}', 'opt-${i}')">${o}</div>`);
        document.getElementById('g-opts').innerHTML = html;
    }
    function handleG(val, id) {
        const g = grammars[gIdx];
        if(g.type === 'choice') {
            document.querySelectorAll('.option-card').forEach(e => e.style.borderColor = '#eee');
            document.getElementById(id).style.borderColor = 'var(--ghibli-green)';
            gSelected = [val];
        } else {
            const el = document.getElementById(id);
            if(el.classList.contains('selected')) return;
            el.classList.add('selected');
            gSelected.push(val);
            const tag = document.createElement('div'); tag.className = 'word-tag';
            tag.innerText = val; tag.onclick = () => { el.classList.remove('selected'); gSelected = gSelected.filter(w => w !== val); tag.remove(); };
            document.getElementById('g-ans').appendChild(tag);
        }
    }
    function resetG() { gSelected = []; document.getElementById('g-ans').innerHTML = ''; document.querySelectorAll('.option-card').forEach(e => e.classList.remove('selected')); }
    function checkG() {
        if(gSelected.length === 0) return;
        const g = grammars[gIdx];
        const user = g.type === 'sort' ? gSelected.join('') : gSelected[0];
        const correct = g.ans.replace(/\s/g,'');
        const isTrue = (g.type === 'choice') ? (gSelected[0] === g.ans) : (user.replace(/\s/g,'') === correct);

        const fb = document.getElementById('g-fb');
        fb.style.display = 'block';
        document.getElementById('fb-explain').innerText = g.explain;
        if(isTrue) {
            score += 5; document.getElementById('fb-status').innerText = "Chính xác! 🌟";
            fb.className = "feedback success";
        } else {
            document.getElementById('fb-status').innerText = `Chưa đúng. Đáp án: ${g.ans}`;
            fb.className = "feedback error";
        }
        document.getElementById('g-score').innerText = score;
        document.getElementById('g-btns').style.display = 'none';
        document.getElementById('g-next').style.display = 'block';
    }
    function nextG() {
        if(gIdx < 19) { gIdx++; showG(); }
        else {
            document.getElementById('grammar-game').style.display='none';
            document.getElementById('result').style.display='block';
            document.getElementById('r-percent').innerText = score + "";
            document.getElementById('r-label').innerText = "ĐIỂM SỐ";
            document.getElementById('r-detail').innerText = score >= 80 ? "Giáo viên Nga Học HSK khen bạn rất giỏi! 🌸" : "Bạn cần ôn lại cấu trúc 是...的 nhé! 📚";
            document.getElementById('r-list').innerHTML = "";
            document.getElementById('btn-re-wrong').style.display = 'none';
        }
    }
</script>
</body>
</html>
