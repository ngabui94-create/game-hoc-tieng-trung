<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 15: 我是坐飞机来的 - Nga Học HSK</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-pink: #ffb7c5;
            --white: #ffffff;
            --success-color: #2e7d32;
            --error-color: #c62828;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(255, 255, 255, 0.85);
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--ghibli-green);
            backdrop-filter: blur(5px);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 { margin: 0; color: var(--ghibli-dark-green); font-size: 1.1rem; }

        .home-btn {
            background: var(--ghibli-green);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .game-wrapper {
            width: 95%;
            max-width: 700px;
            margin: 20px;
            text-align: center;
        }

        #main-menu, .game-container {
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .menu-btn {
            width: 100%;
            padding: 20px;
            margin: 10px 0;
            border-radius: 20px;
            border: 2px solid var(--ghibli-green);
            background: #f0f9f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
            transition: 0.3s;
        }

        .menu-btn:hover { background: var(--ghibli-green); color: white; }

        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 600; color: var(--ghibli-wood); }
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--ghibli-pink); width: 0%; transition: 0.3s; }

        /* Flashcards Updated */
        .flashcard-container { perspective: 1000px; width: 100%; height: 320px; margin-bottom: 20px; }
        .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: 0.6s; cursor: pointer; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 25px; border: 2px solid var(--ghibli-green); background: white; padding: 25px; box-sizing: border-box;
        }
        .flashcard-back { transform: rotateY(180deg); background: #f9fff9; }
        .cn { font-size: 5rem; color: var(--ghibli-dark-green); margin: 0; }
        .pinyin { font-size: 1.4rem; color: #d35400; font-weight: 600; margin-top: 5px; }
        .vi { font-size: 1.6rem; color: var(--ghibli-wood); font-weight: 700; margin: 10px 0; }
        .example-box { background: white; padding: 10px; border-radius: 12px; border-left: 4px solid var(--ghibli-pink); font-size: 1rem; width: 100%; }

        /* Buttons & Feedback */
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .btn { padding: 12px 20px; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; font-size: 1rem; flex: 1; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-success { background: var(--success-color); color: white; }
        .btn-error { background: var(--error-color); color: white; }
        .btn-primary { background: var(--ghibli-green); color: white; width: 100%; }

        .question-box { background: #fdfdfd; padding: 20px; border-radius: 20px; border: 2px dashed var(--ghibli-green); margin-bottom: 20px; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .option-card { padding: 12px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; background: white; font-weight: 600; }
        .feedback { padding: 15px; border-radius: 15px; margin-top: 15px; font-weight: 600; display: none; text-align: left; }
        .explain-text { font-weight: 400; font-size: 0.9rem; margin-top: 8px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 8px; }
        .success { background: #e8f5e9; color: var(--success-color); border: 1px solid var(--success-color); }
        .error { background: #ffebee; color: var(--error-color); border: 1px solid var(--error-color); }

        .review-list { text-align: left; background: #fffaf0; border-radius: 15px; padding: 15px; max-height: 250px; overflow-y: auto; margin: 15px 0; }
        .review-item { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        
        .result-circle { width: 120px; height: 120px; border-radius: 50%; border: 8px solid var(--ghibli-pink); display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 20px auto; }
    </style>
</head>
<body>

<header class="header">
    <h1>Khu Vườn Bài 15 ✈️</h1>
    <a href="index.html" class="home-btn">🏡 Về vườn</a>
</header>

<div class="game-wrapper">
    <div id="main-menu">
        <h2 style="color: var(--ghibli-dark-green);">Chào mừng đến với lớp của giáo viên: Nga Học HSK!</h2>
        <button class="menu-btn" onclick="startVocab(false)">
            <span style="font-size: 2rem;">🌸</span>
            <div><h3>Học Từ vựng</h3><p>Flashcards thông minh kèm ví dụ</p></div>
        </button>
        <button class="menu-btn" onclick="startGrammar()">
            <span style="font-size: 2rem;">📝</span>
            <div><h3>Thách thức 20 Câu hỏi</h3><p>Kiểm tra trình độ Bài 15</p></div>
        </button>
    </div>

    <div id="vocab-game" class="game-container" style="display:none;">
        <div class="stats"><span>Học từ vựng</span><span id="v-count">1/14</span></div>
        <div class="progress-bar"><div id="v-progress" class="progress-inner"></div></div>
        
        <div class="flashcard-container" onclick="document.getElementById('card').classList.toggle('flipped')">
            <div id="card" class="flashcard">
                <div class="flashcard-face">
                    <div id="v-cn" class="cn"></div>
                    <p style="color:#bbb; font-size: 0.9rem; margin-top: 20px;">(Chạm để xem nghĩa và ví dụ)</p>
                </div>
                <div class="flashcard-face flashcard-back">
                    <div id="v-p" class="pinyin"></div>
                    <div id="v-vi" class="vi"></div>
                    <div class="example-box">
                        <div id="v-ex-cn" style="color: var(--ghibli-dark-green); font-weight: 600;"></div>
                        <div id="v-ex-p" style="color: #666; font-size: 0.9rem;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-error" onclick="mark(false)">Chưa nhớ ❌</button>
            <button class="btn btn-success" onclick="mark(true)">Đã nhớ ✅</button>
        </div>
    </div>

    <div id="grammar-game" class="game-container" style="display:none;">
        <div class="stats"><span>Câu: <span id="g-count">1</span>/20</span><span>Điểm: <span id="g-score">0</span></span></div>
        <div class="progress-bar"><div id="g-progress" class="progress-inner"></div></div>
        <div class="question-box"><div id="g-q" style="font-size:1.1rem; font-weight:600; color:var(--ghibli-dark-green)"></div></div>
        <div id="g-opts" class="options-grid"></div>
        <div id="g-fb" class="feedback">
            <div id="fb-status"></div>
            <div id="fb-explain" class="explain-text"></div>
        </div>
        <button id="g-next" class="btn btn-primary" style="display:none; margin-top:10px" onclick="nextG()">Tiếp theo ➔</button>
    </div>

    <div id="result" class="game-container" style="display:none;">
        <h2 id="r-title">Kết quả học tập</h2>
        <div class="result-circle">
            <span id="r-percent" style="font-size: 1.8rem; font-weight: 800; color: var(--ghibli-dark-green);">0%</span>
            <span style="font-size: 0.8rem; color: #666;">Đã nhớ</span>
        </div>
        <div id="r-detail" style="margin-bottom:10px; font-weight: 600;"></div>
        <div id="r-list" class="review-list"></div>
        
        <div id="r-actions">
            <button id="btn-review-wrong" class="btn btn-primary" style="margin-bottom:10px; background: var(--ghibli-wood); display:none;" onclick="startVocab(true)">Ôn lại từ chưa thuộc 🔄</button>
            <button class="btn btn-primary" onclick="location.reload()">Quay lại Menu</button>
        </div>
    </div>
</div>

<script>
    const allVocabs = [
        {cn:'认识', p:'rènshi', vi:'Quen biết', ex_cn:'我不认识他。', ex_p:'Wǒ bù rènshi tā.'},
        {cn:'年', p:'nián', vi:'Năm', ex_cn:'2011年。', ex_p:'èr líng yī yī nián.'},
        {cn:'大学', p:'dàxué', vi:'Đại học', ex_cn:'他在大学工作。', ex_p:'Tā zài dàxué gōngzuò.'},
        {cn:'饭店', p:'fàndiàn', vi:'Nhà hàng', ex_cn:'我们在饭店吃饭。', ex_p:'Wǒmen zài fàndiàn chīfàn.'},
        {cn:'出租车', p:'chūzūchē', vi:'Xe taxi', ex_cn:'坐出租车去。', ex_p:'Zuò chūzūchē qù.'},
        {cn:'一起', p:'yìqǐ', vi:'Cùng nhau', ex_cn:'我们一起去吧。', ex_p:'Wǒmen yìqǐ qù ba.'},
        {cn:'高兴', p:'gāoxìng', vi:'Vui mừng', ex_cn:'认识你很高兴。', ex_p:'Rènshi nǐ hěn gāoxìng.'},
        {cn:'听', p:'tīng', vi:'Nghe', ex_cn:'听，谁在说话？', ex_p:'Tīng, shéi zài shuōhuà?'},
        {cn:'飞机', p:'fēijī', vi:'Máy bay', ex_cn:'我坐飞机回北京。', ex_p:'Wǒ zuò fēijī huí Běijīng.'},
        {cn:'回来', p:'huílái', vi:'Trở về', ex_cn:'他什么时候回来？', ex_p:'Tā shénme shíhou huílái?'},
        {cn:'张', p:'zhāng', vi:'Họ Trương / Tờ', ex_cn:'张先生。', ex_p:'Zhāng xiānsheng.'},
        {cn:'先生', p:'xiānsheng', vi:'Ông / Ngài', ex_cn:'王先生在那儿。', ex_p:'Wáng xiānsheng zài nàr.'},
        {cn:'怎么', p:'zěnme', vi:'Thế nào', ex_cn:'你是怎么来的？', ex_p:'Nǐ shì zěnme lái de?'},
        {cn:'桌子', p:'zhuōzi', vi:'Cái bàn', ex_cn:'桌子上有电脑。', ex_p:'Zhuōzi shang yǒu diànnǎo.'}
    ];

    const grammars = [
        {type:'choice', q:'Từ nào sau đây có nghĩa là "quen biết"?', opts:['A. 学习', 'B. 认识', 'C. 喜欢', 'D. 身体'], ans:'B. 认识', explain:'"认识" (rènshi) nghĩa là quen biết.'},
        {type:'choice', q:'Cách đọc năm "2011年" đúng quy tắc là gì?', opts:['A. èr qiān yī shí yī nián', 'B. èr líng yī yī nián', 'C. èr líng yāo yāo nián', 'D. liǎng líng yāo yāo nián'], ans:'B. èr líng yī yī nián', explain:'Năm trong tiếng Trung được đọc từng con số một.'},
        {type:'choice', q:'Trong câu "我是昨天來的", từ nào có thể lược bỏ mà ý nghĩa không thay đổi?', opts:['A. 我', 'B. 是', 'C. 的', 'D. 昨天'], ans:'B. 是', explain:'Trong cấu trúc khẳng định "是...的", từ "是" có thể lược bỏ.'},
        {type:'choice', q:'Để phủ định câu "他是坐飞机来的", ta nói thế nào?', opts:['A. 他没坐飞机來的', 'B. 他不坐飞机来的', 'C. 他不是坐飞机來的', 'D. 他是没坐飞机来的'], ans:'C. 他不是坐飞机来的', explain:'Phủ định của cấu trúc này là "不是...的".'},
        {type:'choice', q:'Dịch: "Tôi đáp máy bay đến Bắc Kinh."', opts:['A. 我坐飞机去北京了', 'B. 我是坐飞机去北京的', 'C. 我去北京坐飞机', 'D. 我坐飞机是的北京'], ans:'B. 我 là 坐飞机去北京的', explain:'Dùng "是...的" để nhấn mạnh cách thức đã xảy ra.'}
        // ... (Các câu hỏi khác bạn có thể copy từ bản cũ vào đây)
    ];

    let currentVocabList = [];
    let vIdx = 0, gIdx = 0, score = 0, vWrong = [], vRightCount = 0;

    // --- VOCAB LOGIC ---
    function startVocab(isReviewWrong) {
        document.getElementById('main-menu').style.display='none';
        document.getElementById('result').style.display='none';
        document.getElementById('vocab-game').style.display='block';
        
        if (isReviewWrong) {
            currentVocabList = [...vWrong];
        } else {
            currentVocabList = [...allVocabs];
        }
        
        vIdx = 0;
        vRightCount = 0;
        vWrong = [];
        showV();
    }

    function showV() {
        const v = currentVocabList[vIdx];
        document.getElementById('v-cn').innerText = v.cn;
        document.getElementById('v-p').innerText = v.p;
        document.getElementById('v-vi').innerText = v.vi;
        document.getElementById('v-ex-cn').innerText = v.ex_cn;
        document.getElementById('v-ex-p').innerText = v.ex_p;
        
        document.getElementById('v-count').innerText = `${vIdx+1}/${currentVocabList.length}`;
        document.getElementById('v-progress').style.width = `${(vIdx+1)/currentVocabList.length*100}%`;
        document.getElementById('card').classList.remove('flipped');
    }

    function mark(isOk) {
        if(isOk) {
            vRightCount++;
        } else {
            vWrong.push(currentVocabList[vIdx]);
        }

        if(vIdx < currentVocabList.length - 1) {
            vIdx++;
            showV();
        } else {
            endVocab();
        }
    }

    function endVocab() {
        document.getElementById('vocab-game').style.display='none';
        document.getElementById('result').style.display='block';
        
        const total = currentVocabList.length;
        const percent = Math.round((vRightCount / total) * 100);
        
        document.getElementById('r-percent').innerText = percent + "%";
        document.getElementById('r-detail').innerText = `Bạn đã thuộc ${vRightCount}/${total} từ.`;
        
        let html = '';
        if(vWrong.length > 0) {
            html = '<p style="color:var(--error-color)">Danh sách từ cần ôn lại:</p>';
            vWrong.forEach(v => {
                html += `<div class="review-item"><span><b>${v.cn}</b> (${v.p})</span><span>${v.vi}</span></div>`;
            });
            document.getElementById('btn-review-wrong').style.display = 'block';
        } else {
            html = '<p style="color:var(--success-color)">🎉 Tuyệt vời! Bạn đã thuộc tất cả từ trong danh sách này!</p>';
            document.getElementById('btn-review-wrong').style.display = 'none';
        }
        document.getElementById('r-list').innerHTML = html;
    }

    // --- GRAMMAR LOGIC (GIỮ NGUYÊN MÔ HÌNH NHƯNG VIẾT LẠI HÀM) ---
    function startGrammar() {
        document.getElementById('main-menu').style.display='none';
        document.getElementById('grammar-game').style.display='block';
        showG();
    }

    function showG() {
        const g = grammars[gIdx];
        document.getElementById('g-q').innerText = g.q;
        document.getElementById('g-count').innerText = gIdx+1;
        document.getElementById('g-progress').style.width = `${(gIdx+1)/grammars.length*100}%`;
        document.getElementById('g-fb').style.display = 'none';
        document.getElementById('g-next').style.display = 'none';
        
        let html = '';
        g.opts.forEach(o => {
            html += `<div class="option-card" onclick="checkG('${o}')">${o}</div>`;
        });
        document.getElementById('g-opts').innerHTML = html;
    }

    function checkG(selected) {
        const g = grammars[gIdx];
        const fb = document.getElementById('g-fb');
        fb.style.display = 'block';
        document.getElementById('fb-explain').innerText = g.explain;
        
        if(selected === g.ans) {
            score += 5;
            document.getElementById('fb-status').innerText = "Chính xác! 🌟";
            fb.className = "feedback success";
        } else {
            document.getElementById('fb-status').innerText = `Chưa đúng. Đáp án là: ${g.ans}`;
            fb.className = "feedback error";
        }
        document.getElementById('g-score').innerText = score;
        document.getElementById('g-next').style.display = 'block';
        document.getElementById('g-opts').style.pointerEvents = 'none';
    }

    function nextG() {
        document.getElementById('g-opts').style.pointerEvents = 'auto';
        if(gIdx < grammars.length - 1) {
            gIdx++;
            showG();
        } else {
            document.getElementById('grammar-game').style.display='none';
            document.getElementById('result').style.display='block';
            document.getElementById('r-percent').innerText = score + "";
            document.getElementById('r-detail').innerText = "Điểm thách thức của bạn";
            document.getElementById('btn-review-wrong').style.display = 'none';
            document.getElementById('r-list').innerHTML = score >= 20 ? "Giáo viên Nga Học HSK khen bạn rất giỏi! 🌸" : "Cố gắng lên nhé! 📚";
        }
    }
</script>
</body>
</html>
