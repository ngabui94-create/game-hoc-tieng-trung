<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK4 Bài 18 - 科技与世界</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+SC:wght@500;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #a8d5ba;
            --ghibli-brown: #d4a373;
            --ghibli-sky: #caf0f8;
            --ghibli-wood: #6d4c41;
            --ghibli-dark-green: #4f7942;
        }

        body {
            font-family: 'Quicksand', 'Nunito', sans-serif;
            background: linear-gradient(180deg, var(--ghibli-sky) 0%, #fff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chinese-text { font-family: 'Noto Sans SC', sans-serif; font-weight: 700; }
        .chinese-sub { font-family: 'Noto Sans SC', sans-serif; }

        .ghibli-card {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid var(--ghibli-wood);
            border-radius: 20px;
            box-shadow: 0 10px 0 var(--ghibli-brown);
        }

        .btn-ghibli {
            background-color: var(--ghibli-green);
            color: var(--ghibli-wood);
            border: 2px solid var(--ghibli-wood);
            border-radius: 12px;
            transition: all 0.2s;
            font-weight: bold;
            padding: 12px;
            cursor: pointer;
        }

        .btn-ghibli:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 5px 0 var(--ghibli-brown);
            background-color: #95c7a9;
        }
        
        .btn-ghibli:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-home {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: white;
            border: 2px solid var(--ghibli-wood);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 var(--ghibli-brown);
            cursor: pointer;
        }

        .flashcard-inner {
            position: relative;
            width: 100%; height: 380px;
            transition: transform 0.6s; transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard-inner.is-flipped { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 15px;
            padding: 24px;
            border: 2px solid var(--ghibli-wood);
        }
        .flashcard-front { background-color: #fff; }
        .flashcard-back { background-color: #fef3c7; transform: rotateY(180deg); }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--ghibli-brown); border-radius: 10px; }
        .hidden { display: none; }

        .circle-stat {
            position: relative;
            width: 100px; height: 100px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border: 6px solid #f3f4f6;
        }
        .stat-green { border-color: #a8d5ba; color: #4f7942; }
        .stat-red { border-color: #fca5a5; color: #b91c1c; }

        .dictation-input {
            width: 100%;
            padding: 15px;
            font-size: 1.5rem;
            text-align: center;
            border: 3px dashed var(--ghibli-brown);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
        .dictation-input:focus {
            border-color: var(--ghibli-green);
            background-color: #f0fdf4;
        }
    </style>
</head>
<body>

    <button onclick="window.location.href='index.html'" class="btn-home" title="Về Vườn">🏡</button>

    <div id="game-container" class="w-full max-w-xl px-4 mt-16 mb-10">
        <!-- START SCREEN -->
        <div id="start-screen" class="ghibli-card p-8 text-center">
            <h1 class="text-3xl font-bold text-amber-900 mb-2">HSK4 - Bài 18</h1>
            <h2 class="text-2xl text-emerald-700 font-bold mb-4 chinese-text">科技与世界</h2>
            <p class="text-sm text-gray-600 mb-4 font-bold">Giáo viên: Nga Học HSK</p>
            <div class="mx-auto mb-6 text-6xl">🌿</div>
            
            <div class="grid grid-cols-1 gap-4">
                <button onclick="startFlashcards(vocabulary)" class="btn-ghibli text-lg relative">
                    🎴 Phần 1: Học Từ Vựng  <span id="check-flashcard" class="absolute right-4 hidden">✅</span>
                </button>
                
                <button onclick="openDictationMenu()" class="btn-ghibli text-lg relative" style="background-color: #fef3c7;">
                    🎧 Phần 2: Nghe Chép Bài Khóa <span id="check-dictation" class="absolute right-4 hidden">✅</span>
                </button>
                
                <button id="btn-form" class="btn-ghibli text-lg mt-2 transition-all duration-500" style="background-color: #e5e7eb; border-color: #9ca3af; color: #6b7280;" disabled>
                    🔒 Phần 3: Bài Tập 
                </button>
            </div>
        </div>

        <!-- FLASHCARD SCREEN -->
        <div id="flashcard-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <button onclick="returnToStart()" class="text-amber-700 text-sm font-bold hover:underline">🔙 Về Menu</button>
                <div class="text-amber-900 font-bold px-3 py-1 bg-amber-100 rounded-full text-xs">
                    Thẻ: <span id="card-index">1</span> / <span id="card-total">44</span>
                </div>
            </div>
            <div class="mb-6">
                <div id="flashcard-inner" class="flashcard-inner" onclick="flipCard()">
                    <div class="flashcard-front shadow-lg">
                        <h2 id="card-hanzi" class="chinese-text text-6xl text-amber-900 leading-tight"></h2>
                        <p class="mt-8 text-sm text-amber-600 animate-pulse font-bold">Chạm để lật thẻ 👆</p>
                    </div>
                    <div class="flashcard-back shadow-lg overflow-y-auto custom-scroll">
                        <h3 id="card-pinyin" class="text-3xl font-bold text-emerald-700 mb-1"></h3>
                        <p id="card-mean" class="text-xl text-amber-900 mb-4 font-bold border-b-2 border-amber-200 pb-2 w-full text-center"></p>
                        <div class="text-left w-full space-y-3">
                            <p id="card-example-cn" class="chinese-sub text-xl text-amber-800 leading-relaxed font-medium"></p>
                            <p id="card-example-py" class="text-sm text-emerald-600 italic font-semibold"></p>
                            <p id="card-example-vi" class="text-sm text-gray-600 bg-white p-2 rounded-lg border border-amber-100"></p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="markCard(false)" class="bg-rose-100 border-2 border-rose-400 text-rose-700 p-4 rounded-xl font-bold hover:bg-rose-200">Chưa thuộc</button>
                <button onclick="markCard(true)" class="bg-emerald-100 border-2 border-emerald-400 text-emerald-700 p-4 rounded-xl font-bold hover:bg-emerald-200">Đã thuộc</button>
            </div>
        </div>

        <!-- FLASHCARD STATS -->
        <div id="flashcard-stat-screen" class="ghibli-card p-8 text-center hidden">
             <h2 class="text-3xl font-bold text-amber-900 mb-8">Kết quả ghi nhớ</h2>
             <div class="flex justify-around items-center mb-8">
                <div class="circle-stat stat-green">
                    <span id="stat-learned-percent" class="text-xl font-bold">0%</span>
                    <span class="text-[10px] uppercase font-bold">Thuộc</span>
                </div>
                <div class="circle-stat stat-red">
                    <span id="stat-unlearned-percent" class="text-xl font-bold">0%</span>
                    <span class="text-[10px] uppercase font-bold">Cần ôn</span>
                </div>
             </div>
             <div class="text-left mb-6">
                <p class="font-bold text-amber-900 mb-2">Danh sách cần lưu ý:</p>
                <div id="unlearned-list" class="max-h-48 overflow-y-auto custom-scroll bg-amber-50 rounded-lg border border-amber-200 p-2 space-y-2"></div>
             </div>
             <div class="grid grid-cols-1 gap-3">
                 <button id="btn-relearn" onclick="relearnUnlearned()" class="btn-ghibli w-full bg-amber-500 text-white border-amber-700 hidden">🔄 Học lại các từ chưa thuộc</button>
                 <button onclick="endFlashcardSession()" class="btn-ghibli w-full">🔙 Hoàn thành & Về Menu</button>
             </div>
        </div>

        <!-- DICTATION MENU -->
        <div id="dictation-menu-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-6">
                <button onclick="returnToStart()" class="text-amber-700 text-sm font-bold hover:underline">🔙 Về Menu Chính</button>
                <h2 class="text-xl font-bold text-emerald-800">Chọn Bài Khóa</h2>
            </div>
            <div id="lesson-list" class="grid grid-cols-1 gap-3"></div>
        </div>

        <!-- DICTATION GAME -->
        <div id="dictation-screen" class="ghibli-card p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <button onclick="backToDictationMenu()" class="text-amber-700 text-sm font-bold hover:underline">🔙 Về DS Bài khóa</button>
                <div class="text-emerald-800 font-bold text-sm" id="dictation-title-display">Bài 18: <span id="dict-step">1</span>/10</div>
            </div>
            
            <div class="flex flex-col items-center justify-center space-y-4 mt-2">
                <div class="w-full bg-emerald-50 p-4 rounded-xl border-2 border-emerald-200 shadow-sm">
                    <audio id="lesson-audio-player" controls class="w-full h-10 outline-none rounded-lg"></audio>
                </div>

                <div class="w-full bg-white border-2 border-dashed border-amber-300 p-3 rounded-xl text-center">
                    <p class="text-xs text-amber-800 font-bold mb-1">GỢI Ý CÂU ĐANG NGHE:</p>
                    <div id="sentence-range-hint" class="chinese-text text-2xl text-emerald-700 tracking-widest">-- ... --</div>
                </div>
                
                <div class="w-full relative mt-2">
                    <input type="text" id="dict-input" class="dictation-input chinese-text" placeholder="Nghe và gõ chữ Hán..." autocomplete="off">
                </div>

                <div id="dict-answer-box" class="w-full hidden space-y-3">
                    <div id="dict-feedback" class="w-full p-2 rounded-lg text-center font-bold text-sm"></div>
                    <div class="bg-amber-50 border border-amber-200 p-4 rounded-xl text-center space-y-2">
                        <p class="chinese-text text-2xl text-amber-900" id="ans-hanzi"></p>
                        <p class="text-emerald-700 italic font-semibold text-lg" id="ans-pinyin"></p>
                        <p class="text-gray-600 border-t border-amber-200 pt-2 text-sm" id="ans-vi"></p>
                    </div>
                </div>

                <div class="w-full">
                    <button id="btn-next-dict" onclick="nextDictation()" class="btn-ghibli w-full bg-emerald-500 border-emerald-700 text-white hidden py-3 text-lg">Câu tiếp theo ➡️</button>
                    <p id="enter-instruction" class="text-[10px] text-gray-400 text-center mt-2 font-bold uppercase tracking-wider">Nhấn ENTER để kiểm tra</p>
                </div>
            </div>
        </div>

        <!-- FINAL SUCCESS -->
        <div id="dictation-end-screen" class="ghibli-card p-8 text-center hidden">
            <h2 class="text-3xl font-bold text-amber-900 mb-4">Tuyệt vời!</h2>
            <div class="text-6xl mb-4">🏆</div>
            <p class="text-amber-800 mb-6 font-bold text-xl">Bạn đã luyện xong tất cả bài khóa bài 18!</p>
            <button onclick="endDictationSession()" class="btn-ghibli w-full py-3 text-lg bg-emerald-100 border-emerald-500 text-emerald-800">🔙 Về Menu Chính</button>
        </div>
    </div>

    <!-- AUDIO ASSETS -->
    <audio id="audio-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="audio-correct" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="audio-wrong" src="https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3"></audio>
    <audio id="audio-flip" src="https://assets.mixkit.co/active_storage/sfx/2045/2045-preview.mp3"></audio>

    <script>
        const completedStatus = { flashcard: false, dictation: false };

        function playAudio(audioId) {
            const audio = document.getElementById(audioId);
            if (audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
        }

        function returnToStart() {
            playAudio('audio-click');
            const audioPlayer = document.getElementById('lesson-audio-player');
            if (audioPlayer) audioPlayer.pause();
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('start-screen').classList.remove('hidden');
        }

        // TỪ VỰNG BÀI 18
        const vocabulary = [
            { h: "降落", p: "jiàngluò", m: "Hạ cánh", ex: "上次女儿问我飞机是怎么起飞和降落的，我真不知道该怎么回答她。", exp: "Shàng cì nǚ’ér wèn wǒ fēijī shì zěnme qǐfēi hé jiàngluò de, wǒ zhēn bù zhīdào gāi zěnme huídá tā.", exv: "Lần trước con gái hỏi tôi máy bay cất cánh và hạ cánh như thế nào, tôi thật sự không biết trả lời ra sao." },
            { h: "火", p: "huǒ", m: "Rất hot, rất được ưa chuộng", ex: "这本书现在卖得非常火。", exp: "Zhè běn shū xiànzài mài de fēicháng huǒ.", exv: "Cuốn sách này hiện bán rất chạy." },
            { h: "作者", p: "zuòzhě", m: "Tác giả", ex: "《新十万个为什么》的作者我没记住。", exp: "“Xīn Shíwàn Gè Wèishénme” de zuòzhě wǒ méi jìzhù.", exv: "Tôi không nhớ tác giả của cuốn “Mười vạn câu hỏi vì sao” mới." },
            { h: "交通", p: "jiāotōng", m: "Giao thông", ex: "这本书的内容包括交通和科学技术。", exp: "Zhè běn shū de nèiróng bāokuò jiāotōng hé kēxué jìshù.", exv: "Nội dung cuốn sách bao gồm giao thông và khoa học kỹ thuật." },
            { h: "技术", p: "jìshù", m: "Kỹ thuật, công nghệ", ex: "现代科学技术发展得很快。", exp: "Xiàndài kēxué jìshù fāzhǎn de hěn kuài.", exv: "Khoa học kỹ thuật hiện đại phát triển rất nhanh." },
            { h: "技术", p: "jìshù", m: "Tay nghề", ex: "这位师傅的技术很好。", exp: "Zhè wèi shīfu de jìshù hěn hǎo.", exv: "Tay nghề của người thợ này rất tốt." },
            { h: "是否", p: "shìfǒu", m: "Có… hay không", ex: "我不知道她是否能读懂这本书。", exp: "Wǒ bù zhīdào tā shìfǒu néng dú dǒng zhè běn shū.", exv: "Tôi không biết cô ấy có đọc hiểu cuốn sách này hay không." },
            { h: "各种各样", p: "gè zhǒng gè yàng", m: "Đủ loại", ex: "女儿现在总是有各种各样的问题。", exp: "Nǚ’ér xiànzài zǒngshì yǒu gè zhǒng gè yàng de wèntí.", exv: "Con gái bây giờ luôn có đủ loại câu hỏi." },
            { h: "奇特", p: "qítè", m: "Kỳ lạ, đặc biệt", ex: "孩子眼中的世界是美丽和奇特的。", exp: "Háizi yǎn zhōng de shìjiè shì měilì hé qítè de.", exv: "Thế giới trong mắt trẻ con rất đẹp và kỳ lạ." },
            { h: "易懂", p: "yìdǒng", m: "Dễ hiểu", ex: "这本书的内容简单易懂。", exp: "Zhè běn shū de nèiróng jiǎndān yìdǒng.", exv: "Nội dung cuốn sách này đơn giản, dễ hiểu." },
            { h: "秒", p: "miǎo", m: "Giây", ex: "几秒钟就能找到答案。", exp: "Jǐ miǎo zhōng jiù néng zhǎodào dá’àn.", exv: "Chỉ vài giây là có thể tìm được đáp án." },
            { h: "方式", p: "fāngshì", m: "Phương thức", ex: "学习方式发生了很多变化。", exp: "Xuéxí fāngshì fāshēng le hěn duō biànhuà.", exv: "Phương thức học tập đã thay đổi rất nhiều." },
            { h: "受不了", p: "shòubuliǎo", m: "Không chịu nổi", ex: "天天看电脑，眼睛受不了。", exp: "Tiāntiān kàn diànnǎo, yǎnjing shòubuliǎo.", exv: "Ngày nào cũng nhìn máy tính, mắt không chịu nổi." },
            { h: "日记", p: "rìjì", m: "Nhật ký", ex: "现在很多人喜欢在网上写日记。", exp: "Xiànzài hěn duō rén xǐhuan zài wǎngshàng xiě rìjì.", exv: "Hiện nay nhiều người thích viết nhật ký trên mạng." },
            { h: "安全", p: "ānquán", m: "An toàn", ex: "这样做不太安全。", exp: "Zhèyàng zuò bú tài ānquán.", exv: "Làm như vậy không an toàn lắm." },
            { h: "密码", p: "mìmǎ", m: "Mật khẩu", ex: "请不要告诉别人你的密码。", exp: "Qǐng búyào gàosu biérén nǐ de mìmǎ.", exv: "Đừng nói mật khẩu của bạn cho người khác." },
            { h: "允许", p: "yǔnxǔ", m: "Cho phép (Động từ)", ex: "老师不允许我们迟到。", exp: "Lǎoshī bù yǔnxǔ wǒmen chídào.", exv: "Giáo viên không cho phép chúng tôi đi muộn." },
            { h: "允许", p: "yǔnxǔ", m: "Sự cho phép (Danh từ)", ex: "没有老师的允许不能离开教室。", exp: "Méiyǒu lǎoshī de yǔnxǔ bù néng líkāi jiàoshì.", exv: "Không có sự cho phép của giáo viên thì không được rời lớp." },
            { h: "之所以", p: "zhīsuǒyǐ", m: "Sở dĩ", ex: "你之所以失败，是因为没有努力。", exp: "Nǐ zhīsuǒyǐ shībài, shì yīnwèi méiyǒu nǔlì.", exv: "Sở dĩ bạn thất bại là vì không cố gắng." },
            { h: "说法", p: "shuōfǎ", m: "Cách nói, quan điểm", ex: "这种说法不太正确。", exp: "Zhè zhǒng shuōfǎ bú tài zhèngquè.", exv: "Quan điểm này không chính xác lắm." },
            { h: "座", p: "zuò", m: "Lượng từ (công trình, núi...)", ex: "河内是一座热闹的城市。", exp: "Hénèi shì yí zuò rènao de chéngshì.", exv: "Hà Nội là một thành phố náo nhiệt." },
            { h: "桥", p: "qiáo", m: "Cầu", ex: "他正在桥上走。", exp: "Tā zhèngzài qiáo shang zǒu.", exv: "Anh ấy đang đi trên cầu." },
            { h: "危险", p: "wēixiǎn", m: "Nguy hiểm", ex: "这样做很危险。", exp: "Zhèyàng zuò hěn wēixiǎn.", exv: "Làm như vậy rất nguy hiểm." },
            { h: "接着", p: "jiēzhe", m: "Tiếp theo", ex: "你先休息一下，然后接着做。", exp: "Nǐ xiān xiūxi yíxià, ránhòu jiēzhe zuò.", exv: "Bạn nghỉ một chút rồi làm tiếp." },
            { h: "警察", p: "jǐngchá", m: "Cảnh sát", ex: "警察帮助了他。", exp: "Jǐngchá bāngzhù le tā.", exv: "Cảnh sát đã giúp anh ấy." },
            { h: "抓", p: "zhuā", m: "Bắt", ex: "警察抓住了小偷。", exp: "Jǐngchá zhuāzhù le xiǎotōu.", exv: "Cảnh sát đã bắt được tên trộm." },
            { h: "咸", p: "xián", m: "Mặn", ex: "今天的菜有点咸。", exp: "Jīntiān de cài yǒudiǎn xián.", exv: "Món ăn hôm nay hơi mặn." },
            { h: "矿泉水", p: "kuàngquánshuǐ", m: "Nước suối", ex: "我买了一瓶矿泉水。", exp: "Wǒ mǎi le yì píng kuàngquánshuǐ.", exv: "Tôi mua một chai nước suối." },
            { h: "付款", p: "fùkuǎn", m: "Thanh toán", ex: "现在可以用手机付款。", exp: "Xiànzài kěyǐ yòng shǒujī fùkuǎn.", exv: "Bây giờ có thể thanh toán bằng điện thoại." },

            { h: "大大", p: "dàdà", m: "Rất nhiều", ex: "这大大提高了效率。", exp: "Zhè dàdà tígāo le xiàolǜ.", exv: "Điều này nâng cao hiệu suất rất nhiều." },
            { h: "巨大", p: "jùdà", m: "To lớn", ex: "生活发生了巨大变化。", exp: "Shēnghuó fāshēng le jùdà biànhuà.", exv: "Cuộc sống đã thay đổi rất lớn." },
            { h: "世纪", p: "shìjì", m: "Thế kỷ", ex: "现在是21世纪。", exp: "Xiànzài shì èrshíyī shìjì.", exv: "Hiện nay là thế kỷ 21." },

            { h: "信封", p: "xìnfēng", m: "Phong bì", ex: "写信需要信封。", exp: "Xiě xìn xūyào xìnfēng.", exv: "Viết thư cần có phong bì." },
            { h: "网站", p: "wǎngzhàn", m: "Trang web", ex: "打开网站就可以看到新闻。", exp: "Dǎkāi wǎngzhàn jiù kěyǐ kàn dào xīnwén.", exv: "Mở website là có thể xem tin tức." },

        // BÀI KHÓA BÀI 18 (Đã tách câu dài)
        const lessonsData = [
            { id: 1, title: "Bài khóa 1", desc: "王静给孙月推荐一本书", audioSrc: "https://raw.githubusercontent.com/ngabui94-create/game-hoc-tieng-trung/main/audio/hsk4/lesson18/18-1.mp3", completed: false, sentences: [
                { h: "上次女儿问我飞机是怎么起飞和降落的，", p: "Shàng cì nǚ'ér wèn wǒ fēijī shì zěnme qǐfēi hé jiàngluò de,", vi: "Lần trước con gái hỏi tôi máy bay cất cánh và hạ cánh như thế nào," },
                { h: "真不知道该怎么回答她，", p: "zhēn bù zhīdào gāi zěnme huídá tā,", vi: "thật sự không biết nên trả lời con bé ra sao," },
                { h: "她现在总是有各种各样的“为什么”。", p: "tā xiànzài zǒngshì yǒu gè zhǒng gè yàng de “wèishénme”.", vi: "con bé bây giờ luôn có đủ loại câu hỏi “vì sao”." },
                { h: "孩子眼中的世界是美丽和奇特的。", p: "Háizi yǎn zhōng de shìjiè shì měilì hé qítè de.", vi: "Thế giới trong mắt trẻ em là tươi đẹp và kỳ lạ." },
                { h: "有一本书叫《新十万个为什么》，", p: "Yǒu yì běn shū jiào 《Xīn Shíwàn Gè Wèishénme》,", vi: "Có một cuốn sách tên là “Mười vạn câu hỏi vì sao mới”," },
                { h: "现在卖得非常火。", p: "xiànzài mài de fēicháng huǒ.", vi: "hiện nay đang bán rất chạy." },
                { h: "书里的内容都是儿童想知道的科学知识，", p: "Shū lǐ de nèiróng dōu shì értóng xiǎng zhīdào de kēxué zhīshi,", vi: "Nội dung trong sách đều là những kiến thức khoa học mà trẻ em muốn biết," },
                { h: "相信你女儿一定喜欢读。", p: "xiāngxìn nǐ nǚ'ér yídìng xǐhuan dú.", vi: "tin rằng con gái bạn nhất định sẽ thích đọc." },
                { h: "难道它和我们小时候看的《十万个为什么》不一样吗？", p: "Nándào tā hé wǒmen xiǎoshíhou kàn de 《Shíwàn Gè Wèishénme》 bù yíyàng ma?", vi: "Lẽ nào nó không giống cuốn “Mười vạn câu hỏi vì sao” mà chúng ta xem lúc nhỏ sao?" },
                { h: "作者是谁啊？", p: "Zuòzhě shì shuí a?", vi: "Tác giả là ai vậy?" },
                { h: "作者的名字我没记住。", p: "Zuòzhě de míngzi wǒ méi jìzhù.", vi: "Tên tác giả thì tôi không nhớ." },
                { h: "《新十万个为什么》的内容更新，", p: "《Xīn Shíwàn Gè Wèishénme》 de nèiróng gēng xīn,", vi: "Nội dung cuốn “Mười vạn câu hỏi vì sao mới” cập nhật hơn," },
                { h: "介绍了各种科学知识，", p: "jièshàole gè zhǒng kēxué zhīshi,", vi: "giới thiệu các loại kiến thức khoa học," },
                { h: "包括地球、动物、植物、交通、科学技术、社会和文化等很多方面。", p: "bāokuò dìqiú, dòngwù, zhíwù, jiāotōng, kēxué jìshù, shèhuì hé wénhuà děng hěn duō fāngmiàn.", vi: "bao gồm trái đất, động vật, thực vật, giao thông, khoa học công nghệ, xã hội và văn hóa v.v. rất nhiều phương diện." },
                { h: "太好了！", p: "Tài hǎo le!", vi: "Tốt quá rồi!" },
                { h: "不过她这么小，", p: "Búguò tā zhème xiǎo,", vi: "Nhưng con bé còn nhỏ như vậy," },
                { h: "我不知道她是否能读懂。", p: "wǒ bù zhīdào tā shìfǒu néng dú dǒng.", vi: "tôi không biết con bé có đọc hiểu hay không." },
                { h: "放心吧，这本书的语言简单易懂，", p: "Fàngxīn ba, zhè běn shū de yǔyán jiǎndān yìdǒng,", vi: "Yên tâm đi, ngôn ngữ của cuốn sách này đơn giản dễ hiểu," },
                { h: "一定能增长孩子的科学知识。", p: "yídìng néng zēngzhǎng háizi de kēxué zhīshi.", vi: "nhất định có thể tăng cường kiến thức khoa học của trẻ." }
            ]},
            { id: 2, title: "Bài khóa 2", desc: "李老师和高老师在聊电脑和互联网技术的发展", audioSrc: "https://raw.githubusercontent.com/ngabui94-create/game-hoc-tieng-trung/main/audio/hsk4/lesson18/18-2.mp3", completed: false, sentences: [
                { h: "现在的大学生一遇到不明白的问题，", p: "Xiànzài de dàxuéshēng yí yùdào bù míngbai de wèntí,", vi: "Sinh viên đại học bây giờ hễ gặp vấn đề không hiểu," },
                { h: "可以马上在网上查答案，", p: "kěyǐ mǎshàng zài wǎngshàng chá dá'àn,", vi: "có thể lập tức lên mạng tra đáp án," },
                { h: "几秒钟就把问题解决了，", p: "jǐ miǎozhōng jiù bǎ wèntí jiějué le,", vi: "vài giây là đã giải quyết xong vấn đề," },
                { h: "这比我们上学的时候方便多了。", p: "zhè bǐ wǒmen shàngxué de shíhou fāngbiàn duō le.", vi: "điều này tiện lợi hơn rất nhiều so với thời chúng ta còn đi học." },
                { h: "现在的人们，尤其是大学生开始普遍使用电脑，", p: "Xiànzài de rénmen, yóuqí shì dàxuéshēng kāishǐ pǔbiàn shǐyòng diànnǎo,", vi: "Mọi người ngày nay, đặc biệt là sinh viên bắt đầu sử dụng máy tính phổ biến," },
                { h: "他们的生活已经离不开电脑。", p: "tāmen de shēnghuó yǐjīng lí bù kāi diànnǎo.", vi: "cuộc sống của họ đã không thể tách rời máy tính." },
                { h: "据调查，70%的人遇到问题时，", p: "Jù diàochá, bǎifēnzhī qīshí de rén yùdào wèntí shí,", vi: "Theo điều tra, 70% người khi gặp vấn đề," },
                { h: "首先想到的就是上网找答案。", p: "shǒuxiān xiǎngdào de jiùshì shàngwǎng zhǎo dá'àn.", vi: "điều đầu tiên nghĩ đến chính là lên mạng tìm đáp án." },
                { h: "电脑和互联网技术的发展使学生们的学习方式发生了很多变化，", p: "Diànnǎo hé hùliánwǎng jìshù de fāzhǎn shǐ xuéshēngmen de xuéxí fāngshì fāshēngle hěn duō biànhuà,", vi: "Sự phát triển của máy tính và công nghệ Internet đã khiến phương thức học tập của học sinh sinh viên xảy ra rất nhiều thay đổi," },
                { h: "不过天天对着电脑看，眼睛实在受不了。", p: "búguò tiāntiān duìzhe diànnǎo kàn, yǎnjing shízài shòubuliǎo.", vi: "có điều ngày nào cũng cắm mặt vào máy tính, mắt thật sự chịu không nổi." },
                { h: "不仅是学习方式，", p: "Bùjǐn shì xuéxí fāngshì,", vi: "Không chỉ là phương thức học tập," },
                { h: "而且连生活方式也发生了很大改变。", p: "érqiě lián shēnghuó fāngshì yě fāshēngle hěn dà gǎibiàn.", vi: "mà ngay cả lối sống cũng đã xảy ra thay đổi rất lớn." },
                { h: "现在越来越多的人喜欢在网上写日记，", p: "Xiànzài yuè lái yuè duō de rén xǐhuan zài wǎngshàng xiě rìjì,", vi: "Bây giờ ngày càng nhiều người thích viết nhật ký trên mạng," },
                { h: "他们说这样可以让朋友及时了解自己的生活。", p: "tāmen shuō zhèyàng kěyǐ ràng péngyou jíshí liǎojiě zìjǐ de shēnghuó.", vi: "họ nói như vậy có thể để bạn bè kịp thời biết được cuộc sống của mình." },
                { h: "这个办法不错，既能方便大家的交流，", p: "Zhège bànfǎ búcuò, jì néng fāngbiàn dàjiā de jiāoliú,", vi: "Cách này không tồi, vừa có thể tiện cho mọi người giao lưu," },
                { h: "还能节约用纸，保护环境。", p: "hái néng jiéyuē yòng zhǐ, bǎohù huánjìng.", vi: "còn có thể tiết kiệm giấy, bảo vệ môi trường." },
                { h: "但是如果别人都能看到我的日记的话，", p: "Dànshì rúguǒ biérén dōu néng kàndào wǒ de rìjì de huà,", vi: "Nhưng nếu như người khác đều có thể nhìn thấy nhật ký của tôi," },
                { h: "多不安全啊！", p: "duō bù ānquán a!", vi: "thì thiếu an toàn biết bao!" },
                { h: "放心吧，可以给网上的日记加密码，", p: "Fàngxīn ba, kěyǐ gěi wǎngshàng de rìjì jiā mìmǎ,", vi: "Yên tâm đi, có thể cài mật khẩu cho nhật ký trên mạng," },
                { h: "那样只有得到了允许，别人才能看到。", p: "nàyàng zhǐyǒu dédàole yǔnxǔ, biérén cái néng kàndào.", vi: "như vậy chỉ khi có sự cho phép, người khác mới có thể xem được." }
            ]},
            { id: 3, title: "Bài khóa 3", desc: "王静和孙月在聊关于梦的情况", audioSrc: "https://raw.githubusercontent.com/ngabui94-create/game-hoc-tieng-trung/main/audio/hsk4/lesson18/18-3.mp3", completed: false, sentences: [
                { h: "我昨天晚上做了一个特别奇怪的梦，", p: "Wǒ zuótiān wǎnshang zuòle yí gè tèbié qíguài de mèng,", vi: "Tối qua tôi đã mơ một giấc mơ vô cùng kỳ lạ," },
                { h: "梦到自己正在一座桥上走，走着走着，", p: "mèng dào zìjǐ zhèngzài yí zuò qiáo shang zǒu, zǒuzhe zǒuzhe,", vi: "mơ thấy mình đang đi trên một cây cầu, đi mãi đi mãi," },
                { h: "突然开过来一辆车，非常危险，", p: "tūrán kāi guòlái yí liàng chē, fēicháng wēixiǎn,", vi: "đột nhiên có một chiếc xe lái tới, cực kỳ nguy hiểm," },
                { h: "接着又梦见我跳到车上，", p: "jiēzhe yòu mèng jiàn wǒ tiào dào chē shang,", vi: "tiếp theo lại mơ thấy tôi nhảy lên xe," },
                { h: "跟警察一起抓住了一个坏人。", p: "gēn jǐngchá yìqǐ zhuāzhùle yí gè huàirén.", vi: "cùng cảnh sát bắt lấy một kẻ xấu." },
                { h: "奇怪，你怎么总能记住自己做了什么梦？", p: "Qíguài, nǐ zěnme zǒng néng jìzhù zìjǐ zuòle shénme mèng?", vi: "Kỳ lạ thật, sao bạn luôn có thể nhớ được mình đã mơ thấy gì vậy?" },
                { h: "我好像从来没做过梦。", p: "Wǒ hǎoxiàng cónglái méi zuòguo mèng.", vi: "Tôi hình như chưa từng nằm mơ bao giờ." },
                { h: "每个人都会做梦，区别只是有多少。", p: "Měi gè rén dōu huì zuòmèng, qūbié zhǐshì yǒu duōshao.", vi: "Mỗi người đều sẽ nằm mơ, khác biệt chỉ là nhiều hay ít thôi." },
                { h: "有的人睡醒之后还记得梦里的事情，", p: "Yǒu de rén shuìxǐng zhīhòu hái jìde mèng lǐ de shìqíng,", vi: "Có người sau khi ngủ dậy vẫn nhớ chuyện trong mơ," },
                { h: "有的人却记不清楚了。", p: "yǒu de rén què jì bù qīngchu le.", vi: "có người lại nhớ không rõ nữa." },
                { h: "你之所以觉得从来没做过梦，只不过是忘记了。", p: "Nǐ zhīsuǒyǐ juéde cónglái méi zuòguo mèng, zhǐ búguò shì wàngjì le.", vi: "Sở dĩ bạn cảm thấy chưa từng nằm mơ, chẳng qua chỉ là đã quên mất thôi." },
                { h: "你说的有道理，我一般都是一觉睡到天亮。", p: "Nǐ shuō de yǒu dàolǐ, wǒ yìbān dōu shì yí jiào shuì dào tiānliàng.", vi: "Bạn nói có lý, tôi thường toàn ngủ một giấc đến sáng." },
                { h: "很多人认为做梦是上天要告诉他们将来会发生的一些事情，", p: "Hěn duō rén rènwéi zuòmèng shì shàngtiān yào gàosu tāmen jiānglái huì fāshēng de yìxiē shìqíng,", vi: "Rất nhiều người cho rằng nằm mơ là ông trời muốn báo cho họ biết một số chuyện sẽ xảy ra trong tương lai," },
                { h: "可能上天不想让我知道吧。", p: "kěnéng shàngtiān bù xiǎng ràng wǒ zhīdào ba.", vi: "có thể ông trời không muốn để tôi biết chăng." },
                { h: "一般晚上睡觉时，身体感觉到什么，", p: "Yìbān wǎnshang shuìjiào shí, shēntǐ gǎnjué dào shénme,", vi: "Thường thì lúc ngủ buổi tối, cơ thể cảm nhận được gì," },
                { h: "人就容易梦到什么内容。", p: "rén jiù róngyì mèng dào shénme nèiróng.", vi: "con người liền dễ mơ thấy nội dung đó." },
                { h: "记得有一次，我晚饭吃得太咸，", p: "Jìde yǒu yí cì, wǒ wǎnfàn chī de tài xián,", vi: "Nhớ có một lần, bữa tối tôi ăn mặn quá," },
                { h: "那天晚上就梦见自己到处找商店买矿泉水。", p: "nà tiān wǎnshang jiù mèng jiàn zìjǐ dàochù zhǎo shāngdiàn mǎi kuàngquánshuǐ.", vi: "tối hôm đó liền mơ thấy mình đi khắp nơi tìm cửa hàng mua nước suối." },

                { h: "用不了一分钟，远处的朋友就能收到，", p: "yòng bùliǎo yì fēnzhōng, yuǎnchù de péngyou jiù néng shōudào,", vi: "chưa tới một phút, bạn bè ở xa đã có thể nhận được," },

                { h: "以前外地的新闻要几天后才能知道，", p: "Yǐqián wàidì de xīnwén yào jǐ tiān hòu cái néng zhīdào,", vi: "Trước kia tin tức nơi khác phải mấy ngày sau mới có thể biết," },
                { h: "现在只要打开网站，任何信息都可以在第一时间获得。", p: "xiànzài zhǐyào dǎkāi wǎngzhàn, rènhé xìnxī dōu kěyǐ zài dì-yī shíjiān huòdé.", vi: "bây giờ chỉ cần mở trang web, bất kỳ thông tin nào cũng có thể nhận được ngay lập tức." },
                { h: "现代科学技术的发展让世界变得越来越小，", p: "Xiàndài kēxué jìshù de fāzhǎn ràng shìjiè biàn de yuè lái yuè xiǎo,", vi: "Sự phát triển của khoa học công nghệ hiện đại làm cho thế giới trở nên ngày càng nhỏ bé," },
                { h: "所以现在人们都把地球叫作“地球村”。", p: "suǒyǐ xiànzài rénmen dōu bǎ dìqiú jiàozuò “dìqiúcūn”.", vi: "cho nên bây giờ mọi người đều gọi trái đất là “làng toàn cầu”." }

        let currentFlashList = [], flashcardIdx = 0, learnedCount = 0, unlearnedItems = [];
        function startFlashcards(list) {
            playAudio('audio-click');
            currentFlashList = [...list];
            flashcardIdx = 0; learnedCount = 0; unlearnedItems = [];
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('flashcard-screen').classList.remove('hidden');
            document.getElementById('card-total').innerText = currentFlashList.length;
            updateFlashcard();
        }
        function updateFlashcard() {
            const card = currentFlashList[flashcardIdx];
            document.getElementById('card-index').innerText = flashcardIdx + 1;
            document.getElementById('card-hanzi').innerText = card.h;
            document.getElementById('card-pinyin').innerText = card.p;
            document.getElementById('card-mean').innerText = card.m;
            document.getElementById('card-example-cn').innerText = card.ex;
            document.getElementById('card-example-py').innerText = card.exp;
            document.getElementById('card-example-vi').innerText = card.exv;
            document.getElementById('flashcard-inner').classList.remove('is-flipped');
        }
        function flipCard() { playAudio('audio-flip'); document.getElementById('flashcard-inner').classList.toggle('is-flipped'); }
        function markCard(learned) {
            if (learned) learnedCount++; else unlearnedItems.push(currentFlashList[flashcardIdx]);
            flashcardIdx++;
            if (flashcardIdx < currentFlashList.length) updateFlashcard(); else showFlashcardStats();
        }
        function showFlashcardStats() {
            document.getElementById('flashcard-screen').classList.add('hidden');
            document.getElementById('flashcard-stat-screen').classList.remove('hidden');
            const learnedPercent = Math.round((learnedCount / currentFlashList.length) * 100);
            document.getElementById('stat-learned-percent').innerText = learnedPercent + "%";
            document.getElementById('stat-unlearned-percent').innerText = (100 - learnedPercent) + "%";
            const listContainer = document.getElementById('unlearned-list');
            listContainer.innerHTML = unlearnedItems.length > 0 ? '' : '<p class="text-center py-4 font-bold text-emerald-700">Tuyệt vời! Bạn đã thuộc hết.</p>';
            unlearnedItems.forEach(item => {
                listContainer.innerHTML += `<div class="flex justify-between border-b border-amber-200 pb-1 text-sm"><span class="font-bold text-amber-900">${item.h}</span><span class="text-gray-600">${item.m}</span></div>`;
            });
            document.getElementById('btn-relearn').classList.toggle('hidden', unlearnedItems.length === 0);
        }
        function relearnUnlearned() { startFlashcards(unlearnedItems); }
        function endFlashcardSession() { completedStatus.flashcard = true; document.getElementById('check-flashcard').classList.remove('hidden'); checkUnlockForm(); returnToStart(); }

        let currentLessonIdx = -1, dictStep = 0;
        function openDictationMenu() {
            playAudio('audio-click');
            document.querySelectorAll('.ghibli-card').forEach(el => el.classList.add('hidden'));
            document.getElementById('dictation-menu-screen').classList.remove('hidden');
            renderLessonList();
        }
        function renderLessonList() {
            const listContainer = document.getElementById('lesson-list');
            listContainer.innerHTML = '';
            let allCompleted = true;
            lessonsData.forEach((lesson, index) => {
                if (!lesson.completed) allCompleted = false;
                const btn = document.createElement('button');
                btn.className = `btn-ghibli text-left py-4 relative flex flex-col ${lesson.completed ? 'opacity-80 bg-emerald-100' : ''}`;
                btn.onclick = () => startDictationLesson(index);
                btn.innerHTML = `<span class="font-bold">${lesson.title}</span><span class="text-xs">${lesson.desc}</span>${lesson.completed ? '<span class="absolute right-4 text-xl">✅</span>' : ''}`;
                listContainer.appendChild(btn);
            });
            if (allCompleted && lessonsData.length > 0) {
                document.getElementById('dictation-menu-screen').classList.add('hidden');
                document.getElementById('dictation-end-screen').classList.remove('hidden');
            }
        }
        function startDictationLesson(index) {
            playAudio('audio-click');
            currentLessonIdx = index;
            dictStep = 0;
            document.getElementById('dictation-menu-screen').classList.add('hidden');
            document.getElementById('dictation-screen').classList.remove('hidden');
            document.getElementById('lesson-audio-player').src = lessonsData[currentLessonIdx].audioSrc;
            loadDictationStep();
        }
        function backToDictationMenu() { 
            const player = document.getElementById('lesson-audio-player');
            player.pause();
            openDictationMenu(); 
        }
        function loadDictationStep() {
            const lesson = lessonsData[currentLessonIdx];
            const sentenceObj = lesson.sentences[dictStep];
            document.getElementById('dictation-title-display').innerHTML = `Bài 18: Vế <span id="dict-step">${dictStep + 1}</span>/${lesson.sentences.length}`;
            const rawH = sentenceObj.h.replace(/[，。？！、\s“”：]/g, '');
            document.getElementById('sentence-range-hint').innerText = `${rawH.substring(0, 2)} ... ${rawH.substring(rawH.length - 2)}`;
            const inputField = document.getElementById('dict-input');
            inputField.value = ""; inputField.disabled = false;
            document.getElementById('dict-answer-box').classList.add('hidden');
            document.getElementById('btn-next-dict').classList.add('hidden');
            inputField.focus();
        }
        function cleanChineseText(text) { return text.replace(/[^\u4e00-\u9fa5]/g, '').trim(); }
        function checkDictation() {
            const sentenceObj = lessonsData[currentLessonIdx].sentences[dictStep];
            const feedback = document.getElementById('dict-feedback');
            const userInput = cleanChineseText(document.getElementById('dict-input').value);
            const correctInput = cleanChineseText(sentenceObj.h);
            
            if (userInput === correctInput) {
                playAudio('audio-correct');
                feedback.innerText = "Chính xác! 🌟";
                feedback.className = "w-full p-2 rounded-lg text-center bg-emerald-100 text-emerald-700 font-bold";
            } else {
                playAudio('audio-wrong');
                feedback.innerText = "Chưa đúng! Đáp án:";
                feedback.className = "w-full p-2 rounded-lg text-center bg-rose-100 text-rose-700 font-bold";
            }
            document.getElementById('ans-hanzi').innerText = sentenceObj.h;
            document.getElementById('ans-pinyin').innerText = sentenceObj.p;
            document.getElementById('ans-vi').innerText = sentenceObj.vi;
            document.getElementById('dict-answer-box').classList.remove('hidden');
            document.getElementById('dict-input').disabled = true;
            
            const btnNext = document.getElementById('btn-next-dict');
            btnNext.innerText = (dictStep === lessonsData[currentLessonIdx].sentences.length - 1) ? "Hoàn thành Bài khóa 🏆" : "Vế tiếp theo ➡️";
            btnNext.classList.remove('hidden');
        }
        function nextDictation() {
            if (dictStep < lessonsData[currentLessonIdx].sentences.length - 1) {
                dictStep++;
                loadDictationStep();
            } else {
                lessonsData[currentLessonIdx].completed = true;
                openDictationMenu();
            }
        }
        function endDictationSession() { completedStatus.dictation = true; document.getElementById('check-dictation').classList.remove('hidden'); checkUnlockForm(); returnToStart(); }

        function checkUnlockForm() {
            const allDictDone = lessonsData.every(l => l.completed);
            if (completedStatus.flashcard && allDictDone) {
                const btn = document.getElementById('btn-form');
                btn.disabled = false;
                btn.className = "btn-ghibli text-lg mt-2 bg-emerald-100 border-emerald-500 text-emerald-800 shadow-md";
                btn.innerHTML = '📝 Phần 3: Bài Tập (Đã mở khóa)';
                btn.onclick = () => window.open('https://forms.gle/KninNTAi99ZFSqASA', '_blank');
            }
        }

        document.addEventListener("keydown", function(e) {
            const dictScreen = document.getElementById('dictation-screen');
            if (e.key === "Enter" && !dictScreen.classList.contains('hidden')) {
                e.preventDefault();
                const btnNext = document.getElementById('btn-next-dict');
                const inputField = document.getElementById('dict-input');
                if (!btnNext.classList.contains('hidden')) nextDictation();
                else if (!inputField.disabled) checkDictation();
            }
        });
    </script>
</body>
