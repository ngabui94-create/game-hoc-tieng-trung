<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK1 - Bài 6: Tôi biết nói tiếng Trung</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #9dc183;
            --ghibli-dark-green: #4f7942;
            --ghibli-sky: #d0f0f7;
            --ghibli-wood: #8b5a2b;
            --ghibli-leaf: #7fb069;
            --ghibli-pink: #ffb7c5;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--ghibli-sky);
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.3), rgba(255,255,255,0)), url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .exit-button {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--ghibli-dark-green);
            padding: 10px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid var(--ghibli-green);
            z-index: 1000;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 25px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border: 5px solid var(--ghibli-green);
            position: relative;
        }

        #quiz-screen, #result-screen { display: none; }
        #intro-screen { display: block; }

        .game-stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; color: var(--ghibli-dark-green); }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress { height: 100%; background: var(--ghibli-green); width: 0%; transition: 0.4s; }

        .question-box { font-size: 1.3rem; color: var(--ghibli-wood); margin-bottom: 20px; line-height: 1.8; }
        ruby { ruby-align: center; }
        rt { font-size: 0.55em; color: #666; font-weight: 400; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { 
            background: white; border: 2px solid var(--ghibli-leaf); padding: 15px 10px; 
            border-radius: 12px; font-size: 1.1rem; cursor: pointer; transition: 0.2s; 
            font-family: inherit; font-weight: 600; 
        }
        .option-btn:hover:not(:disabled) { background: var(--ghibli-sky); transform: translateY(-2px); }
        .option-btn.correct { background: var(--ghibli-dark-green) !important; color: white !important; border-color: var(--ghibli-dark-green); }
        .option-btn.wrong { background: #ff7675 !important; color: white !important; border-color: #d63031; }

        .word-chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; border-top: 1px dashed #ccc; padding-top: 20px;}
        .chip { background: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; border: 2px solid var(--ghibli-green); transition: 0.2s; box-shadow: 2px 2px 0px var(--ghibli-green); font-size: 1.1rem;}
        .chip:active { transform: translateY(2px); box-shadow: none; }
        .chip.selected { opacity: 0.2; cursor: default; pointer-events: none;}
        .answer-area { min-height: 60px; border: 2px dashed var(--ghibli-leaf); border-radius: 15px; margin-bottom: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 15px; background: #fffcf5; }
        .chip-in-answer { background: var(--ghibli-pink); color: white; border-color: #ff9aa2; }

        .feedback-box { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; text-align: left; font-size: 0.95rem; line-height: 1.5; background: #f9f9f9; border-left: 5px solid var(--ghibli-green); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .explanation { font-style: italic; margin-top: 8px; color: #555; border-top: 1px solid #ddd; padding-top: 8px; }

        .btn-main { background: var(--ghibli-wood); color: white; border: none; padding: 12px 30px; font-size: 1.1rem; border-radius: 30px; cursor: pointer; margin-top: 15px; font-weight: bold; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.05); background: #5d3d1d; }

        @media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<a href="#" class="exit-button" onclick="location.reload()">🏠 Quay về vườn</a>

<div class="game-container">
    <div id="intro-screen">
        <div style="background: var(--ghibli-pink); color: white; display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 15px;">🌸 Nga Học HSK</div>
        <h1>Bài 6: <ruby>我会说汉语<rt>Wǒ huì shuō Hànyǔ</rt></ruby></h1>
        <p>Thử thách 30 câu hỏi luyện tập từ vựng & ngữ pháp Bài 6.<br>
        <b style="color: var(--ghibli-dark-green);">Đúng +10đ</b> | <b style="color: #d63031;">Sai -5đ</b></p>
        <button class="btn-main" onclick="startQuiz()">Bắt đầu ngay 🌿</button>
    </div>

    <div id="quiz-screen">
        <div class="game-stats">
            <span id="question-count">Câu: 1/30</span>
            <span id="score-display">Điểm: 0</span>
        </div>
        <div class="progress-bar"><div id="progress"></div></div>
        
        <div id="question-content">
            <div class="question-box" id="question-text"></div>
            <div id="answer-section"></div>
        </div>

        <div id="feedback-box" class="feedback-box">
            <div id="result-status"></div>
            <div id="explanation-text" class="explanation"></div>
        </div>
        
        <button id="next-btn" class="btn-main" style="display: none;" onclick="handleNext()">Tiếp tục ➡</button>
    </div>

    <div id="result-screen">
        <h1>Kết Quả Khu Vườn</h1>
        <span id="rank-icon" style="font-size: 5rem;">🌱</span>
        <div style="font-size: 2.5rem; font-weight: bold; color: var(--ghibli-dark-green);" id="final-score">0đ</div>
        <p id="correct-count-text"></p>
        <button class="btn-main" onclick="location.reload()">Chơi lại 🔄</button>
    </div>
</div>

<!-- Audio elements -->
<audio id="audio-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="audio-wrong" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>
<audio id="audio-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="audio-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
    const sounds = {
        correct: document.getElementById('audio-correct'),
        wrong: document.getElementById('audio-wrong'),
        click: document.getElementById('audio-click'),
        win: document.getElementById('audio-win')
    };

    function playSound(type) {
        sounds[type].currentTime = 0;
        sounds[type].play().catch(e => console.log("Audio play blocked"));
    }

    const rawQuestions = [
        // Nhóm 1: Từ vựng
        { type: 'mc', q: "Từ nào nghĩa là 'biết' (thông qua học tập)?", options: ["<ruby>会<rt>huì</rt></ruby>", "<ruby>说<rt>shuō</rt></ruby>", "<ruby>做<rt>zuò</rt></ruby>", "<ruby>读<rt>dú</rt></ruby>"], a: 0, exp: "会 (huì) dùng cho kỹ năng cần học mới biết." },
        { type: 'mc', q: "Từ nào nghĩa là 'món ăn' hoặc 'rau'?", options: ["<ruby>字<rt>zì</rt></ruby>", "<ruby>菜<rt>cài</rt></ruby>", "<ruby>写<rt>xiě</rt></ruby>", "<ruby>做<rt>zuò</rt></ruby>"], a: 1, exp: "菜 (cài) nghĩa là rau hoặc món ăn (ví dụ: 中国菜 - Món ăn Trung Quốc)." },
        { type: 'mc', q: "Phiên âm của '写' là gì?", options: ["xiě", "xuě", "xué", "xiè"], a: 0, exp: "写 (xiě) là động từ 'viết'." },
        { type: 'mc', q: "Nghĩa của từ '好吃' (hǎochī) là:", options: ["Dễ làm", "Rất tốt", "Ngon miệng", "Vui vẻ"], a: 2, exp: "好吃 (hǎochī) là ngon (dành cho đồ ăn)." },
        { type: 'mc', q: "Từ nào dùng để hỏi 'như thế nào' (cách thức)?", options: ["<ruby>什么<rt>shénme</rt></ruby>", "<ruby>哪儿<rt>nǎr</rt></ruby>", "<ruby>怎么<rt>zěnme</rt></ruby>", "<ruby>谁<rt>shéi</rt></ruby>"], a: 2, exp: "怎么 (zěnme) + Động từ: làm gì đó như thế nào." },
        { type: 'mc', q: "Đâu là từ 'Tiếng Pháp'?", options: ["<ruby>英语<rt>Yīngyǔ</rt></ruby>", "<ruby>日语<rt>Rìyǔ</rt></ruby>", "<ruby>汉语<rt>Hànyǔ</rt></ruby>", "<ruby>法语<rt>Fǎyǔ</rt></ruby>"], a: 3, exp: "法语 (Fǎyǔ) là tiếng Pháp." },
        { type: 'mc', q: "Chọn chữ Hán cho 'Mẹ':", options: ["<ruby>妈妈<rt>māma</rt></ruby>", "<ruby>奶奶<rt>nǎinai</rt></ruby>", "<ruby>姐姐<rt>jiějie</rt></ruby>", "<ruby>妹妹<rt>mèimei</rt></ruby>"], a: 0, exp: "妈妈 (māma) là mẹ." },
        { type: 'mc', q: "Từ '读' (dú) có nghĩa là:", options: ["Viết", "Đọc", "Nói", "Nghe"], a: 1, exp: "读 (dú) là đọc (thành tiếng hoặc xem sách)." },
        { type: 'mc', q: "Hán tự '汉字' nghĩa là gì?", options: ["Tiếng Trung", "Người Trung Quốc", "Chữ Hán", "Trung Quốc"], a: 2, exp: "汉字 (Hànzì) là chữ Hán (Hán tự)." },
        { type: 'mc', q: "Phó từ chỉ mức độ 'rất' là:", options: ["<ruby>不<rt>bù</rt></ruby>", "<ruby>太<rt>tài</rt></ruby>", "<ruby>很<rt>hěn</rt></ruby>", "<ruby>都<rt>dōu</rt></ruby>"], a: 2, exp: "很 (hěn) thường đứng trước tính từ." },

        // Nhóm 2: Ngữ pháp 会 & Tính từ
        { type: 'sort', q: "Sắp xếp: 会 / 我 / 说 / 汉语 / 。", a: ["我", "会", "说", "汉语", "。"], exp: "S + 会 + V + O: Tôi biết nói tiếng Trung." },
        { type: 'sort', q: "Sắp xếp: 不会 / 妈妈 / 做 / 中国菜 / 。", a: ["妈妈", "不会", "做", "中国菜", "。"], exp: "Phủ định của 会 là 不会." },
        { type: 'mc', q: "Câu nào đúng ngữ pháp?", options: ["<ruby>我写汉字很。<rt>Wǒ xiě Hànzì hěn.</rt></ruby>", "<ruby>我写汉字。<rt>Wǒ xiě Hànzì.</rt></ruby>", "<ruby>我会写汉字。<rt>Wǒ huì xiě Hànzì.</rt></ruby>", "<ruby>我写会汉字。<rt>Wǒ xiě huì Hànzì.</rt></ruby>"], a: 2, exp: "Động từ năng nguyện 会 đứng trước động từ chính." },
        { type: 'mc', q: "Dịch: 'Món ăn mẹ nấu rất ngon'", options: ["<ruby>妈妈菜很好吃。<rt>Māma cài hěn hǎochī.</rt></ruby>", "<ruby>妈妈做的菜很好吃。<rt>Māma zuò de cài hěn hǎochī.</rt></ruby>", "<ruby>妈妈菜好吃很。<rt>Māma cài hǎochī hěn.</rt></ruby>", "<ruby>妈妈做菜好吃。<rt>Māma zuò cài hǎochī.</rt></ruby>"], a: 1, exp: "Cấu trúc miêu tả: Chủ ngữ + 很 + Tính từ." },
        { type: 'sort', q: "Sắp xếp: 很好吃 / 中国菜 / 。", a: ["中国菜", "很好吃", "。"], exp: "Vị ngữ tính từ: Chủ ngữ + 很 + Tính từ." },
        { type: 'mc', q: "Phủ định của '妈妈做的菜很好吃' là:", options: ["<ruby>妈妈做的菜很不好吃。<rt>Māma zuò de cài hěn bù hǎochī.</rt></ruby>", "<ruby>妈妈做的菜不很好吃。<rt>Māma zuò de cài bù hěn hǎochī.</rt></ruby>", "<ruby>妈妈做的菜不好吃。<rt>Māma zuò de cài bù hǎochī.</rt></ruby>", "<ruby>妈妈做的菜没好吃。<rt>Māma zuò de cài méi hǎochī.</rt></ruby>"], a: 2, exp: "Phủ định tính từ dùng '不', bỏ 'khuynh hướng' 很." },
        { type: 'mc', q: "Bạn biết làm món Trung Quốc không?", options: ["<ruby>你会做中国菜 ma？<rt>Nǐ huì zuò Zhōngguó cài ma?</rt></ruby>", "<ruby>你会写中国菜 ma？<rt>Nǐ huì xiě Zhōngguó cài ma?</rt></ruby>", "<ruby>你做中国菜 ma？<rt>Nǐ zuò Zhōngguó cài ma?</rt></ruby>", "<ruby>你会说中国菜 ma？<rt>Nǐ huì shuō Zhōngguó cài ma?</rt></ruby>"], a: 0, exp: "Nấu ăn dùng động từ 做 (zuò)." },
        { type: 'sort', q: "Sắp xếp: 会 / 你 / 写 / 汉字 / 吗 / ？", a: ["你", "会", "写", "汉字", "吗", "？"], exp: "Câu nghi vấn với 会: S + 会 + V + O + 吗？" },
        { type: 'mc', q: "Tôi biết nói tiếng Anh (英语):", options: ["<ruby>我会说英语。<rt>Wǒ huì shuō Yīngyǔ.</rt></ruby>", "<ruby>我英语会说。<rt>Wǒ Yīngyǔ huì shuō.</rt></ruby>", "<ruby>我会写英语。<rt>Wǒ huì xiě Yīngyǔ.</rt></ruby>", "<ruby>我英语说会。<rt>Wǒ Yīngyǔ shuō huì.</rt></ruby>"], a: 0, exp: "S + 会 + V + O." },
        { type: 'mc', q: "Điền từ vào chỗ trống: '你的___名字是什么？'", options: ["<ruby>中国<rt>Zhōngguó</rt></ruby>", "<ruby>汉字<rt>Hànzì</rt></ruby>", "<ruby>汉语<rt>Hànyǔ</rt></ruby>", "<ruby>谁<rt>shéi</rt></ruby>"], a: 2, exp: "汉语名字 (Hànyǔ míngzi): Tên tiếng Trung." },

        // Nhóm 3: Đại từ 怎么 & Tổng hợp
        { type: 'sort', q: "Sắp xếp: 怎么 / 写 / 这个字 / ？", a: ["这个字", "怎么", "写", "？"], exp: "Hỏi cách thức: Đối tượng + 怎么 + Động từ." },
        { type: 'mc', q: "Để hỏi 'Chữ này đọc thế nào?', ta nói:", options: ["<ruby>这个字什么读？<rt>Zhè ge zì shénme dú?</rt></ruby>", "<ruby>这个字怎么读？<rt>Zhè ge zì zěnme dú?</rt></ruby>", "<ruby>这个字怎么写？<rt>Zhè ge zì zěnme xiě?</rt></ruby>", "<ruby>这个字读什么？<rt>Zhè ge zì dú shénme?</rt></ruby>"], a: 1, exp: "怎么读 (zěnme dú): đọc như thế nào." },
        { type: 'sort', q: "Sắp xếp: 怎么 / 你的 / 汉语名字 / 读 / ？", a: ["你的", "汉语名字", "怎么", "读", "？"], exp: "Tên tiếng Trung của bạn đọc thế nào?" },
        { type: 'mc', q: "Chọn từ điền vào chỗ trống: '你会___汉字吗？'", options: ["<ruby>说<rt>shuō</rt></ruby>", "<ruby>做<rt>zuò</rt></ruby>", "<ruby>写<rt>xiě</rt></ruby>", "<ruby>很<rt>hěn</rt></ruby>"], a: 2, exp: "Viết chữ Hán dùng 写 (xiě)." },
        { type: 'sort', q: "Sắp xếp: 我 / 汉字 / 会 / 读 / ， / 不会 / 写 / 。", a: ["我", "会", "读", "汉字", "，", "不会", "写", "。"], exp: "Tôi biết đọc chữ Hán nhưng không biết viết." },
        { type: 'mc', q: "Tiếng Nhật là gì?", options: ["<ruby>法语<rt>Fǎyǔ</rt></ruby>", "<ruby>英语<rt>Yīngyǔ</rt></ruby>", "<ruby>汉语<rt>Hànyǔ</rt></ruby>", "<ruby>日语<rt>Rìyǔ</rt></ruby>"], a: 3, exp: "日语 (Rìyǔ) là tiếng Nhật." },
        { type: 'mc', q: "Dịch: 'Chữ này tôi biết đọc, không biết viết'", options: ["<ruby>这个字我会读，不会写。<rt>Zhè ge zì wǒ huì dú, bú huì xiě.</rt></ruby>", "<ruby>这个字我会写，不会读。<rt>Zhè ge zì wǒ huì xiě, bú huì dú.</rt></ruby>", "<ruby>这个字我不读，不写。<rt>Zhè ge zì wǒ bù dú, bù xiě.</rt></ruby>", "<ruby>这个字会写会读。<rt>Zhè ge zì huì xiě huì dú.</rt></ruby>"], a: 0, exp: "Diễn tả kỹ năng bằng 会 và 不会." },
        { type: 'sort', q: "Sắp xếp: 吗 / 做 / 妈妈 / 菜 / 会 / ？", a: ["妈妈", "会", "做", "菜", "吗", "？"], exp: "Câu hỏi nghi vấn cơ bản: S + 会 + V + O + 吗？" },
        { type: 'mc', q: "Hán tự của 'Zì' (chữ) là:", options: ["<ruby>子<rt>zǐ</rt></ruby>", "<ruby>字<rt>zì</rt></ruby>", "<ruby>自<rt>zì</rt></ruby>", "<ruby>学<rt>xué</rt></ruby>"], a: 1, exp: "字 (zì) nghĩa là văn tự/chữ." },
        { type: 'mc', q: "Để khen món ăn ngon, người Trung Quốc nói:", options: ["<ruby>很好看<rt>hěn hǎokàn</rt></ruby>", "<ruby>很好听<rt>hěn hǎotīng</rt></ruby>", "<ruby>很好吃<rt>hěn hǎochī</rt></ruby>", "<ruby>很好学<rt>hěn hǎoxué</rt></ruby>"], a: 2, exp: "好吃 (hǎochī) = ngon." }
    ];

    let questions = [];
    let curIdx = 0;
    let score = 0;
    let correctCount = 0;
    let selectedOrder = [];

    function startQuiz() {
        playSound('click');
        // Trộn câu hỏi mỗi khi bắt đầu
        questions = [...rawQuestions].sort(() => Math.random() - 0.5);
        curIdx = 0; 
        score = 0; 
        correctCount = 0;
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = questions[curIdx];
        document.getElementById('question-count').innerText = `Câu: ${curIdx + 1}/30`;
        document.getElementById('score-display').innerText = `Điểm: ${score}`;
        document.getElementById('progress').style.width = `${(curIdx / 30) * 100}%`;
        document.getElementById('question-text').innerHTML = q.q;
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        const area = document.getElementById('answer-section');
        area.innerHTML = '';

        if (q.type === 'mc') {
            const grid = document.createElement('div');
            grid.className = 'options-grid';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = opt;
                btn.onclick = () => checkAnswer(i);
                grid.appendChild(btn);
            });
            area.appendChild(grid);
        } else if (q.type === 'sort') {
            selectedOrder = [];
            const ansArea = document.createElement('div');
            ansArea.className = 'answer-area';
            ansArea.id = 'answer-area-box';
            ansArea.innerHTML = '<span style="color:#aaa; font-size:0.9rem;">Chạm các từ bên dưới...</span>';
            
            const chipBox = document.createElement('div');
            chipBox.className = 'word-chips';
            
            // Xử lý dấu câu riêng
            let shuffleWords = [...q.a].filter(w => w !== "。" && w !== "？" && w !== "，");
            const puncs = q.a.filter(w => w === "。" || w === "？" || w === "，");
            
            shuffleWords = shuffleWords.sort(() => Math.random() - 0.5);
            if(puncs.length > 0) shuffleWords = shuffleWords.concat(puncs);

            shuffleWords.forEach((w) => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerText = w;
                chip.onclick = () => { playSound('click'); selectWord(w, chip); };
                chipBox.appendChild(chip);
            });
            
            const checkBtn = document.createElement('button');
            checkBtn.className = 'btn-main';
            checkBtn.innerText = 'Kiểm tra câu 🆗';
            checkBtn.onclick = checkSortAnswer;

            area.appendChild(ansArea);
            area.appendChild(chipBox);
            area.appendChild(checkBtn);
        }
    }

    function selectWord(word, chipEl) {
        if (chipEl.classList.contains('selected')) return;
        if(selectedOrder.length === 0) document.getElementById('answer-area-box').innerHTML = '';
        
        chipEl.classList.add('selected');
        selectedOrder.push({ word: word, element: chipEl });
        renderSortAnswer();
    }

    function returnWord(index) {
        if (document.getElementById('next-btn').style.display === 'block') return;
        playSound('click');
        const item = selectedOrder[index];
        item.element.classList.remove('selected');
        selectedOrder.splice(index, 1);
        
        if(selectedOrder.length === 0) {
            document.getElementById('answer-area-box').innerHTML = '<span style="color:#aaa; font-size:0.9rem;">Chạm các từ bên dưới...</span>';
        } else {
            renderSortAnswer();
        }
    }

    function renderSortAnswer() {
        const area = document.getElementById('answer-area-box');
        area.innerHTML = '';
        selectedOrder.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'chip chip-in-answer';
            div.innerText = item.word;
            div.onclick = () => returnWord(idx);
            area.appendChild(div);
        });
    }

    function checkAnswer(idx) {
        const q = questions[curIdx];
        const btns = document.querySelectorAll('.option-btn');
        if (document.getElementById('next-btn').style.display === 'block') return;

        const isCorrect = idx === q.a;
        if (isCorrect) playSound('correct'); else playSound('wrong');

        btns.forEach(b => b.disabled = true);
        btns[q.a].classList.add('correct');
        if (!isCorrect) btns[idx].classList.add('wrong');
        showFeedback(isCorrect, q.exp);
    }

    function checkSortAnswer() {
        if (document.getElementById('next-btn').style.display === 'block') return;
        const q = questions[curIdx];
        const userString = selectedOrder.map(i => i.word).join('');
        const correctString = q.a.join('');
        const isCorrect = userString === correctString;
        
        if (isCorrect) playSound('correct'); else playSound('wrong');
        showFeedback(isCorrect, q.exp + `<br>Đáp án: <b>${q.a.join(' ')}</b>`);
    }

    function showFeedback(isCorrect, exp) {
        const fb = document.getElementById('feedback-box');
        fb.style.display = 'block';
        if (isCorrect) {
            document.getElementById('result-status').innerHTML = '✅ <b style="color:green">Chính xác!</b> +10đ';
            score += 10; correctCount++;
        } else {
            document.getElementById('result-status').innerHTML = '❌ <b style="color:red">Chưa đúng!</b> -5đ';
            score = Math.max(0, score - 5);
        }
        document.getElementById('explanation-text').innerHTML = `<b>Giải thích:</b> ${exp}`;
        document.getElementById('next-btn').style.display = 'block';
        document.getElementById('score-display').innerText = `Điểm: ${score}`;
    }

    function handleNext() {
        playSound('click');
        curIdx++;
        if (curIdx < 30) showQuestion();
        else showFinalResult();
    }

    function showFinalResult() {
        playSound('win');
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${score}đ`;
        
        let rank = "🌱 Hạt mầm";
        let icon = "🌱";
        if(score >= 250) { rank = "🌳 Đại thụ"; icon = "🌳"; }
        else if(score >= 150) { rank = "🌿 Cây nhỏ"; icon = "🌿"; }
        
        document.getElementById('rank-icon').innerText = icon;
        document.getElementById('correct-count-text').innerText = `Bạn đạt danh hiệu "${rank}" với ${correctCount}/30 câu đúng!`;
    }
</script>
</body>
</html>
